<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Petmess</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lz-string/1.4.4/lz-string.min.js"></script>
    <style>
        :root { 
            --tg-sent: #efffde; --tg-received: #ffffff; --tg-accent: #3390ec; 
            --tg-bg: #7195ba; --online: #4cc351; --glass: rgba(255, 255, 255, 0.95);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --tg-sent: #2b5278; --tg-received: #182533; --tg-accent: #5288c1;
                --tg-bg: #0e1621; --glass: rgba(24, 37, 51, 0.95);
            }
            body { color: #fff; background: #0e1621 !important; }
            #sidebar, #chat-header, #form-container, .profile-card { background-color: #17212b !important; color: #fff; border-color: #0e1621 !important; }
            #input, #search-input, .modal-input { background: #242f3d !important; color: #fff; border-color: #101921 !important; }
            .user-item:hover { background: #202b36 !important; }
            #action-preview { background: #242f3d !important; }
        }

        html, body { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #fff; }
        body { display: flex; }

        /* ВХОД */
        #auth-screen { position: fixed; inset: 0; background: #fff; display: flex; justify-content: center; align-items: center; z-index: 9000; }
        .auth-card { width: 320px; padding: 40px; text-align: center; border-radius: 30px; box-shadow: 0 20px 60px rgba(0,0,0,0.1); background: #fff; }
        .auth-title { color: var(--tg-accent); font-size: 36px; font-weight: 900; margin-bottom: 30px; letter-spacing: -0.5px; }
        .auth-card input { width: 100%; padding: 14px; margin: 10px 0; border: 1px solid #eee; border-radius: 12px; outline: none; background: #f9f9f9; box-sizing: border-box; }
        .auth-card button { width: 100%; padding: 14px; background: var(--tg-accent); color: #fff; border: none; border-radius: 14px; font-weight: bold; cursor: pointer; margin-top: 10px; }

        /* САЙДБАР */
        #sidebar { width: 320px; background: #fff; border-right: 1px solid #eee; display: flex; flex-direction: column; flex-shrink: 0; }
        .sidebar-top { padding: 20px 25px 15px; display: flex; justify-content: space-between; align-items: center; }
        .sidebar-header { color: var(--tg-accent); font-size: 26px; font-weight: 900; letter-spacing: -0.5px; }
        .group-add-btn { background: rgba(51, 144, 236, 0.1); color: var(--tg-accent); border: none; border-radius: 10px; padding: 8px 12px; cursor: pointer; font-size: 13px; font-weight: bold; }

        #search-container { padding: 10px 20px 15px; position: relative; }
        #search-input { width: 100%; padding: 12px 16px; border: none; background: #f2f2f2; border-radius: 14px; outline: none; box-sizing: border-box; }
        #search-results { position: absolute; top: 65px; left: 20px; right: 20px; background: #fff; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); z-index: 100; display: none; overflow-y: auto; max-height: 250px; border: 1px solid #eee; }
        .search-item { padding: 12px 16px; cursor: pointer; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid #f5f5f5; color: #333; }
        
        .avatar { width: 50px; height: 50px; border-radius: 50%; object-fit: cover; background: #f0f0f0; flex-shrink: 0; }

        #contacts { flex-grow: 1; overflow-y: auto; }
        .user-item { padding: 12px 20px; cursor: pointer; display: flex; align-items: center; gap: 15px; position: relative; transition: 0.2s; }
        .user-item.active { background: var(--tg-accent) !important; color: #fff !important; }
        
        .status-dot { width: 12px; height: 12px; border-radius: 50%; background: #ccc; position: absolute; left: 54px; top: 46px; border: 2px solid #fff; z-index: 2; }
        .status-dot.online { background: var(--online); }
        .del-btn { margin-left: auto; color: #ccc; font-size: 24px; padding: 0 5px; opacity: 0; transition: 0.2s; }
        .user-item:hover .del-btn { opacity: 1; }

        .unread-eye { font-size: 12px; display: none; margin-top: 2px; color: var(--tg-accent); }

        #my-profile { padding: 15px 20px; border-top: 1px solid #f0f0f0; display: flex; align-items: center; gap: 12px; cursor: pointer; background: #fff; }

        /* ЧАТ */
        #chat-area { 
            flex-grow: 1; display: flex; flex-direction: column; min-width: 0;
            background-color: var(--tg-bg); 
            background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png');
            background-attachment: fixed; background-size: 400px;
        }
        #chat-header { padding: 10px 25px; background: var(--glass); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(0,0,0,0.05); display: flex; align-items: center; min-height: 60px; z-index: 10; cursor: pointer; gap: 15px; }
        #messages { flex-grow: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
        
        .msg { max-width: 75%; padding: 10px 14px 22px; border-radius: 18px; font-size: 15px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); position: relative; word-wrap: break-word; }
        .msg.sent { background: var(--tg-sent); align-self: flex-end; border-bottom-right-radius: 4px; }
        .msg.received { background: var(--tg-received); align-self: flex-start; border-bottom-left-radius: 4px; }
        .msg-sender-name { font-size: 12px; font-weight: 700; color: var(--tg-accent); margin-bottom: 4px; }
        .msg-meta { position: absolute; right: 12px; bottom: 6px; font-size: 10px; opacity: 0.6; display: flex; gap: 4px; align-items: center; }

        .voice-msg { padding: 5px 0; min-width: 220px; }
        .voice-msg audio { height: 35px; width: 100%; border-radius: 20px; outline: none; }

        #form-container { background: var(--glass); padding: 12px 18px; border-top: 1px solid rgba(0,0,0,0.05); }
        #form { display: flex; align-items: center; gap: 10px; }
        #input { flex-grow: 1; min-width: 0; padding: 12px 18px; border-radius: 25px; border: 1px solid #e0e0e0; background: #f5f5f5; outline: none; font-size: 15px; }
        .action-btn { width: 45px; height: 45px; border-radius: 50%; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: 0.2s; }
        #send-btn { background: var(--tg-accent); color: #fff; font-size: 20px; }
        #voice-btn { background: #f0f0f0; color: #888; font-size: 22px; }
        #voice-btn.recording { background: #ff4d4d; color: #fff; animation: v-pulse 1.5s infinite; }
        @keyframes v-pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }

        /* МОДАЛКА */
        #modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(8px); display: none; justify-content: center; align-items: center; z-index: 9999; padding: 20px; }
        .profile-card { background: #fff; border-radius: 30px; width: 100%; max-width: 450px; padding: 35px; box-shadow: 0 40px 100px rgba(0,0,0,0.3); display: flex; flex-direction: column; position: relative; }
        .modal-avatar { width: 120px; height: 120px; border-radius: 40px; object-fit: cover; margin: 0 auto 20px; display: block; border: 3px solid var(--tg-accent); cursor: pointer; }
        .modal-label { font-size: 11px; color: #aaa; text-transform: uppercase; font-weight: 700; margin-top: 15px; display: block; }
        .modal-input { border: 1px solid #eee; background: #fdfdfd; padding: 12px; border-radius: 12px; width: 100%; box-sizing: border-box; margin-top: 5px; outline: none; font-size: 14px; }
        .close-modal-btn { position: absolute; top: 15px; right: 20px; font-size: 28px; color: #aaa; cursor: pointer; line-height: 1; }
        .members-list { background: #f9f9f9; padding: 15px; border-radius: 12px; margin-top: 5px; max-height: 120px; overflow-y: auto; font-size: 14px; }

        #context-menu { display: none; position: fixed; background: #fff; border-radius: 14px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); z-index: 3000; overflow: hidden; min-width: 180px; border: 1px solid #eee; }
        .menu-item { padding: 14px 20px; cursor: pointer; font-size: 14px; }

        @media (max-width: 768px) { 
            #sidebar { width: 85px; } 
            .sidebar-header, .sidebar-top span, .user-info, .del-btn, #my-name-display { display: none; } 
            .sidebar-top { justify-content: center; padding: 20px 0; }
            .status-dot { left: 52px; top: 44px; }
        }
    </style>
</head>
<body onclick="closeMenu()">

<div id="auth-screen">
    <div class="auth-card">
        <div class="auth-title">Petmess</div>
        <input type="text" id="auth-user" placeholder="Ваш логин">
        <input type="password" id="auth-pass" placeholder="Пароль">
        <button onclick="login()">Войти</button>
    </div>
</div>

<div id="app-screen">
    <div id="sidebar">
        <div class="sidebar-top">
            <span class="sidebar-header">Petmess</span>
            <button class="group-add-btn" onclick="createGroup()">+</button>
        </div>
        <div id="search-container"><input type="text" id="search-input" placeholder="Поиск..." oninput="searchUser(this.value)"><div id="search-results"></div></div>
        <div id="contacts"></div>
        <div id="my-profile" onclick="openProfileModal(me)">
            <img id="my-avatar" src="" class="avatar">
            <div class="user-info" style="display:flex; flex-direction:column; margin-left: 12px; overflow:hidden;">
                <span id="my-name-display" style="font-weight:bold; font-size:15px; white-space:nowrap; text-overflow:ellipsis;">...</span>
                <span style="font-size: 11px; color: #aaa;">Мой профиль</span>
            </div>
        </div>
    </div>

    <div id="chat-area">
        <div id="chat-header">
            <img id="header-avatar" class="avatar" style="width:42px; height:42px; display:none; margin-right:12px;">
            <div style="display:flex; flex-direction:column; flex-grow:1; justify-content: center;" onclick="openProfileModal(targetId)">
                <span id="header-title" style="font-weight:700; font-size:16px;">Выберите чат</span>
                <span id="header-subtitle" style="font-size: 12px; height: 14px; color:#888;"></span>
            </div>
            <button id="group-invite-btn" style="display:none; padding:8px 15px; background:var(--tg-accent); color:white; border:none; border-radius:12px; cursor:pointer; font-weight:bold;" onclick="inviteToGroup()">+ Участник</button>
        </div>
        <div id="messages"></div>
        <div id="form-container">
            <div id="action-preview" style="display:none; padding:10px; border-left:4px solid var(--tg-accent); border-radius:8px; align-items:center; margin-bottom:8px; background: rgba(0,0,0,0.03);">
                <div id="action-text" style="flex-grow:1; font-size:13px; color:#666;"></div>
                <div onclick="cancelAction()" style="cursor:pointer; font-size:20px; padding: 0 5px;">×</div>
            </div>
            <form id="form" onsubmit="sendMessage(event)">
                <label for="chat-file" style="font-size:26px; cursor:pointer; color:#bbb; flex-shrink:0;">📎</label>
                <input type="file" id="chat-file" style="display:none" accept="image/*" onchange="processFile(this)">
                <input id="input" autocomplete="off" placeholder="Сообщение..." disabled oninput="handleTyping()">
                <button type="button" id="voice-btn" class="action-btn" onclick="toggleVoice()" disabled>🎙</button>
                <button type="submit" id="send-btn" class="action-btn" disabled>➤</button>
            </form>
        </div>
    </div>
</div>

<div id="modal-overlay" onclick="closeProfileModal()">
    <div class="profile-card" onclick="event.stopPropagation()">
        <span class="close-modal-btn" onclick="closeProfileModal()">×</span>
        <img id="modal-avatar-display" class="modal-avatar">
        <input type="file" id="modal-upload" style="display:none" accept="image/*" onchange="processFile(this)">
        <div id="modal-content" style="width: 100%;"></div>
    </div>
</div>

<div id="context-menu">
    <div class="menu-item" onclick="prepareReply()">↩ Ответить</div>
    <div class="menu-item" id="menu-edit" onclick="prepareEdit()">✎ Изменить</div>
    <div class="menu-item" id="menu-del" onclick="deleteMsg()" style="color:#e63946;">🗑 Удалить</div>
</div>

<script>
    const firebaseConfig = {
      apiKey: "AIzaSyCydg_mccaTclSxfzfVdLFpCina4fi3LDE",
      authDomain: "petkovmes.firebaseapp.com",
      databaseURL: "https://petkovmes-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "petkovmes",
      storageBucket: "petkovmes.firebasestorage.app",
      messagingSenderId: "149469624326",
      appId: "1:149469624326:web:0c7dcabcaab15c445aeb87"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let me = '', targetId = '', isGroup = false, editingMsgKey = null, replyData = null, selectedMsg = null, typingTimeout, uploadTarget = '';
    const cache = new Map();
    let typingStatus = false, onlineStatus = 'offline';

    const saveToCache = (k, d) => { try { localStorage.setItem('pm_'+k, d); } catch(e) { } };
    const getFromCache = (k) => localStorage.getItem('pm_'+k);
    const formatTime = (t) => { const d = new Date(t); return d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0'); };

    // --- УМНОЕ СЖАТИЕ ---
    function compress(v) { return LZString.compressToUTF16(v); }
    function decompress(v) { return LZString.decompressFromUTF16(v) || v; }

    async function login() {
        const u = document.getElementById('auth-user').value.trim().toLowerCase(), p = document.getElementById('auth-pass').value.trim();
        if (!u || !p) return;
        const snap = await db.ref(`users/${u}`).once('value');
        if (snap.val() && snap.val().password !== p) { alert("Неверный пароль!"); return; }
        if (!snap.val()) await db.ref(`users/${u}`).set({ password: p, nickname: u, avatar: "", description: "" });
        me = u;
        db.ref(`status/${me}`).set('online');
        db.ref(`status/${me}`).onDisconnect().set('offline');
        document.getElementById('auth-screen').style.display = 'none';
        document.getElementById('app-screen').style.display = 'flex';
        
        db.ref(`users/${me}`).on('value', s => {
            const d = s.val(); if(!d) return;
            document.getElementById('my-name-display').innerText = d.nickname || me;
            document.getElementById('my-avatar').src = d.avatar || `https://robohash.org/${me}`;
        });
        
        // ЗАПУСК ОЧИСТКИ ПРИ ВХОДЕ (удаляем все сообщения старше 48 часов)
        cleanupOldMessages();
        loadContacts();
    }

    async function cleanupOldMessages() {
        const cutoff = Date.now() - (48 * 60 * 60 * 1000);
        // Чистим личные чаты
        const chats = await db.ref('chats').once('value');
        chats.forEach(chat => {
            chat.forEach(msg => {
                if(msg.val().time < cutoff) db.ref(`chats/${chat.key}/${msg.key}`).remove();
            });
        });
        // Чистим группы
        const groups = await db.ref('groups').once('value');
        groups.forEach(grp => {
            db.ref(`groups/${grp.key}/messages`).once('value', msgs => {
                msgs.forEach(m => { if(m.val().time < cutoff) m.ref.remove(); });
            });
        });
    }

    async function createGroup() {
        const name = prompt("Название группы:"); if (!name) return;
        const groupId = 'grp_' + Date.now();
        await db.ref(`groups/${groupId}`).set({ name: name, owner: me, members: { [me]: true } });
        await db.ref(`contacts/${me}/${groupId}`).set(true);
        selectChat(groupId, true);
    }

    async function inviteToGroup() {
        const invitee = prompt("ID пользователя:"); if (!invitee) return;
        const snap = await db.ref(`users/${invitee}`).once('value');
        if (!snap.exists()) return alert("Нет такого юзера");
        await db.ref(`groups/${targetId}/members/${invitee}`).set(true);
        await db.ref(`contacts/${invitee}/${targetId}`).set(true);
    }

    function getChatPath() { return isGroup ? `groups/${targetId}/messages` : `chats/${(me < targetId ? me+'_'+targetId : targetId+'_'+me)}`; }

    function selectChat(id, isGrp = false) {
        if (!id) return;
        if (targetId) db.ref(getChatPath()).off();
        targetId = id; isGroup = isGrp;
        document.getElementById('group-invite-btn').style.display = isGroup ? 'block' : 'none';
        document.querySelectorAll('.user-item').forEach(el => el.classList.remove('active'));
        if(document.getElementById(`user-item-${id}`)) document.getElementById(`user-item-${id}`).classList.add('active');
        document.getElementById('input').disabled = false; document.getElementById('send-btn').disabled = false; document.getElementById('voice-btn').disabled = false;

        const hAv = document.getElementById('header-avatar'); hAv.style.display = 'block';
        if (isGroup) {
            db.ref(`groups/${id}`).on('value', s => {
                const d = s.val(); if(!d) return;
                document.getElementById('header-title').innerText = d.name || 'Группа';
                hAv.src = d.avatar || `https://robohash.org/${id}`;
            });
            document.getElementById('header-subtitle').innerText = "Групповой чат";
        } else {
            db.ref(`users/${id}`).on('value', s => {
                const d = s.val(); if(!d) return;
                document.getElementById('header-title').innerText = d.nickname || id;
                hAv.src = d.avatar || `https://robohash.org/${id}`;
            });
            db.ref(`status/${id}`).on('value', s => { document.getElementById('header-subtitle').innerText = s.val()==='online'?'В сети':'Не в сети'; });
        }

        db.ref(getChatPath()).on('value', snap => {
            let fullHTML = '';
            snap.forEach(c => {
                const m = c.val(), key = c.key;
                if (!isGroup && m.sender === targetId && m.read === false) db.ref(`${getChatPath()}/${key}/read`).set(true);
                const msgClass = `msg ${m.sender === me ? 'sent' : 'received'}`;
                let senderName = (isGroup && m.sender !== me) ? `<div class="msg-sender-name">${m.sender}</div>` : '';
                
                let data = decompress(m.file || m.text || "");
                let contentHTML = m.type === 'image' ? `<img src="${data}" style="max-width:100%; border-radius:12px;">` :
                                  m.type === 'audio' ? `<div class="voice-msg"><audio controls src="${data}"></audio></div>` :
                                  `<div>${data}</div>`;
                
                fullHTML += `<div class="${msgClass}" onclick="handleMsgClick(event, '${key}', '${m.sender}', '${data.substring(0,20)}')">${senderName}${contentHTML}<div class="msg-meta">${formatTime(m.time)} ${(!isGroup && m.sender===me && !m.read)?'👁‍🗨':''}</div></div>`;
            });
            document.getElementById('messages').innerHTML = fullHTML;
            document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
        });
    }

    async function processFile(input) {
        const file = input.files[0]; if (!file) return;
        const type = input.id === 'modal-upload' ? uploadTarget : 'chat';
        const reader = new FileReader(); reader.readAsDataURL(file);
        reader.onload = (e) => {
            const img = new Image(); img.src = e.target.result;
            img.onload = async () => {
                const canvas = document.createElement('canvas');
                const MAX = (type === 'avatar' || type === 'group_avatar') ? 400 : 800; // Снизили до 800 для экономии
                let w = img.width, h = img.height;
                if (w > MAX || h > MAX) { if (w > h) { h *= MAX / w; w = MAX; } else { w *= MAX / h; h = MAX; } }
                canvas.width = w; canvas.height = h;
                canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                const b64 = canvas.toDataURL('image/jpeg', 0.7); // 0.7 качество оптимально
                const compressedData = compress(b64);
                
                if (type === 'avatar') { await db.ref(`users/${me}/avatar`).set(b64); }
                else if (type === 'group_avatar') { await db.ref(`groups/${targetId}/avatar`).set(b64); }
                else { db.ref(getChatPath()).push({ sender: me, file: compressedData, type: 'image', time: Date.now(), read: false }); }
            };
        };
    }

    function sendMessage(e) {
        e.preventDefault(); const txt = document.getElementById('input').value.trim(); if (!txt || !targetId) return;
        db.ref(getChatPath()).push({ sender: me, text: compress(txt), type: 'text', time: Date.now(), read: false });
        if(!isGroup) db.ref(`contacts/${targetId}/${me}`).set(true);
        document.getElementById('input').value = '';
    }

    async function toggleVoice() {
        if (!isRecording) {
            const s = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(s); audioChunks = [];
            mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
            mediaRecorder.onstop = () => {
                const b = new Blob(audioChunks, { type: 'audio/webm' });
                const r = new FileReader(); r.readAsDataURL(b);
                r.onloadend = () => { db.ref(getChatPath()).push({ sender: me, file: compress(r.result), type: 'audio', time: Date.now(), read: false }); };
            };
            mediaRecorder.start(); isRecording = true; document.getElementById('voice-btn').classList.add('recording');
        } else { mediaRecorder.stop(); isRecording = false; document.getElementById('voice-btn').classList.remove('recording'); }
    }

    async function openProfileModal(uid) {
        if (!uid) return;
        const isGrp = uid.startsWith('grp_');
        const modalContent = document.getElementById('modal-content');
        const av = document.getElementById('modal-avatar-display');
        if (isGrp) {
            const snap = await db.ref(`groups/${uid}`).once('value'); const d = snap.val();
            av.src = d.avatar || `https://robohash.org/${uid}`;
            if(d.owner === me) { av.onclick = () => { uploadTarget = 'group_avatar'; document.getElementById('modal-upload').click(); }; }
            let mems = Object.keys(d.members || {}).join(', ');
            modalContent.innerHTML = `<span class="modal-label">Группа: ${d.name}</span><span class="modal-label">Участники</span><div class="members-list">${mems}</div>`;
        } else {
            const snap = await db.ref(`users/${uid}`).once('value'); const d = snap.val();
            av.src = d.avatar || `https://robohash.org/${uid}`;
            if(uid === me) {
                av.onclick = () => { uploadTarget = 'avatar'; document.getElementById('modal-upload').click(); };
                modalContent.innerHTML = `<span class="modal-label">Ник</span><input id="m-nick" class="modal-input" value="${d.nickname}" onchange="saveProfile()"><span class="modal-label">О себе</span><textarea id="m-desc" class="modal-input" onchange="saveProfile()">${d.description||''}</textarea><button onclick="deleteAccount()" class="del-acc-btn" style="color:red; margin-top:10px; border:none; background:none; cursor:pointer;">Удалить аккаунт</button>`;
            } else {
                modalContent.innerHTML = `<span class="modal-label">${d.nickname || uid}</span><div style="margin-top:10px">${d.description || 'Нет описания'}</div>`;
            }
        }
        document.getElementById('modal-overlay').style.display = 'flex';
    }

    function loadContacts() {
        db.ref(`contacts/${me}`).on('value', snap => {
            const div = document.getElementById('contacts'); div.innerHTML = '';
            snap.forEach(c => {
                const id = c.key, isGrp = id.startsWith('grp_');
                const item = document.createElement('div'); item.className = `user-item ${id === targetId ? 'active' : ''}`;
                item.innerHTML = `<img src="https://robohash.org/${id}" class="avatar" id="av-${id}"><div class="status-dot" id="dot-${id}"></div><div class="user-info" style="flex-grow:1; overflow:hidden; margin-left:12px;"><b id="nick-${id}">${id}</b><div id="unread-${id}" class="unread-eye">👁‍🗨</div></div><span class="del-btn" onclick="removeContact(event, '${id}')">×</span>`;
                
                const path = isGrp ? `groups/${id}/messages` : `chats/${me < id ? me+'_'+id : id+'_'+me}`;
                db.ref(path).limitToLast(1).on('value', s => {
                    const unEl = item.querySelector(`#unread-${id}`);
                    if(s.exists() && unEl) { const m = Object.values(s.val())[0]; unEl.style.display = (m.sender !== me && m.read === false) ? 'block' : 'none'; }
                });
                if(!isGrp) {
                    db.ref(`users/${id}`).on('value', s => { if(s.val()){ if(document.getElementById(`av-${id}`)) document.getElementById(`av-${id}`).src = s.val().avatar || `https://robohash.org/${id}`; if(document.getElementById(`nick-${id}`)) document.getElementById(`nick-${id}`).innerText = s.val().nickname || id; } });
                    db.ref(`status/${id}`).on('value', s => { if(document.getElementById(`dot-${id}`)) document.getElementById(`dot-${id}`).className = `status-dot ${s.val()==='online'?'online':''}`; });
                } else { db.ref(`groups/${id}`).on('value', s => { if(s.val()){ if(document.getElementById(`nick-${id}`)) document.getElementById(`nick-${id}`).innerText = '👥 ' + s.val().name; if(document.getElementById(`av-${id}`)) document.getElementById(`av-${id}`).src = s.val().avatar || `https://robohash.org/${id}`; } }); }
                item.onclick = () => selectChat(id, isGrp); div.appendChild(item);
            });
        });
    }

    async function removeContact(e, n) { e.stopPropagation(); if(confirm(`Удалить ${n}?`)) await db.ref(`contacts/${me}/${n}`).remove(); }
    async function deleteAccount() { if(confirm("Удалить всё?")) { await db.ref(`users/${me}`).remove(); await db.ref(`contacts/${me}`).remove(); location.reload(); } }
    async function saveProfile() { const n = document.getElementById('m-nick').value, d = document.getElementById('m-desc').value; await db.ref(`users/${me}`).update({ nickname: n, description: d }); }
    function closeProfileModal() { document.getElementById('modal-overlay').style.display = 'none'; }
    function handleTyping() { if(isGroup) return; const id = me < targetId ? `${me}_${targetId}` : `${targetId}_${me}`; db.ref(`typing/${id}/${me}`).set(true); clearTimeout(typingTimeout); typingTimeout = setTimeout(() => db.ref(`typing/${id}/${me}`).set(false), 2000); }
    function handleMsgClick(e, k, s, t) { if(s === me) { selectedMsg = { key: k }; document.getElementById('context-menu').style.display='block'; document.getElementById('context-menu').style.left = e.clientX+'px'; document.getElementById('context-menu').style.top = e.clientY+'px'; } }
    function closeMenu() { document.getElementById('context-menu').style.display = 'none'; }
    function deleteMsg() { db.ref(`${getChatPath()}/${selectedMsg.key}`).remove(); }
    function prepareReply() { alert("Ответ: " + selectedMsg.key); } // Заглушка для краткости
    function cancelAction() { editingMsgKey = null; replyData = null; document.getElementById('action-preview').style.display = 'none'; }
</script>
</body>
</html>
