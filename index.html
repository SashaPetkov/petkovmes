<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Petkovmes Ultimate+</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: -apple-system, sans-serif; background: #e5ddd5; }
        body { display: flex; }
        
        /* Авторизация */
        #auth-screen { position: fixed; inset: 0; background: #f0f2f5; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 1000; }
        .auth-card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); display: flex; flex-direction: column; width: 300px; }
        .auth-card input { margin: 10px 0; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; }
        .auth-card button { background: #075e54; color: white; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; }

        #app-screen { display: none; width: 100%; height: 100%; flex-direction: row; }
        
        /* Боковая панель */
        #sidebar { width: 300px; background: white; border-right: 1px solid #ddd; display: flex; flex-direction: column; flex-shrink: 0; }
        #search-container { padding: 15px; border-bottom: 1px solid #eee; }
        #search-input { width: 100%; padding: 10px; border: none; background: #f0f2f5; border-radius: 20px; outline: none; }
        
        #contacts { flex-grow: 1; overflow-y: auto; }
        .user-item { padding: 15px; cursor: pointer; border-bottom: 1px solid #f9f9f9; display: flex; justify-content: space-between; align-items: center; }
        .user-item.active { background: #e9edef; border-left: 4px solid #075e54; font-weight: bold; }
        .del-contact { color: #ccc; font-size: 18px; padding: 0 5px; }

        /* Чат */
        #chat-area { flex-grow: 1; display: flex; flex-direction: column; min-width: 0; }
        #chat-header { padding: 15px; background: #ededed; font-weight: bold; border-bottom: 1px solid #ddd; }
        #messages { flex-grow: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
        
        .msg { max-width: 75%; padding: 8px 12px; border-radius: 10px; font-size: 15px; position: relative; box-shadow: 0 1px 1px rgba(0,0,0,0.1); }
        .msg.sent { background: #dcf8c6; align-self: flex-end; border-bottom-right-radius: 2px; }
        .msg.received { background: #fff; align-self: flex-start; border-bottom-left-radius: 2px; }
        
        /* Кнопки действий над сообщением */
        .msg-actions { font-size: 12px; color: rgba(0,0,0,0.3); cursor: pointer; float: right; display: none; margin-left: 10px; gap: 5px; }
        .msg:hover .msg-actions { display: flex; }
        .edited-label { font-size: 10px; color: #888; font-style: italic; margin-left: 5px; }

        /* Ответ внутри сообщения */
        .reply-quote { background: rgba(0,0,0,0.05); border-left: 3px solid #075e54; padding: 4px 8px; margin-bottom: 5px; border-radius: 4px; font-size: 13px; color: #555; }

        /* Панель ответа/редактирования над инпутом */
        #action-preview { background: #fff; padding: 8px 15px; border-top: 1px solid #ddd; display: none; justify-content: space-between; align-items: center; border-left: 5px solid #075e54; }
        #action-text { font-size: 13px; color: #555; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }

        #form { padding: 10px 15px; background: #f0f0f0; display: flex; gap: 10px; align-items: center; }
        #input { flex-grow: 1; padding: 12px; border-radius: 25px; border: none; outline: none; }
        #send-btn { background: #075e54; color: white; border: none; width: 42px; height: 42px; border-radius: 50%; cursor: pointer; }
        
        @media (max-width: 768px) { #sidebar { width: 80px; } .user-item span { display: none; } }
    </style>
</head>
<body>

<div id="auth-screen">
    <div class="auth-card">
        <h2 style="color: #075e54; text-align: center;">Petkovmes</h2>
        <input type="text" id="auth-user" placeholder="Логин">
        <input type="password" id="auth-pass" placeholder="Пароль">
        <button onclick="login()">ВОЙТИ</button>
        <p id="auth-error" style="color: red; font-size: 12px; text-align: center;"></p>
    </div>
</div>

<div id="app-screen">
    <div id="sidebar">
        <div id="search-container">
            <input type="text" id="search-input" placeholder="Ник + Enter" onkeydown="if(event.key==='Enter') searchUser()">
        </div>
        <div id="contacts"></div>
    </div>
    <div id="chat-area">
        <div id="chat-header">Выберите чат</div>
        <div id="messages"></div>
        
        <div id="action-preview">
            <div id="action-text"></div>
            <div onclick="cancelAction()" style="cursor:pointer; color:#999; font-weight:bold;">×</div>
        </div>

        <form id="form" onsubmit="sendMessage(event)">
            <input id="input" autocomplete="off" placeholder="Сообщение..." disabled>
            <button id="send-btn" disabled>➤</button>
        </form>
    </div>
</div>

<script>
    const firebaseConfig = {
      apiKey: "AIzaSyCydg_mccaTclSxfzfVdLFpCina4fi3LDE",
      authDomain: "petkovmes.firebaseapp.com",
      databaseURL: "https://petkovmes-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "petkovmes",
      storageBucket: "petkovmes.firebasestorage.app",
      messagingSenderId: "149469624326",
      appId: "1:149469624326:web:0c7dcabcaab15c445aeb87"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let me = '', target = '';
    
    // Переменные для состояний
    let editingMsgKey = null;
    let replyData = null;

    async function login() {
        const u = document.getElementById('auth-user').value.trim().toLowerCase();
        const p = document.getElementById('auth-pass').value.trim();
        if (!u || !p) return;
        const snapshot = await db.ref(`users/${u}`).once('value');
        const userData = snapshot.val();
        if (userData) {
            if (userData.password === p) startApp(u);
            else document.getElementById('auth-error').innerText = "Неверный пароль!";
        } else {
            await db.ref(`users/${u}`).set({ password: p });
            startApp(u);
        }
    }

    function startApp(username) {
        me = username;
        document.getElementById('auth-screen').style.display = 'none';
        document.getElementById('app-screen').style.display = 'flex';
        loadContacts();
    }

    async function searchUser() {
        const q = document.getElementById('search-input').value.trim().toLowerCase();
        if (!q || q === me) return;
        const snapshot = await db.ref(`users/${q}`).once('value');
        if (snapshot.exists()) {
            await db.ref(`contacts/${me}/${q}`).set(true);
            await db.ref(`contacts/${q}/${me}`).set(true);
            document.getElementById('search-input').value = '';
        } else { alert("Пользователь не найден!"); }
    }

    function loadContacts() {
        db.ref(`contacts/${me}`).on('value', snapshot => {
            const contDiv = document.getElementById('contacts');
            contDiv.innerHTML = '';
            snapshot.forEach(child => {
                const name = child.key;
                const div = document.createElement('div');
                div.className = `user-item ${name === target ? 'active' : ''}`;
                div.innerHTML = `<span>${name}</span><span class="del-contact" onclick="removeContact(event, '${name}')">×</span>`;
                div.onclick = () => selectChat(name);
                contDiv.appendChild(div);
            });
        });
    }

    async function removeContact(e, name) {
        e.stopPropagation();
        if (confirm(`Удалить ${name}?`)) await db.ref(`contacts/${me}/${name}`).remove();
    }

    function selectChat(name) {
        target = name;
        cancelAction();
        document.getElementById('chat-header').innerText = "Чат с: " + target;
        document.getElementById('input').disabled = false;
        document.getElementById('send-btn').disabled = false;
        
        const chatId = me < target ? `${me}_${target}` : `${target}_${me}`;
        db.ref(`chats/${chatId}`).off(); 
        db.ref(`chats/${chatId}`).on('value', snapshot => {
            const msgDiv = document.getElementById('messages');
            msgDiv.innerHTML = '';
            snapshot.forEach(child => {
                const m = child.val();
                const key = child.key;
                const d = document.createElement('div');
                d.className = `msg ${m.sender === me ? 'sent' : 'received'}`;
                
                let html = '';
                // Если есть ответ
                if (m.replyTo) {
                    html += `<div class="reply-quote"><b>${m.replyTo.user}:</b> ${m.replyTo.text}</div>`;
                }
                
                html += `<span>${m.text}</span>`;
                if (m.edited) html += `<span class="edited-label">(ред.)</span>`;
                
                // Кнопки действий
                html += `<div class="msg-actions">
                            <span onclick="prepareReply('${m.sender}', '${m.text.replace(/'/g, "\\'")}')">↩</span>`;
                if (m.sender === me) {
                    html += `<span onclick="prepareEdit('${key}', '${m.text.replace(/'/g, "\\'")}')">✎</span>
                             <span onclick="deleteMessage('${chatId}', '${key}')">×</span>`;
                }
                html += `</div>`;
                
                d.innerHTML = html;
                msgDiv.appendChild(d);
            });
            msgDiv.scrollTop = msgDiv.scrollHeight;
        });
    }

    // ПОДГОТОВКА К ОТВЕТУ
    function prepareReply(user, text) {
        cancelAction();
        replyData = { user, text };
        document.getElementById('action-text').innerText = `Ответ пользователю ${user}: ${text}`;
        document.getElementById('action-preview').style.display = 'flex';
        document.getElementById('input').focus();
    }

    // ПОДГОТОВКА К РЕДАКТИРОВАНИЮ
    function prepareEdit(key, text) {
        cancelAction();
        editingMsgKey = key;
        document.getElementById('action-text').innerText = `Редактирование: ${text}`;
        document.getElementById('action-preview').style.display = 'flex';
        document.getElementById('input').value = text;
        document.getElementById('input').focus();
    }

    function cancelAction() {
        editingMsgKey = null;
        replyData = null;
        document.getElementById('action-preview').style.display = 'none';
        document.getElementById('input').value = '';
    }

    async function deleteMessage(chatId, key) {
        if (confirm("Удалить?")) await db.ref(`chats/${chatId}/${key}`).remove();
    }

    function sendMessage(e) {
        e.preventDefault();
        const input = document.getElementById('input');
        const text = input.value.trim();
        if (!text || !target) return;
        const chatId = me < target ? `${me}_${target}` : `${target}_${me}`;

        if (editingMsgKey) {
            // РЕДАКТИРОВАНИЕ
            db.ref(`chats/${chatId}/${editingMsgKey}`).update({
                text: text,
                edited: true
            });
        } else {
            // ОБЫЧНАЯ ОТПРАВКА ИЛИ ОТВЕТ
            const msgObj = { sender: me, text: text, time: Date.now() };
            if (replyData) msgObj.replyTo = replyData;
            
            db.ref(`chats/${chatId}`).push(msgObj);
        }

        cancelAction();
    }
</script>
</body>
</html>
