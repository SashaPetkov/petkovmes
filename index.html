<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Petkovmes Pro Max</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: -apple-system, system-ui, sans-serif; background: #f0f2f5; overscroll-behavior-y: none; }
    body { display: flex; }
    
    /* Экран входа */
    #auth-screen { position: fixed; width: 100%; height: 100%; background: #fff; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 1000; }
    #auth-screen input, #auth-screen button { margin: 10px; padding: 12px; font-size: 16px; width: 280px; border-radius: 10px; border: 1px solid #ddd; outline: none; }
    #auth-screen button { background: #0088cc; color: #fff; font-weight: bold; cursor: pointer; border: none; }

    #app-screen { display: none; width: 100%; height: 100%; flex-direction: row; }
    
    /* Боковая панель */
    #sidebar { width: 320px; background: #fff; border-right: 1px solid #ddd; display: flex; flex-direction: column; flex-shrink: 0; }
    #search-box { padding: 15px; border-bottom: 1px solid #eee; }
    #search-box input { width: 100%; padding: 10px; border: 1px solid #eee; background: #f0f2f5; border-radius: 20px; outline: none; box-sizing: border-box; }
    #users-list { flex-grow: 1; overflow-y: auto; }
    
    .user-item { padding: 15px; cursor: pointer; border-bottom: 1px solid #f9f9f9; display: flex; align-items: center; justify-content: space-between; transition: 0.2s; }
    .user-item:hover { background: #f0f7ff; }
    .user-item.active { background: #e6f2ff; font-weight: bold; border-left: 4px solid #0088cc; }
    
    .status-dot { width: 10px; height: 10px; border-radius: 50%; background: #ccc; transition: 0.3s; }
    .status-dot.online { background: #4caf50; box-shadow: 0 0 8px #4caf50; }

    /* Область чата */
    #chat-area { flex-grow: 1; display: flex; flex-direction: column; background: #e5ddd5; position: relative; min-width: 0; }
    #chat-header { background: #fff; padding: 10px 20px; border-bottom: 1px solid #ddd; box-shadow: 0 2px 5px rgba(0,0,0,0.03); z-index: 10; }
    #chat-user-name { font-weight: bold; font-size: 17px; }
    #typing-indicator { font-size: 13px; color: #0088cc; height: 18px; font-style: italic; margin-top: 2px; }

    #messages { flex-grow: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
    .msg { max-width: 75%; padding: 10px 14px; border-radius: 15px; font-size: 15px; line-height: 1.4; position: relative; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
    .msg.sent { background: #dcf8c6; align-self: flex-end; border-bottom-right-radius: 2px; }
    .msg.received { background: #fff; align-self: flex-start; border-bottom-left-radius: 2px; }
    .msg.pending { opacity: 0.5; }

    /* Поле ввода */
    #form { background: #fff; padding: 10px 15px; display: flex; gap: 10px; align-items: center; border-top: 1px solid #ddd; }
    #input { flex-grow: 1; padding: 12px 18px; border-radius: 25px; border: 1px solid #eee; background: #f0f2f5; outline: none; font-size: 15px; }
    #send-btn { background: #0088cc; color: white; border: none; width: 42px; height: 42px; border-radius: 50%; cursor: pointer; font-size: 20px; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
    #send-btn:disabled { background: #ccc; }

    /* Адаптивность для мобилок */
    @media (max-width: 768px) {
      #app-screen { flex-direction: column; }
      #sidebar { width: 100%; height: 35%; border-right: none; }
      #chat-area { height: 65%; }
    }
  </style>
</head>
<body>

  <div id="auth-screen">
    <h1 style="color: #0088cc; margin-bottom: 5px;">Petkovmes</h1>
    <p style="color: #888; margin-bottom: 20px;">Версия 4.0 Pro Max</p>
    <input type="text" id="auth-user" placeholder="Логин">
    <input type="password" id="auth-pass" placeholder="Пароль">
    <button onclick="login()">ВОЙТИ</button>
  </div>

  <div id="app-screen">
    <div id="sidebar">
      <div id="search-box">
        <input type="text" id="search-input" placeholder="Поиск людей..." oninput="searchUsers()">
      </div>
      <div id="search-results"></div>
      <div id="users-list"></div>
    </div>
    
    <div id="chat-area">
      <div id="chat-header">
        <div id="chat-user-name">Выберите контакт</div>
        <div id="typing-indicator"></div>
      </div>
      <div id="messages"></div>
      <form id="form" onsubmit="sendMessage(event)">
        <input id="input" autocomplete="off" placeholder="Сообщение..." disabled oninput="handleTyping()"/>
        <button id="send-btn" disabled>➤</button>
      </form>
    </div>
  </div>

  <script>
    const { createClient } = supabase;
    const supabaseUrl = 'https://wicknjwuusqvbzhesrff.supabase.co';
    
    // ВСТАВЬ СВОЙ КЛЮЧ СЮДА:
    const supabaseKey = 'sb_publishable_rLixuY8xzp5R6IfHtW0qHw_o9c5tc3H'; 
    
    const db = createClient(supabaseUrl, supabaseKey);

    let currentUser = '';
    let currentChatUser = '';
    let onlineUsers = {}; 
    let msgChannel = null;
    let presenceChannel = null;
    let typingTimeout = null;

    async function login() {
      const user = document.getElementById('auth-user').value.trim();
      const pass = document.getElementById('auth-pass').value.trim();
      if (!user || !pass) return;

      const { data } = await db.from('users').select('*').eq('username', user).single();
      if (!data) {
        await db.from('users').insert([{ username: user, password: pass }]);
      } else if (data.password !== pass) {
        alert('Неверный пароль!'); return;
      }

      currentUser = user;
      document.getElementById('auth-screen').style.display = 'none';
      document.getElementById('app-screen').style.display = 'flex';
      
      loadContacts();
      setupMessagesRealtime();
      setupPresenceRealtime();
    }

    // --- REALTIME: СООБЩЕНИЯ ---
    function setupMessagesRealtime() {
      if (msgChannel) db.removeChannel(msgChannel);
      
      msgChannel = db.channel('db-messages')
        .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, payload => {
          const msg = payload.new;
          if ((msg.sender === currentChatUser && msg.receiver === currentUser) || 
              (msg.sender === currentUser && msg.receiver === currentChatUser)) {
            renderMessage(msg);
          }
        })
        .subscribe();
    }

    // --- REALTIME: СТАТУСЫ И ПЕЧАТАНИЕ ---
    function setupPresenceRealtime() {
      if (presenceChannel) db.removeChannel(presenceChannel);

      presenceChannel = db.channel('typing-and-presence', { 
        config: { presence: { key: currentUser } } 
      });

      presenceChannel
        .on('presence', { event: 'sync' }, () => {
          onlineUsers = presenceChannel.presenceState();
          loadContacts(); 
        })
        .on('broadcast', { event: 'typing' }, payload => {
          if (payload.payload.user === currentChatUser) {
            const indicator = document.getElementById('typing-indicator');
            indicator.innerText = 'печатает...';
            clearTimeout(typingTimeout);
            typingTimeout = setTimeout(() => { indicator.innerText = ''; }, 2000);
          }
        })
        .subscribe(async (status) => {
          if (status === 'SUBSCRIBED') {
            await presenceChannel.track({ user: currentUser, online_at: new Date().toISOString() });
          }
        });
    }

    function handleTyping() {
      if (presenceChannel) {
        presenceChannel.send({
          type: 'broadcast',
          event: 'typing',
          payload: { user: currentUser }
        });
      }
    }

    // --- ЛОГИКА ИНТЕРФЕЙСА ---
    async function searchUsers() {
      const q = document.getElementById('search-input').value;
      const resPanel = document.getElementById('search-results');
      if (q.length < 1) { resPanel.innerHTML = ''; return; }
      
      const { data } = await db.from('users').select('username').ilike('username', `%${q}%`).limit(5);
      resPanel.innerHTML = '';
      (data || []).forEach(u => {
        if (u.username === currentUser) return;
        const div = document.createElement('div');
        div.className = 'user-item';
        div.style.fontSize = '14px';
        div.innerHTML = `<span>${u.username}</span> <button onclick="addContact('${u.username}')" style="background:#0088cc; color:white; border:none; border-radius:15px; padding:4px 12px; cursor:pointer;">+</button>`;
        resPanel.appendChild(div);
      });
    }

    async function addContact(name) {
      await db.from('contacts').upsert([{ owner: currentUser, contact: name }], { onConflict: 'owner,contact' });
      document.getElementById('search-input').value = '';
      document.getElementById('search-results').innerHTML = '';
      loadContacts();
    }

    async function loadContacts() {
      const { data } = await db.from('contacts').select('contact').eq('owner', currentUser);
      const list = document.getElementById('users-list');
      list.innerHTML = '';
      (data || []).forEach(c => {
        const isOnline = !!onlineUsers[c.contact];
        const div = document.createElement('div');
        div.className = `user-item ${c.contact === currentChatUser ? 'active' : ''}`;
        div.innerHTML = `<span>${c.contact}</span><div class="status-dot ${isOnline ? 'online' : ''}"></div>`;
        div.onclick = () => selectChat(c.contact, div);
        list.appendChild(div);
      });
    }

    async function selectChat(username, element) {
      currentChatUser = username;
      document.getElementById('chat-user-name').innerText = username;
      document.getElementById('typing-indicator').innerText = '';
      document.getElementById('input').disabled = false;
      document.getElementById('send-btn').disabled = false;
      document.querySelectorAll('.user-item').forEach(el => el.classList.remove('active'));
      element.classList.add('active');

      const { data } = await db.from('messages')
        .select('*')
        .or(`and(sender.eq.${currentUser},receiver.eq.${currentChatUser}),and(sender.eq.${currentChatUser},receiver.eq.${currentUser})`)
        .eq('is_deleted', 0)
        .order('id', { ascending: true });
        
      document.getElementById('messages').innerHTML = '';
      (data || []).forEach(msg => renderMessage(msg));
    }

    function renderMessage(msg, isPending = false) {
      if (document.getElementById(`msg-${msg.id}`)) return;
      const div = document.createElement('div');
      div.id = `msg-${msg.id}`;
      div.className = `msg ${msg.sender === currentUser ? 'sent' : 'received'} ${isPending ? 'pending' : ''}`;
      div.innerText = msg.text;
      const messagesCont = document.getElementById('messages');
      messagesCont.appendChild(div);
      messagesCont.scrollTop = messagesCont.scrollHeight;
    }

    async function sendMessage(e) {
      e.preventDefault();
      const input = document.getElementById('input');
      const text = input.value.trim();
      if (!text || !currentChatUser) return;

      const tempId = Date.now();
      renderMessage({ id: tempId, sender: currentUser, text: text }, true);
      input.value = '';

      const { data, error } = await db.from('messages').insert([{ 
        sender: currentUser, receiver: currentChatUser, text: text 
      }]).select();

      if (!error && data[0]) {
        document.getElementById(`msg-${tempId}`)?.remove();
        renderMessage(data[0]);
      }
    }
  </script>
</body>
</html>
