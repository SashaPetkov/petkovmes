<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Petmess</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lz-string/1.4.4/lz-string.min.js"></script>
    <style>
        :root { 
            --tg-sent: #efffde; --tg-received: #ffffff; --tg-accent: #3390ec; 
            --tg-bg: #7195ba; --online: #4cc351; --glass: rgba(255, 255, 255, 0.96);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --tg-sent: #2b5278; --tg-received: #182533; --tg-accent: #5288c1;
                --tg-bg: #0e1621; --glass: rgba(24, 37, 51, 0.96);
            }
            body { color: #fff; background: #0e1621; }
            #sidebar, #chat-header, #form-container, .profile-card, #emoji-picker, #context-menu { background-color: #17212b !important; color: #fff; border-color: #0e1621 !important; }
            #input, #search-input, .modal-input, .gray-block { background: #242f3d !important; color: #fff; border-color: #101921 !important; }
            .user-item:hover, .menu-item:hover { background: #202b36 !important; }
            #chat-placeholder-box span { background: rgba(0,0,0,0.5) !important; color: #ccc !important; }
            #pinned-bar { background: rgba(23, 33, 43, 0.95); border-bottom: 1px solid #000; }
        }

        html, body { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { display: flex; background: #fff; }

        /* ВХОД */
        #auth-screen { position: fixed; inset: 0; background: #fff; display: flex; justify-content: center; align-items: center; z-index: 9000; }
        .auth-card { width: 320px; padding: 40px; text-align: center; border-radius: 30px; box-shadow: 0 20px 60px rgba(0,0,0,0.1); background: #fff; }
        .auth-title { color: var(--tg-accent); font-size: 36px; font-weight: 900; margin-bottom: 30px; }
        .auth-card input { width: 100%; padding: 14px; margin: 10px 0; border: 1px solid #eee; border-radius: 12px; outline: none; background: #f9f9f9; box-sizing: border-box; }
        .auth-card button { width: 100%; padding: 14px; background: var(--tg-accent); color: #fff; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; }

        /* ОСНОВНОЙ ЭКРАН */
        #app-screen { display: none; width: 100vw; height: 100vh; flex-direction: row; }
        
        #sidebar { width: 350px; background: #fff; border-right: 1px solid #eee; display: flex; flex-direction: column; flex-shrink: 0; z-index: 100; position: relative; }
        .sidebar-top { padding: 20px 25px 15px; display: flex; justify-content: space-between; align-items: center; }
        .sidebar-header { color: var(--tg-accent); font-size: 26px; font-weight: 900; }
        
        .group-add-btn { background: rgba(51, 144, 236, 0.1); color: var(--tg-accent); border: none; border-radius: 10px; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 24px; font-weight: bold; }

        #search-container { padding: 10px 20px 15px; position: relative; }
        #search-input { width: 100%; padding: 12px 18px; border: none; background: #f2f2f2; border-radius: 25px; outline: none; box-sizing: border-box; font-size: 14px; }
        #search-results { position: absolute; top: 60px; left: 20px; right: 20px; background: #fff; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); z-index: 500; display: none; overflow-y: auto; max-height: 250px; border: 1px solid #eee; }
        .search-item { padding: 12px 16px; cursor: pointer; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid #f5f5f5; color: #333; }

        #contacts { flex-grow: 1; overflow-y: auto; }
        .user-item { padding: 12px 20px; cursor: pointer; display: flex; align-items: center; gap: 15px; position: relative; border-bottom: 1px solid rgba(0,0,0,0.02); transition: 0.2s; }
        .user-item:hover { background: rgba(0,0,0,0.03); }
        .user-item.active { background: var(--tg-accent) !important; color: #fff !important; }
        .avatar { width: 50px; height: 50px; border-radius: 50%; object-fit: cover; background: #f0f0f0; flex-shrink: 0; }
        .status-dot { width: 12px; height: 12px; border-radius: 50%; background: #ccc; position: absolute; left: 54px; top: 46px; border: 2px solid #fff; }
        .status-dot.online { background: var(--online); }
        .del-btn { margin-left: auto; color: #ccc; font-size: 24px; opacity: 0; padding: 0 5px; transition: 0.2s; }
        .user-item:hover .del-btn { opacity: 1; }
        .del-btn:hover { color: #ff4d4d; }
        
        #my-profile { padding: 15px 20px; border-top: 1px solid #f0f0f0; display: flex; align-items: center; gap: 12px; cursor: pointer; }

        /* ЧАТ AREA */
        #chat-area { 
            flex-grow: 1; display: flex; flex-direction: column; min-width: 0; height: 100%; 
            background: var(--tg-bg) url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png') fixed center; position: relative; 
        }
        #chat-header { display: none; padding: 10px 20px; background: var(--glass); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(0,0,0,0.05); align-items: center; min-height: 60px; z-index: 200; gap: 12px; cursor: pointer; }
        #back-btn { display: none; font-size: 24px; cursor: pointer; background: none; border: none; color: var(--tg-accent); }

        #chat-placeholder-box { position: absolute; inset: 0; display: flex; justify-content: center; align-items: center; z-index: 5; pointer-events: none; }
        #chat-placeholder-box span { background: rgba(0,0,0,0.2); color: #fff; padding: 12px 28px; border-radius: 50px; font-size: 15px; }

        /* ЗАКРЕП */
        #pinned-bar { display: none; align-items: center; padding: 10px 20px; background: rgba(255,255,255,0.95); border-bottom: 1px solid rgba(0,0,0,0.08); font-size: 14px; cursor: pointer; color: var(--tg-accent); z-index: 150; height: 45px; box-sizing: border-box; }
        #pinned-content { flex-grow: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; border-left: 2px solid var(--tg-accent); padding-left: 10px; }
        #unpin-action-btn { font-size: 22px; padding: 0 5px; opacity: 0.5; color: var(--tg-accent); }

        #messages { flex-grow: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; visibility: hidden; }
        
        .msg { max-width: 75%; padding: 10px 14px 22px; border-radius: 18px; font-size: 15px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); position: relative; word-wrap: break-word; cursor: pointer; }
        .msg.sent { background: var(--tg-sent); align-self: flex-end; border-bottom-right-radius: 4px; }
        .msg.received { background: var(--tg-received); align-self: flex-start; border-bottom-left-radius: 4px; }
        .msg.highlight { background: #fff59d !important; transition: 1s ease; color: #000; }
        .msg-meta { position: absolute; right: 12px; bottom: 6px; font-size: 10px; opacity: 0.6; }

        /* ОТВЕТ В ЧАТЕ */
        .reply-box { background: rgba(0,0,0,0.05); border-left: 3px solid var(--tg-accent); padding: 5px 8px; margin-bottom: 8px; border-radius: 4px; font-size: 13px; color: #666; }

        /* ВВОД */
        #form-container { display: none; background: var(--glass); padding: 12px 18px; border-top: 1px solid rgba(0,0,0,0.05); position: relative; }
        #action-preview { display: none; padding: 10px; border-left: 4px solid var(--tg-accent); background: rgba(0,0,0,0.03); border-radius: 8px; align-items: center; margin-bottom: 8px; }
        
        #input { flex-grow: 1; min-width: 0; padding: 12px 18px; border-radius: 25px; border: 1px solid #e0e0e0; background: #f5f5f5; outline: none; font-size: 15px; }
        .action-btn { width: 44px; height: 44px; border-radius: 50%; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 20px; }
        #send-btn { background: var(--tg-accent); color: #fff; }

        #emoji-picker { display: none; position: absolute; bottom: 80px; left: 20px; background: white; border-radius: 15px; padding: 12px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); z-index: 500; width: 220px; flex-wrap: wrap; gap: 10px; justify-content: center; }
        .emoji-item { font-size: 24px; cursor: pointer; transition: 0.2s; }

        /* МОДАЛКА ПРОФИЛЯ */
        #modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(8px); display: none; justify-content: center; align-items: center; z-index: 10000; padding: 20px; }
        .profile-card { background: #fff; border-radius: 35px; width: 100%; max-width: 450px; padding: 30px; box-shadow: 0 40px 100px rgba(0,0,0,0.3); position: relative; max-height: 90vh; overflow-y: auto; }
        .modal-avatar { width: 120px; height: 120px; border-radius: 40px; object-fit: cover; margin: 0 auto 10px; display: block; border: 3px solid var(--tg-accent); cursor: pointer; }
        .modal-label { font-size: 11px; color: #aaa; text-transform: uppercase; font-weight: 700; margin-top: 15px; display: block; }
        .modal-input { border: 1px solid #eee; background: #fdfdfd; padding: 12px; border-radius: 12px; width: 100%; box-sizing: border-box; margin-top: 5px; outline: none; font-size: 14px; }
        .gray-block { background: #f8f9fa; padding: 15px; border-radius: 20px; margin-top: 15px; }
        .close-modal-btn { position: absolute; top: 15px; right: 20px; font-size: 28px; color: #aaa; cursor: pointer; }

        #context-menu { display: none; position: fixed; background: #fff; border-radius: 14px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); z-index: 9999; min-width: 170px; border: 1px solid #eee; overflow: hidden; }
        .menu-item { padding: 14px 20px; cursor: pointer; font-size: 14px; color: #333; }
        .menu-item:hover { background: #f8f9fa; }

        @media (max-width: 768px) {
            #sidebar { width: 100%; position: absolute; inset: 0; }
            #chat-area { width: 100%; position: absolute; inset: 0; transform: translateX(100%); transition: 0.3s; z-index: 150; }
            body.chat-open #chat-area { transform: translateX(0); }
            #back-btn { display: block !important; }
        }
    </style>
</head>
<body onclick="closePopups()">

<div id="auth-screen">
    <div class="auth-card">
        <div class="auth-title">Petmess</div>
        <input type="text" id="auth-user" placeholder="Логин">
        <input type="password" id="auth-pass" placeholder="Пароль">
        <button onclick="login()">Войти</button>
    </div>
</div>

<div id="app-screen">
    <div id="sidebar">
        <div class="sidebar-top">
            <span class="sidebar-header">Petmess</span>
            <button class="group-add-btn" onclick="createGroup()">+</button>
        </div>
        <div id="search-container">
            <input type="text" id="search-input" placeholder="Поиск людей..." oninput="searchUser(this.value)">
            <div id="search-results"></div>
        </div>
        <div id="contacts"></div>
        <div id="my-profile" onclick="openProfile(me)">
            <img id="my-avatar" class="avatar" src="">
            <div style="flex-grow:1;overflow:hidden;margin-left:12px;"><b id="my-name-display">...</b></div>
        </div>
    </div>

    <div id="chat-area">
        <div id="chat-placeholder-box"><span>Выберите чат, и начните общение</span></div>
        <div id="chat-header">
            <button id="back-btn" onclick="goBack(event)">←</button>
            <img id="header-avatar" class="avatar" style="width:40px;height:40px; cursor:pointer;" onclick="openProfile(targetId)">
            <div style="flex-grow:1;overflow:hidden;" onclick="openProfile(targetId)">
                <div id="header-title" style="font-weight:700"></div>
                <div id="header-subtitle" style="font-size:12px; color:#888;"></div>
            </div>
            <button id="group-invite-btn" style="display:none; padding:5px 12px; background:var(--tg-accent); color:white; border:none; border-radius:10px;" onclick="inviteToGroup()">+</button>
        </div>

        <div id="pinned-bar" onclick="jumpToPinned()">
            <div id="pinned-content">📌 <span id="pinned-text"></span></div>
            <div onclick="unpin(event)" style="font-size:20px; padding:0 10px;">×</div>
        </div>

        <div id="messages"></div>

        <div id="form-container">
            <div id="emoji-picker"></div>
            <div id="action-preview">
                <div id="action-text" style="flex-grow:1; font-size:12px;"></div>
                <div onclick="cancelAction()" style="cursor:pointer; font-size:20px;">×</div>
            </div>
            <form id="form" onsubmit="sendMessage(event)" style="display:flex; align-items:center; gap:10px;">
                <label for="chat-file" style="font-size:24px; cursor:pointer; color:#bbb;">📎</label>
                <input type="file" id="chat-file" style="display:none" accept="image/*" onchange="processFile(this)">
                <div onclick="toggleEmoji(event)" style="font-size:24px; cursor:pointer;">😊</div>
                <input id="input" autocomplete="off" placeholder="Написать сообщение...">
                <button type="submit" id="send-btn" class="action-btn">➤</button>
            </form>
        </div>
    </div>
</div>

<div id="modal-overlay" onclick="closeProfileModal()"><div class="profile-card" onclick="event.stopPropagation()" id="modal-content"></div></div>

<div id="context-menu">
    <div class="menu-item" onclick="prepareReply()">↩ Ответить</div>
    <div class="menu-item" onclick="pinMsg()">📌 Закрепить</div>
    <div class="menu-item" id="menu-edit" onclick="prepareEdit()">✎ Изменить</div>
    <div class="menu-item" id="menu-del" style="color:red;" onclick="deleteMsg()">🗑 Удалить</div>
</div>

<script>
    const firebaseConfig = {
      apiKey: "AIzaSyCydg_mccaTclSxfzfVdLFpCina4fi3LDE",
      authDomain: "petkovmes.firebaseapp.com",
      databaseURL: "https://petkovmes-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "petkovmes",
      storageBucket: "petkovmes.firebasestorage.app",
      messagingSenderId: "149469624326",
      appId: "1:149469624326:web:0c7dcabcaab15c445aeb87"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let me = '', targetId = '', isGroup = false, selectedMsg = null, editingKey = null, replyData = null;

    const compress = (v) => LZString.compressToUTF16(v);
    const decompress = (v) => LZString.decompressFromUTF16(v) || v;

    async function login() {
        const u = document.getElementById('auth-user').value.trim().toLowerCase(), p = document.getElementById('auth-pass').value.trim();
        if (!u || !p) return;
        const snap = await db.ref(`users/${u}`).once('value');
        if (snap.val() && snap.val().password !== p) return alert("Пароль неверный");
        if (!snap.val()) await db.ref(`users/${u}`).set({ password: p, nickname: u });
        me = u;
        db.ref(`status/${me}`).set('online'); db.ref(`status/${me}`).onDisconnect().set('offline');
        document.getElementById('auth-screen').style.display = 'none';
        document.getElementById('app-screen').style.display = 'flex';
        db.ref(`users/${me}`).on('value', s => { 
            const d = s.val(); if(!d) return;
            document.getElementById('my-name-display').innerText = d.nickname || me;
            document.getElementById('my-avatar').src = d.avatar || `https://robohash.org/${me}`;
        });
        loadContacts();
    }

    function selectChat(id, isGrp = false) {
        if (targetId) db.ref(getChatPath()).off();
        targetId = id; isGroup = isGrp;
        document.body.classList.add('chat-open');
        document.getElementById('chat-placeholder-box').style.display = 'none';
        document.getElementById('chat-header').style.display = 'flex';
        document.getElementById('messages').style.visibility = 'visible';
        document.getElementById('form-container').style.display = 'block';

        if (isGroup) {
            db.ref(`groups/${id}`).on('value', s => { 
                const d = s.val(); if(!d) return;
                document.getElementById('header-title').innerText = d.name; 
                document.getElementById('header-avatar').src = d.avatar || `https://robohash.org/${id}`;
            });
            document.getElementById('header-subtitle').innerText = "Групповой чат";
        } else {
            db.ref(`users/${id}`).on('value', s => { 
                const d = s.val(); if(!d) return;
                document.getElementById('header-title').innerText = d.nickname || id; 
                document.getElementById('header-avatar').src = d.avatar || `https://robohash.org/${id}`;
            });
            db.ref(`status/${id}`).on('value', s => { document.getElementById('header-subtitle').innerText = s.val() === 'online' ? 'В сети' : 'был(а) в сети недавно'; });
        }
        
        db.ref(`${isGroup ? 'groups/'+id : 'chats/'+getChatId(me,id)}/pinned`).on('value', s => {
            const bar = document.getElementById('pinned-bar');
            if(s.exists()){ bar.style.display = 'flex'; document.getElementById('pinned-text').innerText = s.val().text; }
            else bar.style.display = 'none';
        });
        loadMessages();
    }

    function loadMessages() {
        db.ref(getChatPath()).on('value', snap => {
            let html = '';
            snap.forEach(c => {
                const m = c.val(), key = c.key;
                const msgClass = `msg ${m.sender === me ? 'sent' : 'received'}`;
                let replyHTML = m.replyTo ? `<div class="reply-box" onclick="jumpToMessage('${m.replyTo.key}', event)"><b>${m.replyTo.sender}:</b><br>${m.replyTo.text}</div>` : '';
                let content = m.type === 'image' ? `<img src="${m.file}" style="max-width:100%; border-radius:10px">` : `<div>${decompress(m.text||'')}</div>`;
                html += `<div class="${msgClass}" id="msg-${key}" onclick="handleMsgClick(event, '${key}', '${m.sender}', '${decompress(m.text||'').substring(0,30)}')">
                    ${isGroup && m.sender!==me ? `<div style="font-size:11px;font-weight:bold;color:var(--tg-accent)">${m.sender}</div>` : ''}
                    ${replyHTML}${content}<div class="msg-meta">${new Date(m.time).getHours()}:${new Date(m.time).getMinutes().toString().padStart(2,'0')} ${m.edited?'(ред.)':''}</div></div>`;
            });
            const div = document.getElementById('messages'); div.innerHTML = html; div.scrollTop = div.scrollHeight;
        });
    }

    function searchUser(q) {
        const query = q.trim().toLowerCase(), res = document.getElementById('search-results');
        if (!query) { res.style.display = 'none'; return; }
        db.ref('users').once('value', snapshot => {
            res.innerHTML = ''; let found = 0;
            snapshot.forEach(child => {
                const id = child.key;
                if (id !== me && id.includes(query)) {
                    found++;
                    const d = document.createElement('div'); d.className = 'search-item';
                    d.innerHTML = `<img src="${child.val().avatar || 'https://robohash.org/'+id}" class="avatar" style="width:30px;height:30px"><b>${id}</b>`;
                    d.onclick = () => { db.ref(`contacts/${me}/${id}`).set(true); res.style.display = 'none'; selectChat(id); };
                    res.appendChild(d);
                }
            });
            res.style.display = found > 0 ? 'block' : 'none';
        });
    }

    async function createGroup() {
        const n = prompt("Название группы:"); 
        if(n) { 
            const id = 'grp_'+Date.now(); 
            await db.ref(`groups/${id}`).set({name:n, members:{[me]:true}, owner:me}); 
            await db.ref(`contacts/${me}/${id}`).set(true); 
            selectChat(id, true); 
        }
    }

    function sendMessage(e) {
        e.preventDefault(); const inp = document.getElementById('input'); if(!inp.value.trim() && !editingKey) return;
        if(editingKey) {
            db.ref(`${getChatPath()}/${editingKey}`).update({text: compress(inp.value.trim()), edited: true});
        } else {
            const o = {sender:me, text: compress(inp.value.trim()), time: Date.now(), type:'text'};
            if(replyData) o.replyTo = replyData;
            db.ref(getChatPath()).push(o);
            if(!isGroup) db.ref(`contacts/${targetId}/${me}`).set(true);
        }
        inp.value = ''; cancelAction();
    }

    function handleMsgClick(e, k, s, t) {
        e.stopPropagation(); selectedMsg = {key:k, sender:s, text:t};
        const menu = document.getElementById('context-menu'); menu.style.display = 'block';
        menu.style.left = Math.min(e.clientX, window.innerWidth - 180) + 'px';
        menu.style.top = Math.min(e.clientY, window.innerHeight - 150) + 'px';
        document.getElementById('menu-edit').style.display = (s === me) ? 'block' : 'none';
    }

    function pinMsg() { db.ref(`${isGroup ? 'groups/'+targetId : 'chats/'+getChatId(me,targetId)}/pinned`).set({key: selectedMsg.key, text: selectedMsg.text}); closePopups(); }
    function unpin(e) { e.stopPropagation(); db.ref(`${isGroup ? 'groups/'+targetId : 'chats/'+getChatId(me,targetId)}/pinned`).remove(); }
    function jumpToPinned() { db.ref(`${isGroup ? 'groups/'+targetId : 'chats/'+getChatId(me,targetId)}/pinned`).once('value', s => { jumpToMessage(s.val().key); }); }
    function jumpToMessage(key, e) { if(e) e.stopPropagation(); const el = document.getElementById(`msg-${key}`); if(el) { el.scrollIntoView({behavior:'smooth', block:'center'}); el.classList.add('highlight'); setTimeout(()=>el.classList.remove('highlight'), 2000); } }
    function deleteMsg() { if(confirm("Удалить?")) db.ref(`${getChatPath()}/${selectedMsg.key}`).remove(); closePopups(); }
    function prepareReply() { replyData = {key: selectedMsg.key, sender: selectedMsg.sender, text: selectedMsg.text}; document.getElementById('action-text').innerText = `Ответ: ${selectedMsg.text}`; document.getElementById('action-preview').style.display = 'flex'; closePopups(); }
    function prepareEdit() { editingKey = selectedMsg.key; document.getElementById('input').value = selectedMsg.text; document.getElementById('action-text').innerText = `Редактирование`; document.getElementById('action-preview').style.display = 'flex'; closePopups(); }
    function cancelAction() { replyData = null; editingKey = null; document.getElementById('action-preview').style.display = 'none'; document.getElementById('input').value = ''; }
    function closePopups() { document.getElementById('context-menu').style.display = 'none'; document.getElementById('search-results').style.display = 'none'; document.getElementById('emoji-picker').style.display = 'none'; }
    function toggleEmoji(e) { e.stopPropagation(); const p = document.getElementById('emoji-picker'); p.style.display = p.style.display === 'flex' ? 'none' : 'flex'; }
    function goBack(e) { e.stopPropagation(); document.body.classList.remove('chat-open'); }
    function getChatId(a, b) { return a < b ? a+'_'+b : b+'_'+a; }
    function getChatPath() { return isGroup ? `groups/${targetId}/messages` : `chats/${getChatId(me, targetId)}`; }
    async function removeContact(e, n) { e.stopPropagation(); if(confirm(`Удалить ${n}?`)) await db.ref(`contacts/${me}/${n}`).remove(); }
    
    function loadContacts() {
        db.ref(`contacts/${me}`).on('value', snap => {
            const div = document.getElementById('contacts'); div.innerHTML = '';
            snap.forEach(c => {
                const id = c.key, isGrp = id.startsWith('grp_');
                const item = document.createElement('div'); item.className = `user-item ${id === targetId ? 'active' : ''}`;
                item.innerHTML = `<img src="https://robohash.org/${id}" class="avatar" id="av-${id}">
                <div style="flex-grow:1;overflow:hidden"><b>${isGrp ? '👥 ' : ''}${id}</b></div>
                <span onclick="removeContact(event, '${id}')" class="del-btn">×</span>`;
                if(!isGrp) db.ref(`users/${id}/avatar`).on('value', s => { if(s.val()) document.getElementById(`av-${id}`).src = s.val(); });
                item.onclick = () => selectChat(id, isGrp); div.appendChild(item);
            });
        });
    }

    async function openProfile(uid) {
        const isMe = (uid === me), snap = await db.ref(`users/${uid}`).once('value'), d = snap.val(); if(!d) return;
        const modal = document.getElementById('modal-content');
        modal.innerHTML = `
            <img src="${d.avatar || 'https://robohash.org/'+uid}" class="modal-avatar" onclick="${isMe ? "document.getElementById('modal-upload').click()" : ""}">
            <input type="file" id="modal-upload" style="display:none" accept="image/*" onchange="processFile(this)">
            <span class="modal-label">О себе</span>
            <textarea id="m-desc" class="modal-input" style="height:60px;resize:none" ${!isMe?'disabled':''} onchange="saveProfile()">${d.description||''}</textarea>
            <div class="gray-block">
                <span style="font-size:10px; color:#aaa;">ID: @${uid}</span><br>
                <span class="modal-label">Никнейм</span>
                <input type="text" id="m-nick" class="modal-input" value="${d.nickname}" ${!isMe?'disabled':''} onchange="saveProfile()">
            </div>
            ${isMe ? `<span class="modal-label">Пароль</span><input type="password" id="m-p-old" class="modal-input" placeholder="Старый"><input type="password" id="m-p-new" class="modal-input" placeholder="Новый"><button onclick="tryPass()" style="width:100%; margin-top:10px; padding:12px; background:var(--tg-accent); color:white; border:none; border-radius:12px; cursor:pointer;">Изменить</button>` : ''}
        `;
        document.getElementById('modal-overlay').style.display = 'flex';
    }
    function closeProfileModal() { document.getElementById('modal-overlay').style.display = 'none'; }
    async function saveProfile() { await db.ref(`users/${me}`).update({ nickname: document.getElementById('m-nick').value, description: document.getElementById('m-desc').value }); }
    async function tryPass() {
        const oldP = document.getElementById('m-p-old').value, newP = document.getElementById('m-p-new').value;
        const snap = await db.ref(`users/${me}/password`).once('value');
        if(snap.val() === oldP && newP){ await db.ref(`users/${me}/password`).set(newP); alert("ОК!"); } else alert("Ошибка!");
    }
    async function processFile(input) {
        const reader = new FileReader(); reader.readAsDataURL(input.files[0]);
        reader.onload = () => {
            if(input.id === 'modal-upload') db.ref(`users/${me}/avatar`).set(reader.result);
            else db.ref(getChatPath()).push({sender:me, file:reader.result, type:'image', time:Date.now()});
        };
    }
    const emojis = ['😀','😂','😍','👍','🔥','🙏','❤️','😎','🎉','😡'];
    emojis.forEach(e => { const d = document.createElement('div'); d.className="emoji-item"; d.innerText=e; d.onclick=()=>document.getElementById('input').value+=e; document.getElementById('emoji-picker').appendChild(d); });
</script>
</body>
</html>
