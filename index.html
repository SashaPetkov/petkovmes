<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Petmess</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        :root { 
            --tg-sent: #efffde; --tg-received: #ffffff; --tg-accent: #3390ec; 
            --tg-bg: #7195ba; --online: #4cc351; --lime: #a2ff00;
            --logo-grad: linear-gradient(135deg, #3390ec, #a2ff00, #3390ec);
            --glass: rgba(255, 255, 255, 0.95);
        }

        /* ТЕМНАЯ ТЕМА */
        @media (prefers-color-scheme: dark) {
            :root {
                --tg-sent: #2b5278; --tg-received: #182533; --tg-accent: #5288c1;
                --tg-bg: #0e1621; --glass: rgba(24, 37, 51, 0.95);
            }
            body { color: #fff; background: #0e1621; }
            #sidebar, #chat-header, #form-container, .profile-card { background-color: #17212b !important; color: #fff; border-color: #0e1621 !important; }
            #input, #search-input, .modal-input { background: #242f3d !important; color: #fff; border-color: #101921 !important; }
            .user-item:hover { background: #202b36 !important; }
            #action-preview { background: #242f3d !important; }
            .sidebar-top { border-bottom: 1px solid #242f3d; }
        }

        html, body { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { display: flex; background: var(--tg-bg); }

        /* АНИМАЦИЯ БРЕНДА */
        .shimmer-text {
            background: var(--logo-grad);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 4s linear infinite;
            font-weight: 900;
        }
        @keyframes shine { to { background-position: 200% center; } }
        
        .logo-svg { filter: drop-shadow(0 2px 8px rgba(0,0,0,0.15)); }

        /* ЭКРАН ВХОДА */
        #auth-screen { position: fixed; inset: 0; background: #fff; display: flex; justify-content: center; align-items: center; z-index: 9000; }
        .auth-card { width: 320px; padding: 40px; text-align: center; border-radius: 35px; box-shadow: 0 25px 70px rgba(0,0,0,0.12); background: #fff; }
        .auth-card input { width: 100%; padding: 14px; margin: 10px 0; border: 1px solid #eee; border-radius: 14px; outline: none; background: #f9f9f9; }
        .auth-card button { width: 100%; padding: 14px; background: var(--tg-accent); color: #fff; border: none; border-radius: 14px; font-weight: bold; cursor: pointer; margin-top: 10px; }

        /* ПРИЛОЖЕНИЕ */
        #app-screen { display: none; width: 100%; height: 100%; flex-direction: row; }
        
        #sidebar { width: 320px; background: #fff; border-right: 1px solid #eee; display: flex; flex-direction: column; flex-shrink: 0; }
        .sidebar-top { display: flex; align-items: center; padding: 20px 25px 15px; gap: 10px; }
        .sidebar-header { font-size: 28px; text-transform: lowercase; }

        #search-container { padding: 10px 20px 15px; position: relative; }
        #search-input { width: 100%; padding: 12px 16px; border: none; background: #f2f2f2; border-radius: 14px; outline: none; box-sizing: border-box; }
        #search-results { position: absolute; top: 65px; left: 20px; right: 20px; background: #fff; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); z-index: 100; display: none; border: 1px solid #eee; overflow-y: auto; max-height: 250px; }
        .search-item { padding: 12px 16px; cursor: pointer; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid #f5f5f5; color: #333; }

        #contacts { flex-grow: 1; overflow-y: auto; }
        .user-item { padding: 12px 20px; cursor: pointer; display: flex; align-items: center; gap: 15px; position: relative; transition: 0.2s; }
        .user-item.active { background: var(--tg-accent) !important; color: #fff !important; }
        .avatar { width: 54px; height: 54px; border-radius: 50%; object-fit: cover; background: #f2f2f2; flex-shrink: 0; }
        .status-dot { width: 13px; height: 13px; background: #ccc; border: 2px solid #fff; border-radius: 50%; position: absolute; left: 56px; top: 46px; z-index: 2; }
        .status-dot.online { background: var(--online); }
        
        .del-btn { font-size: 24px; color: #ccc; margin-left: auto; padding: 0 5px; line-height: 1; transition: 0.2s; }
        .del-btn:hover { color: #ff4d4d; }

        #my-profile { padding: 15px 20px; border-top: 1px solid #f0f0f0; display: flex; align-items: center; gap: 12px; cursor: pointer; background: #fff; }

        /* ЧАТ */
        #chat-area { 
            flex-grow: 1; display: flex; flex-direction: column; min-width: 0; height: 100%;
            background-color: var(--tg-bg); background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png');
            background-attachment: fixed; background-size: 400px;
        }
        #chat-header { padding: 10px 20px; background: var(--glass); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(0,0,0,0.05); display: flex; align-items: center; min-height: 60px; z-index: 10; cursor: pointer; }
        #messages { flex-grow: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
        
        .msg { max-width: 75%; padding: 10px 14px 22px; border-radius: 20px; font-size: 15px; box-shadow: 0 1px 2px rgba(0,0,0,0.12); cursor: pointer; position: relative; word-wrap: break-word; }
        .msg.sent { background: var(--tg-sent); align-self: flex-end; border-bottom-right-radius: 5px; }
        .msg.received { background: var(--tg-received); align-self: flex-start; border-bottom-left-radius: 5px; }
        .msg-meta { position: absolute; right: 12px; bottom: 6px; display: flex; align-items: center; gap: 4px; font-size: 10px; opacity: 0.6; }

        /* ГОЛОСОВЫЕ */
        .voice-msg { display: flex; align-items: center; gap: 8px; min-width: 220px; padding: 5px 0; }
        .voice-msg audio { height: 35px; width: 100%; border-radius: 20px; display: block; }

        #form-container { background: var(--glass); padding: 12px 18px; border-top: 1px solid rgba(0,0,0,0.05); }
        #form { display: flex; align-items: center; gap: 10px; width: 100%; }
        #input { flex-grow: 1; min-width: 0; padding: 12px 18px; border-radius: 25px; border: 1px solid #e0e0e0; background: #f5f5f5; outline: none; font-size: 15px; }
        
        .action-btn { width: 45px; height: 45px; border-radius: 50%; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; min-width: 45px; transition: 0.2s; }
        #send-btn { background: linear-gradient(135deg, #3390ec, #2b80d0); color: #fff; font-size: 20px; box-shadow: 0 4px 10px rgba(51, 144, 236, 0.3); }
        #voice-btn { background: #f0f0f0; color: #888; font-size: 22px; }
        #voice-btn.recording { background: #ff4d4d !important; color: #fff !important; animation: v-pulse 1.5s infinite; }
        @keyframes v-pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }

        /* ОКНО ПРОФИЛЯ */
        #modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(8px); display: none; justify-content: center; align-items: center; z-index: 9999; padding: 20px; }
        .profile-card { background: #fff; border-radius: 35px; width: 100%; max-width: 580px; overflow: hidden; display: flex; flex-direction: column; box-shadow: 0 40px 100px rgba(0,0,0,0.3); }
        .profile-card-header { background: linear-gradient(135deg, #3390ec, #a2ff00); padding: 40px; display: flex; justify-content: center; position: relative; }
        .modal-avatar { width: 120px; height: 120px; border-radius: 40px; object-fit: cover; border: 5px solid #fff; cursor: pointer; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .profile-card-body { padding: 30px; display: flex; flex-direction: row; gap: 30px; }
        .modal-col { flex: 1; display: flex; flex-direction: column; gap: 15px; min-width: 0; }
        .modal-label { font-size: 11px; color: #aaa; text-transform: uppercase; font-weight: 700; letter-spacing: 1px; }
        .modal-input { border: 1px solid #eee; background: #fdfdfd; padding: 12px; border-radius: 14px; font-size: 14px; outline: none; width: 100%; box-sizing: border-box; }
        .del-acc-btn { color: #ff4d4d; font-size: 11px; text-decoration: underline; cursor: pointer; border: none; background: none; margin-top: 10px; text-align: left; }

        #context-menu { display: none; position: fixed; background: #fff; border-radius: 16px; box-shadow: 0 15px 50px rgba(0,0,0,0.2); z-index: 3000; overflow: hidden; min-width: 180px; border: 1px solid #eee; }
        .menu-item { padding: 15px 20px; cursor: pointer; font-size: 14px; color: #333; transition: 0.2s; }
        .menu-item:hover { background: #f8f9fa; }

        @media (max-width: 768px) { 
            #sidebar { width: 85px; } .user-info, #my-name-display, .sidebar-header, .profile-card-body:not(.mobile-visible) { display: none; } 
            .profile-card-body { display: flex !important; flex-direction: column; padding: 25px; }
            .status-dot { left: 52px; top: 44px; }
            #sidebar .logo-top-icon { width: 45px; height: 45px; margin: 0 auto; }
            .sidebar-top { padding: 20px 0; justify-content: center; }
            .del-btn { display: none; }
        }
    </style>
</head>
<body onclick="closeMenu()">

<svg style="position: absolute; width: 0; height: 0; overflow: hidden;">
    <defs>
        <linearGradient id="brand-grad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#3390ec"><animate attributeName="stop-color" values="#3390ec;#a2ff00;#3390ec" dur="4s" repeatCount="indefinite" /></stop>
            <stop offset="100%" stop-color="#a2ff00"><animate attributeName="stop-color" values="#a2ff00;#3390ec;#a2ff00" dur="4s" repeatCount="indefinite" /></stop>
        </linearGradient>
    </defs>
    <symbol id="icon-petmess" viewBox="0 0 100 100">
        <path d="M42 75 V38 C42 25 68 25 68 38 C68 51 42 51 42 51" fill="none" stroke="url(#brand-grad)" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M42 75 C32 75 22 68 20 58" fill="none" stroke="url(#brand-grad)" stroke-width="10" stroke-linecap="round"/>
        <path d="M40 34 L32 20 M64 34 L72 20" stroke="url(#brand-grad)" stroke-width="10" stroke-linecap="round"/>
    </symbol>
</svg>

<div id="auth-screen">
    <div class="auth-card">
        <svg width="100" height="100" class="logo-svg"><use href="#icon-petmess"/></svg>
        <h1 class="shimmer-text" style="margin: 10px 0 25px; font-size: 36px;">Petmess</h1>
        <input type="text" id="auth-user" placeholder="Логин">
        <input type="password" id="auth-pass" placeholder="Пароль">
        <button onclick="login()">Начать</button>
    </div>
</div>

<div id="app-screen">
    <div id="sidebar">
        <div class="sidebar-top">
            <span class="sidebar-header shimmer-text">petmess</span>
            <svg width="32" height="32" class="logo-top-icon"><use href="#icon-petmess"/></svg>
        </div>
        <div id="search-container"><input type="text" id="search-input" placeholder="Поиск..." oninput="searchUser(this.value)"><div id="search-results"></div></div>
        <div id="contacts"></div>
        <div id="my-profile" onclick="openProfileModal(me)">
            <img id="my-avatar" src="https://robohash.org/me" class="avatar">
            <div class="user-info" style="display:flex; flex-direction:column; overflow:hidden;">
                <span id="my-name-display" style="font-weight:bold; font-size:15px; white-space:nowrap; text-overflow:ellipsis;">...</span>
                <span style="font-size: 11px; color: #aaa;">Мой аккаунт</span>
            </div>
        </div>
    </div>

    <div id="chat-area">
        <div id="chat-header" onclick="openProfileModal(targetLogin)">
            <img id="header-avatar" class="avatar" style="width:40px; height:40px; display:none; margin-right:12px">
            <div style="display:flex; flex-direction:column;">
                <span id="header-title" style="font-weight:700; font-size:16px;">Выберите чат</span>
                <span id="header-subtitle" style="font-size: 12px; height: 14px;"></span>
            </div>
        </div>
        <div id="messages"></div>
        <div id="form-container">
            <div id="action-preview" style="display:none; padding:8px; border-left:4px solid var(--tg-accent); border-radius:8px; align-items:center; margin-bottom:8px;">
                <div id="action-text" style="flex-grow:1; font-size:13px; color:#666; overflow:hidden; text-overflow:ellipsis;"></div>
                <div onclick="cancelAction()" style="cursor:pointer; font-size:20px; padding: 0 5px;">×</div>
            </div>
            <form id="form" onsubmit="sendMessage(event)">
                <label for="chat-file" style="font-size:24px; cursor:pointer; color:#bbb; flex-shrink:0;">📎</label>
                <input type="file" id="chat-file" style="display:none" accept="image/*" onchange="processFile(this, 'chat')">
                <input id="input" autocomplete="off" placeholder="Сообщение..." disabled oninput="handleTyping()">
                <button type="button" id="voice-btn" class="action-btn" onclick="toggleVoice()" disabled>🎙</button>
                <button type="submit" id="send-btn" class="action-btn" disabled>➤</button>
            </form>
        </div>
    </div>
</div>

<div id="modal-overlay" onclick="closeProfileModal()">
    <div class="profile-card" onclick="event.stopPropagation()">
        <div class="profile-card-header">
            <img id="modal-avatar-display" src="" class="modal-avatar">
            <input type="file" id="profile-upload" style="display:none" accept="image/*" onchange="processFile(this, 'avatar')">
        </div>
        <div class="profile-card-body mobile-visible">
            <div class="modal-col">
                <div><span class="modal-label">Публичное имя</span><div id="modal-nick-container"></div></div>
                <div><span class="modal-label">Уникальный ID</span><div id="modal-login-display" style="color: var(--tg-accent); font-weight:700; margin-top:3px;"></div></div>
                <div id="modal-pass-container"></div>
            </div>
            <div class="modal-col">
                <div><span class="modal-label">О себе</span><div id="modal-desc-container" style="margin-top:5px;"></div></div>
                <button onclick="closeProfileModal()" style="margin-top:auto; padding:12px; border:none; background:var(--tg-accent); color:#fff; border-radius:14px; cursor:pointer; font-weight:600;">Закрыть</button>
            </div>
        </div>
    </div>
</div>

<div id="context-menu">
    <div class="menu-item" onclick="prepareReply()">↩ Ответить</div>
    <div class="menu-item" id="menu-edit" onclick="prepareEdit()">✎ Изменить</div>
    <div class="menu-item" id="menu-del" onclick="deleteMsg()" style="color:#e63946;">🗑 Удалить</div>
</div>

<script>
    const firebaseConfig = {
      apiKey: "AIzaSyCydg_mccaTclSxfzfVdLFpCina4fi3LDE",
      authDomain: "petkovmes.firebaseapp.com",
      databaseURL: "https://petkovmes-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "petkovmes",
      storageBucket: "petkovmes.firebasestorage.app",
      messagingSenderId: "149469624326",
      appId: "1:149469624326:web:0c7dcabcaab15c445aeb87"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let me = '', targetLogin = '', editingMsgKey = null, replyData = null, selectedMsg = null, typingTimeout;
    let mediaRecorder, audioChunks = [], isRecording = false;
    const cache = new Map();
    let typingStatus = false, onlineStatus = 'offline';

    const saveToCache = (k, d) => { try { localStorage.setItem('pm_'+k, d); } catch(e) { } };
    const getFromCache = (k) => localStorage.getItem('pm_'+k);
    const formatTime = (t) => { const d = new Date(t); return d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0'); };

    async function login() {
        const u = document.getElementById('auth-user').value.trim().toLowerCase(), p = document.getElementById('auth-pass').value.trim();
        if (!u || !p) return;
        const snap = await db.ref(`users/${u}`).once('value');
        if (snap.val() && snap.val().password !== p) { alert("Неверный пароль!"); return; }
        if (!snap.val()) await db.ref(`users/${u}`).set({ password: p, nickname: u, avatar: "", description: "" });
        me = u;
        db.ref(`status/${me}`).set('online');
        db.ref(`status/${me}`).onDisconnect().set('offline');
        document.getElementById('auth-screen').style.display = 'none';
        document.getElementById('app-screen').style.display = 'flex';
        db.ref(`users/${me}`).on('value', s => {
            const d = s.val(); if(!d) return;
            document.getElementById('my-name-display').innerText = d.nickname || me;
            if(d.avatar) document.getElementById('my-avatar').src = d.avatar;
        });
        loadContacts();
    }

    function selectChat(lid) {
        if (!lid) return;
        if (targetLogin) {
            const oldId = me < targetLogin ? `${me}_${targetLogin}` : `${targetLogin}_${me}`;
            db.ref(`chats/${oldId}`).off(); db.ref(`typing/${oldId}/${targetLogin}`).off(); db.ref(`status/${targetLogin}`).off();
        }
        targetLogin = lid;
        document.querySelectorAll('.user-item').forEach(el => el.classList.remove('active'));
        if(document.getElementById(`user-item-${lid}`)) document.getElementById(`user-item-${lid}`).classList.add('active');
        const ud = cache.get(lid) || { nickname: lid };
        document.getElementById('header-title').innerText = ud.nickname || lid;
        const hAv = document.getElementById('header-avatar');
        hAv.style.display = 'block'; hAv.src = ud.avatar || `https://robohash.org/${lid}`;
        document.getElementById('input').disabled = false; document.getElementById('send-btn').disabled = false; document.getElementById('voice-btn').disabled = false;
        
        const chatId = me < lid ? `${me}_${lid}` : `${lid}_${me}`;
        db.ref(`chats/${chatId}`).off();
        db.ref(`typing/${chatId}/${lid}`).on('value', s => { typingStatus = s.val(); updateHeaderStatusText(); });
        db.ref(`status/${lid}`).on('value', s => { onlineStatus = s.val() || 'offline'; updateHeaderStatusText(); });

        db.ref(`chats/${chatId}`).on('value', snap => {
            let fullHTML = '';
            snap.forEach(c => {
                const m = c.val(), key = c.key;
                if (m.sender === lid && m.read === false) db.ref(`chats/${chatId}/${key}/read`).set(true);
                const msgClass = `msg ${m.sender === me ? 'sent' : 'received'}`;
                let replyHTML = m.replyTo ? `<div style="border-left:3px solid var(--tg-accent);background:rgba(0,0,0,0.05);padding:5px;margin-bottom:5px;border-radius:4px;font-size:12px;color:#555;" onclick="jumpToMessage('${m.replyTo.key}')">💬 ${m.replyTo.text}</div>` : '';
                
                let contentHTML = '';
                if (m.type === 'image') {
                    let img = getFromCache(key) || m.file || "";
                    if (!getFromCache(key) && m.file) saveToCache(key, m.file);
                    contentHTML = `<img src="${img}" style="max-width:100%; border-radius:15px; display:block;">`;
                } else if (m.type === 'audio') {
                    let aud = getFromCache(key) || m.file;
                    if (!getFromCache(key) && m.file) saveToCache(key, m.file);
                    contentHTML = `<div class="voice-msg"><audio controls src="${aud}"></audio></div>`;
                } else {
                    contentHTML = `<div>${m.text}${m.edited ? '<small style="color:#888;margin-left:5px">(ред.)</small>' : ''}</div>`;
                }
                const metaHTML = `<div class="msg-meta"><span>${formatTime(m.time)}</span>${(m.sender === me && !m.read) ? '<span>👁‍🗨</span>' : ''}</div>`;
                fullHTML += `<div class="${msgClass}" id="msg-${key}" onclick="handleMsgClick(event, '${key}', '${m.sender}', '${(m.text || '[Медиа]').replace(/'/g, "\\'").replace(/"/g, '&quot;')}')">${replyHTML}${contentHTML}${metaHTML}</div>`;
            });
            document.getElementById('messages').innerHTML = fullHTML;
            document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
        });
    }

    async function toggleVoice() {
        try {
            if (!isRecording) {
                const s = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(s); audioChunks = [];
                mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
                mediaRecorder.onstop = () => {
                    const b = new Blob(audioChunks, { type: 'audio/webm' });
                    const r = new FileReader(); r.readAsDataURL(b);
                    r.onloadend = () => sendMedia(r.result, 'audio');
                };
                mediaRecorder.start(); isRecording = true;
                document.getElementById('voice-btn').classList.add('recording');
            } else { mediaRecorder.stop(); isRecording = false; document.getElementById('voice-btn').classList.remove('recording'); }
        } catch(e) { alert("Ошибка микрофона"); }
    }

    async function removeContact(e, n) { 
        e.stopPropagation(); if(confirm(`Удалить ${n}?`)) await db.ref(`contacts/${me}/${n}`).remove(); 
    }

    async function deleteAccount() {
        if(confirm("ПОЛНОЕ УДАЛЕНИЕ? Все данные исчезнут!")) {
            await db.ref(`users/${me}`).remove(); await db.ref(`contacts/${me}`).remove();
            await db.ref(`status/${me}`).remove(); location.reload();
        }
    }

    async function openProfileModal(uid) {
        if (!uid) return;
        const isMe = (uid === me), snap = await db.ref(`users/${uid}`).once('value'), d = snap.val(); if (!d) return;
        document.getElementById('modal-login-display').innerText = "@" + uid;
        document.getElementById('modal-avatar-display').src = d.avatar || `https://robohash.org/${uid}`;
        document.getElementById('modal-avatar-display').onclick = isMe ? () => document.getElementById('profile-upload').click() : null;
        const nC = document.getElementById('modal-nick-container'), dC = document.getElementById('modal-desc-container'), pC = document.getElementById('modal-pass-container');
        if (isMe) {
            nC.innerHTML = `<input type="text" id="m-nick" class="modal-input" value="${d.nickname || ''}" onchange="saveProfile()">`;
            dC.innerHTML = `<textarea id="m-desc" class="modal-input" style="height:100px; resize:none" onchange="saveProfile()">${d.description || ''}</textarea>`;
            pC.innerHTML = `<div style="margin-top:10px; padding:15px; background:rgba(0,0,0,0.03); border-radius:18px;"><span class="modal-label">Безопасность</span><input type="password" id="m-p-old" class="modal-input" style="margin-top:8px" placeholder="Старый"><input type="password" id="m-p-new" class="modal-input" style="margin-top:8px" placeholder="Новый"><button onclick="tryPass()" style="width:100%; margin-top:10px; padding:10px; background:var(--tg-accent); color:#fff; border:none; border-radius:12px; cursor:pointer;">Сменить пароль</button><br><button class="del-acc-btn" onclick="deleteAccount()">Удалить мой аккаунт</button></div>`;
        } else {
            nC.innerHTML = `<div style="font-size:18px; font-weight:bold;">${d.nickname || uid}</div>`;
            dC.innerHTML = `<div class="modal-text" style="font-size:14px; color:#555; white-space: pre-wrap;">${d.description || 'Описание отсутствует.'}</div>`;
            pC.innerHTML = '';
        }
        document.getElementById('modal-overlay').style.display = 'flex';
    }

    async function tryPass() { 
        const o = document.getElementById('m-p-old').value, n = document.getElementById('m-p-new').value; 
        const s = await db.ref(`users/${me}/password`).once('value'); 
        if(s.val() === o){ await db.ref(`users/${me}/password`).set(n); alert("ОК!"); } else alert("Ошибка!"); 
    }

    function updateHeaderStatusText() { const s = document.getElementById('header-subtitle'); if (typingStatus) { s.innerText = "печатает..."; s.style.color = "var(--tg-accent)"; } else if (onlineStatus === 'online') { s.innerText = "В сети"; s.style.color = "var(--tg-accent)"; } else { s.innerText = "Не в сети"; s.style.color = "#888"; } }
    async function saveProfile() { const n = document.getElementById('m-nick').value.trim(), d_ = document.getElementById('m-desc').value.trim(); await db.ref(`users/${me}`).update({ nickname: n, description: d_ }); }
    function closeProfileModal() { document.getElementById('modal-overlay').style.display = 'none'; }
    function handleTyping() { const id = me < targetLogin ? `${me}_${targetLogin}` : `${targetLogin}_${me}`; db.ref(`typing/${id}/${me}`).set(true); clearTimeout(typingTimeout); typingTimeout = setTimeout(() => db.ref(`typing/${id}/${me}`).set(false), 2000); }
    function sendMessage(e) { e.preventDefault(); const txt = document.getElementById('input').value.trim(); if (!txt || !targetLogin) return; const id = me < targetLogin ? `${me}_${targetLogin}` : `${targetLogin}_${me}`; if (editingMsgKey) db.ref(`chats/${id}/${editingMsgKey}`).update({ text: txt, edited: true }); else { const obj = { sender: me, text: txt, time: Date.now(), type: 'text', read: false }; if (replyData) obj.replyTo = replyData; db.ref(`chats/${id}`).push(obj); db.ref(`contacts/${targetLogin}/${me}`).set(true); } cancelAction(); }
    function sendMedia(base64, type) { const id = me < targetLogin ? `${me}_${targetLogin}` : `${targetLogin}_${me}`; db.ref(`chats/${id}`).push({ sender: me, type: type, file: base64, time: Date.now(), read: false }); db.ref(`contacts/${targetLogin}/${me}`).set(true); }
    function searchUser(q) { const query = q.trim().toLowerCase(), res = document.getElementById('search-results'); if (query.length < 1) { res.style.display = 'none'; return; } db.ref('users').once('value', snapshot => { res.innerHTML = ''; let f = 0; snapshot.forEach(child => { const lid = child.key, d = child.val(); if (lid !== me && (lid.includes(query) || (d.nickname||'').toLowerCase().includes(query))) { f++; const div = document.createElement('div'); div.className = 'search-item'; div.innerHTML = `<img src="${d.avatar || 'https://robohash.org/'+lid}" class="avatar" style="width:35px;height:35px"> <div><b>${d.nickname || lid}</b><br><small>@${lid}</small></div>`; div.onclick = () => { db.ref(`contacts/${me}/${lid}`).set(true); db.ref(`contacts/${lid}/${me}`).set(true); res.style.display='none'; selectChat(lid); }; res.appendChild(div); } }); res.style.display = f > 0 ? 'block' : 'none'; }); }
    function loadContacts() { db.ref(`contacts/${me}`).on('value', snap => { const div = document.getElementById('contacts'); div.innerHTML = ''; snap.forEach(c => { const lid = c.key, item = document.createElement('div'); item.id = `user-item-${lid}`; item.className = `user-item ${lid === targetLogin ? 'active' : ''}`; item.innerHTML = `<img src="https://robohash.org/${lid}" class="avatar" id="av-${lid}"><div class="status-dot" id="dot-${lid}"></div><div class="user-info" style="flex-grow:1; overflow:hidden"><b id="nick-${lid}">${lid}</b></div><span class="del-btn" onclick="removeContact(event, '${lid}')">×</span>`; db.ref(`users/${lid}`).on('value', s => { const d = s.val(); if(!d) return; cache.set(lid, d); if(document.getElementById(`av-${lid}`)) document.getElementById(`av-${lid}`).src = d.avatar || `https://robohash.org/${lid}`; if(document.getElementById(`nick-${lid}`)) document.getElementById(`nick-${lid}`).innerText = d.nickname || lid; }); db.ref(`status/${lid}`).on('value', s => { const dot = document.getElementById(`dot-${lid}`); if(dot) dot.className = `status-dot ${s.val()==='online'?'online':''}`; }); item.onclick = () => selectChat(lid); div.appendChild(item); }); }); }
    async function processFile(input, type) { const file = input.files[0]; if (!file) return; const reader = new FileReader(); reader.readAsDataURL(file); reader.onload = (e) => { const img = new Image(); img.src = e.target.result; img.onload = async () => { const canvas = document.createElement('canvas'); const MAX = type === 'avatar' ? 400 : 1280; let w = img.width, h = img.height; if (w > MAX || h > MAX) { if (w > h) { h *= MAX / w; w = MAX; } else { w *= MAX / h; h = MAX; } } canvas.width = w; canvas.height = h; canvas.getContext('2d').drawImage(img, 0, 0, w, h); const b64 = canvas.toDataURL('image/jpeg', 0.85); if (type === 'avatar') { await db.ref(`users/${me}/avatar`).set(b64); document.getElementById('modal-avatar-display').src = b64; } else sendMedia(b64, 'image'); }; }; }
    function jumpToMessage(key) { const el = document.getElementById(`msg-${key}`); if (el) { el.scrollIntoView({ behavior: 'smooth', block: 'center' }); el.classList.add('highlight'); setTimeout(() => el.classList.remove('highlight'), 1000); } }
    function handleMsgClick(e, key, sender, text) { if(e.target.closest('div[onclick^="jumpToMessage"]')) return; showMenu(e, key, sender, text); }
    function showMenu(e, k, s, t) { e.stopPropagation(); selectedMsg = { key: k, sender: s, text: t }; const m = document.getElementById('context-menu'); m.style.display='block'; m.style.left = Math.min(e.clientX, window.innerWidth - 180) + 'px'; m.style.top = Math.min(e.clientY, window.innerHeight - 150) + 'px'; document.getElementById('menu-edit').style.display = (s === me) ? 'block' : 'none'; document.getElementById('menu-del').style.display = (s === me) ? 'block' : 'none'; }
    function closeMenu() { document.getElementById('context-menu').style.display = 'none'; }
    function prepareReply() { cancelAction(); replyData = { key: selectedMsg.key, text: selectedMsg.text }; document.getElementById('action-text').innerText = `Ответ: ${selectedMsg.text}`; document.getElementById('action-preview').style.display = 'flex'; document.getElementById('input').focus(); }
    function prepareEdit() { cancelAction(); editingMsgKey = selectedMsg.key; document.getElementById('action-text').innerText = `Правка: ${selectedMsg.text}`; document.getElementById('action-preview').style.display = 'flex'; document.getElementById('input').value = selectedMsg.text; document.getElementById('input').focus(); }
    function cancelAction() { editingMsgKey = null; replyData = null; document.getElementById('action-preview').style.display = 'none'; document.getElementById('input').value = ''; }
    function deleteMsg() { const id = me < targetLogin ? `${me}_${targetLogin}` : `${targetLogin}_${me}`; db.ref(`chats/${id}/${selectedMsg.key}`).remove(); }
</script>
</body>
</html>
