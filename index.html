<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Petmess</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lz-string/1.4.4/lz-string.min.js"></script>
    <style>
        :root { 
            --tg-sent: #efffde; --tg-received: #ffffff; --tg-accent: #3390ec; 
            --tg-bg: #7195ba; --online: #4cc351; --glass: rgba(255, 255, 255, 0.96);
            --input-bg: #f1f3f4;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --tg-sent: #2b5278; --tg-received: #182533; --tg-accent: #5288c1;
                --tg-bg: #0e1621; --glass: rgba(24, 37, 51, 0.96);
                --input-bg: #242f3d;
            }
            body { color: #fff; background: #0e1621; }
            #sidebar, #chat-header, #form-container, .profile-card, #emoji-picker, #context-menu { background-color: #17212b !important; color: #fff; border-color: #0e1621 !important; }
            #input, #search-input { background: #242f3d !important; color: #fff; border-color: #101921 !important; }
            .modal-input { background: #1c2732 !important; color: #fff; border-color: #2b3948 !important; }
            .gray-block { background: #242f3d !important; border: 1px solid #101921; }
            .user-item:hover, .menu-item:hover { background: #202b36 !important; }
            #chat-placeholder-box span { background: rgba(0,0,0,0.5) !important; }
        }

        html, body { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        
        /* ГЛАВНЫЙ ЭКРАН */
        #app-screen { display: none; width: 100vw; height: 100vh; flex-direction: row; position: fixed; top: 0; left: 0; }
        #sidebar { width: 350px; background: #fff; border-right: 1px solid #eee; display: flex; flex-direction: column; flex-shrink: 0; z-index: 100; position: relative; }
        #chat-area { flex: 1; display: flex; flex-direction: column; min-width: 0; height: 100%; background: var(--tg-bg) url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png') fixed center; position: relative; }

        /* ВХОД - ПОЛНЫЙ ФИКС */
        #auth-screen { position: fixed; inset: 0; background: #fff; display: flex; justify-content: center; align-items: center; z-index: 9999; }
        .auth-card { width: 320px; padding: 40px; text-align: center; border-radius: 30px; box-shadow: 0 20px 60px rgba(0,0,0,0.1); background: #fff; }
        .auth-title { color: var(--tg-accent); font-size: 36px; font-weight: 900; margin-bottom: 25px; letter-spacing: -1px; }
        .auth-card input { width: 100%; padding: 14px; margin: 8px 0; border: 1.5px solid #eee; border-radius: 12px; outline: none; background: #f9f9f9; box-sizing: border-box; font-size: 15px; }
        .auth-card button { width: 100%; padding: 14px; background: var(--tg-accent); color: #fff; border: none; border-radius: 12px; font-weight: 700; cursor: pointer; margin-top: 15px; }

        /* САЙДБАР */
        .sidebar-top { padding: 20px 25px 10px; display: flex; justify-content: space-between; align-items: center; }
        .sidebar-header { color: var(--tg-accent); font-size: 28px; font-weight: 900; letter-spacing: -0.5px; }
        .group-add-btn { background: rgba(51, 144, 236, 0.1); color: var(--tg-accent); border: none; border-radius: 10px; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 24px; font-weight: bold; }

        /* ПОИСК - ФИКС */
        #search-container { padding: 10px 20px; position: relative; }
        #search-input { width: 100%; padding: 12px 18px; border: 1.5px solid transparent; background: var(--input-bg); border-radius: 25px; outline: none; box-sizing: border-box; }
        #search-results { position: absolute; top: 60px; left: 20px; right: 20px; background: #fff; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); z-index: 500; display: none; overflow-y: auto; max-height: 300px; border: 1px solid #eee; }
        .search-item { padding: 12px 15px; cursor: pointer; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid #f5f5f5; }

        #contacts { flex-grow: 1; overflow-y: auto; }
        .user-item { padding: 12px 20px; cursor: pointer; display: flex; align-items: center; gap: 15px; position: relative; border-bottom: 1px solid rgba(0,0,0,0.02); }
        .user-item.active { background: var(--tg-accent) !important; color: #fff !important; }
        
        /* КРУЖОК ОНЛАЙНА - ФИКС */
        .avatar-wrapper { position: relative; width: 50px; height: 50px; flex-shrink: 0; }
        .avatar { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; background: #f0f0f0; }
        .status-dot { width: 13px; height: 13px; border-radius: 50%; background: #ccc; position: absolute; bottom: 0; right: 0; border: 2.5px solid #fff; }
        .status-dot.online { background: var(--online); }
        
        .del-btn { margin-left: auto; color: #ccc; font-size: 24px; opacity: 0; padding: 0 5px; transition: 0.2s; cursor: pointer; }
        .user-item:hover .del-btn { opacity: 1; }

        #my-profile { padding: 15px 20px; border-top: 1px solid #f0f0f0; display: flex; align-items: center; gap: 12px; cursor: pointer; background: #fff; }

        /* ЧАТ */
        #messages { flex-grow: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; visibility: hidden; }
        
        /* СООБЩЕНИЯ С АВАТАРКАМИ */
        .msg-row { display: flex; align-items: flex-end; gap: 8px; max-width: 85%; }
        .msg-row.sent { align-self: flex-end; flex-direction: row-reverse; }
        .msg-row.received { align-self: flex-start; }
        
        .msg-mini-avatar { width: 32px; height: 32px; border-radius: 50%; object-fit: cover; flex-shrink: 0; background: #eee; }
        
        .msg { padding: 10px 14px 22px; border-radius: 18px; font-size: 15px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); position: relative; word-wrap: break-word; }
        .sent .msg { background: var(--tg-sent); border-bottom-right-radius: 4px; }
        .received .msg { background: var(--tg-received); border-bottom-left-radius: 4px; }
        
        .msg.highlight { animation: highlight-flash 2s ease; }
        @keyframes highlight-flash { 0% { background: #fff59d; } 100% { } }

        /* ОСТАЛЬНОЕ */
        .reply-box { background: rgba(0,0,0,0.04); border-left: 3px solid var(--tg-accent); padding: 5px 8px; margin-bottom: 5px; border-radius: 5px; font-size: 13px; }
        .msg-meta { position: absolute; right: 10px; bottom: 5px; font-size: 10px; opacity: 0.5; }
        .modal-input { border: 1.5px solid #eee; background: #fdfdfd; padding: 12px; border-radius: 14px; width: 100%; box-sizing: border-box; margin-top: 8px; outline: none; transition: 0.3s; }
        .gray-block { background: #f8f9fa; padding: 15px; border-radius: 20px; margin-top: 15px; }

        #context-menu { display: none; position: fixed; background: #fff; border-radius: 15px; box-shadow: 0 10px 40px rgba(0,0,0,0.15); z-index: 9999; min-width: 170px; border: 1px solid #eee; overflow: hidden; }
        .menu-item { padding: 12px 18px; cursor: pointer; font-size: 14px; }

        @media (max-width: 768px) {
            #sidebar { width: 100%; position: absolute; inset: 0; transition: 0.3s; }
            #chat-area { width: 100%; position: absolute; inset: 0; transform: translateX(100%); transition: 0.3s; z-index: 150; }
            body.chat-open #chat-area { transform: translateX(0); }
            #back-btn { display: block !important; }
        }
    </style>
</head>
<body onclick="closePopups()">

<div id="auth-screen">
    <div class="auth-card">
        <div class="auth-title">Petmess</div>
        <input type="text" id="auth-user" placeholder="Логин">
        <input type="password" id="auth-pass" placeholder="Пароль">
        <button onclick="login()">Войти</button>
    </div>
</div>

<div id="app-screen">
    <div id="sidebar">
        <div class="sidebar-top">
            <span class="sidebar-header">Petmess</span>
            <button class="group-add-btn" onclick="createGroup()">+</button>
        </div>
        <div id="search-container">
            <input type="text" id="search-input" placeholder="Найти пользователя..." oninput="searchUser(this.value)">
            <div id="search-results"></div>
        </div>
        <div id="contacts"></div>
        <div id="my-profile" onclick="openProfile(me)">
            <img id="my-avatar" class="avatar" style="width:50px;height:50px;border-radius:50%">
            <div style="flex-grow:1;overflow:hidden;margin-left:12px;"><b id="my-name-display">...</b></div>
        </div>
    </div>

    <div id="chat-area">
        <div id="chat-placeholder-box"><span>Выберите чат, и начните общение</span></div>
        <div id="chat-header">
            <button id="back-btn" onclick="goBack(event)" style="display:none; font-size:24px; border:none; background:none; color:var(--tg-accent);">←</button>
            <img id="header-avatar" class="avatar" style="width:40px;height:40px; cursor:pointer;" onclick="openProfile(targetId)">
            <div style="flex-grow:1;overflow:hidden; margin-left: 10px;" onclick="openProfile(targetId)">
                <div id="header-title" style="font-weight:700"></div>
                <div id="header-subtitle" style="font-size:12px; color:#888;"></div>
            </div>
            <button id="group-invite-btn" style="display:none; padding:5px 12px; background:var(--tg-accent); color:white; border:none; border-radius:10px; font-weight:bold;" onclick="inviteToGroup(event)">+</button>
        </div>
        <div id="pinned-bar" style="display:none; align-items:center; padding:10px 20px; background:rgba(255,255,255,0.9); border-bottom:1px solid #eee; font-size:14px; cursor:pointer; color:var(--tg-accent); z-index:150;" onclick="jumpToPinned()">
            <div style="flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">📌 <span id="pinned-text"></span></div>
            <div onclick="unpin(event)" style="font-size:20px; margin-left:10px;">×</div>
        </div>
        <div id="messages"></div>
        <div id="form-container" style="padding:15px; border-top:1px solid rgba(0,0,0,0.05); background:var(--glass);">
            <div id="emoji-picker" style="display:none; position:absolute; bottom:80px; left:20px; background:white; padding:10px; border-radius:15px; box-shadow:0 5px 20px rgba(0,0,0,0.1); z-index:100; flex-wrap:wrap; width:200px; gap:8px;"></div>
            <div id="action-preview" style="display:none; padding:8px; border-left:4px solid var(--tg-accent); background:rgba(0,0,0,0.03); margin-bottom:8px; border-radius:8px; align-items:center;"><div id="action-text" style="flex-grow:1; font-size:12px;"></div><div onclick="cancelAction()" style="cursor:pointer; font-size:20px;">×</div></div>
            <form id="form" onsubmit="sendMessage(event)" style="display:flex; align-items:center; gap:12px;">
                <label for="chat-file" style="font-size:24px; cursor:pointer; color:#bbb;">📎</label>
                <input type="file" id="chat-file" style="display:none" accept="image/*" onchange="processFile(this)">
                <div onclick="toggleEmoji(event)" style="font-size:24px; cursor:pointer;">😊</div>
                <input id="input" autocomplete="off" placeholder="Написать сообщение..." oninput="handleTyping()">
                <button type="submit" id="send-btn" class="action-btn" style="background:var(--tg-accent); color:white; border:none; border-radius:50%; width:44px; height:44px; cursor:pointer;">➤</button>
            </form>
        </div>
    </div>
</div>

<div id="modal-overlay" onclick="closeProfileModal()"><div class="profile-card" onclick="event.stopPropagation()" id="modal-content"></div></div>

<div id="context-menu">
    <div class="menu-item" onclick="prepareReply()">↩ Ответить</div>
    <div class="menu-item" onclick="pinMsg()">📌 Закрепить</div>
    <div class="menu-item" id="menu-edit" onclick="prepareEdit()">✎ Изменить</div>
    <div class="menu-item" id="menu-del" style="color:red;" onclick="deleteMsg()">🗑 Удалить</div>
</div>

<script>
    const firebaseConfig = {
      apiKey: "AIzaSyCydg_mccaTclSxfzfVdLFpCina4fi3LDE",
      authDomain: "petkovmes.firebaseapp.com",
      databaseURL: "https://petkovmes-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "petkovmes",
      storageBucket: "petkovmes.firebasestorage.app",
      messagingSenderId: "149469624326",
      appId: "1:149469624326:web:0c7dcabcaab15c445aeb87"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let me = '', targetId = '', isGroup = false, selectedMsg = null, editingKey = null, replyData = null, avatarCache = {};
    let typingStatus = false, onlineStatus = 'offline', typingTimeout;

    const compress = (v) => LZString.compressToUTF16(v);
    const decompress = (v) => LZString.decompressFromUTF16(v) || v;

    async function login() {
        const u = document.getElementById('auth-user').value.trim().toLowerCase(), p = document.getElementById('auth-pass').value.trim();
        if (!u || !p) return;
        const snap = await db.ref(`users/${u}`).once('value');
        if (snap.val() && snap.val().password !== p) return alert("Неверный пароль");
        if (!snap.val()) await db.ref(`users/${u}`).set({ password: p, nickname: u, avatar: "" });
        me = u;
        db.ref(`status/${me}`).set('online'); db.ref(`status/${me}`).onDisconnect().set('offline');
        document.getElementById('auth-screen').style.display = 'none'; document.getElementById('app-screen').style.display = 'flex';
        db.ref(`users/${me}`).on('value', s => { 
            const d = s.val(); if(d){ document.getElementById('my-name-display').innerText = d.nickname || me; document.getElementById('my-avatar').src = d.avatar || `https://robohash.org/${me}`; }
        });
        loadContacts();
    }

    function searchUser(v) {
        const q = v.trim().toLowerCase(); if(!q){ document.getElementById('search-results').style.display='none'; return; }
        db.ref('users').once('value', s => {
            let h = ''; s.forEach(c => { if(c.key!==me && c.key.includes(q)) h += `<div class='search-item' onclick="db.ref('contacts/${me}/${c.key}').set(true); selectChat('${c.key}'); document.getElementById('search-results').style.display='none';"><b>${c.key}</b></div>`; });
            document.getElementById('search-results').innerHTML = h; document.getElementById('search-results').style.display = h?'block':'none';
        });
    }

    function selectChat(id, isGrp = false) {
        if (targetId) { db.ref(getChatPath()+'/messages').off(); db.ref(getPinnedPath()).off(); }
        targetId = id; isGroup = isGrp;
        document.body.classList.add('chat-open');
        document.getElementById('chat-placeholder-box').style.display = 'none';
        document.getElementById('chat-header').style.display = 'flex';
        document.getElementById('messages').style.visibility = 'visible';
        document.getElementById('form-container').style.display = 'block';

        if (isGroup) {
            db.ref(`groups/${id}`).on('value', s => { 
                const d = s.val(); if(!d) return; document.getElementById('header-title').innerText = d.name; 
                document.getElementById('header-avatar').src = d.avatar || `https://robohash.org/${id}`;
                document.getElementById('header-subtitle').innerText = "Группа";
                document.getElementById('group-invite-btn').style.display = (d.owner===me || (d.admins && d.admins[me])) ? 'block' : 'none';
            });
        } else {
            db.ref(`users/${id}`).on('value', s => { 
                const d = s.val(); if(!d) return; document.getElementById('header-title').innerText = d.nickname || id; 
                document.getElementById('header-avatar').src = d.avatar || `https://robohash.org/${id}`;
            });
            db.ref(`status/${id}`).on('value', s => { 
                const online = s.val() === 'online';
                document.getElementById('header-subtitle').innerText = online ? 'В сети' : 'был(а) в сети недавно';
                document.getElementById('header-subtitle').style.color = online ? 'var(--tg-accent)' : '#888';
            });
        }
        loadMessages();
    }

    function loadMessages() {
        db.ref(getChatPath()+'/messages').on('value', async snap => {
            let html = '';
            const messages = []; snap.forEach(c => { messages.push({key: c.key, ...c.val()}); });
            
            for (let m of messages) {
                const msgClass = m.sender === me ? 'sent' : 'received';
                const data = m.type === 'text' ? decompress(m.text) : m.file;
                let reply = m.replyTo ? `<div class="reply-box"><b>${m.replyTo.sender}</b>${m.replyTo.text}</div>` : '';
                let content = m.type === 'image' ? `<img src="${data}" style="max-width:100%; border-radius:10px">` : `<div>${data}</div>`;
                
                let avatarHTML = '';
                if (m.sender !== me) {
                    const av = avatarCache[m.sender] || `https://robohash.org/${m.sender}`;
                    avatarHTML = `<img src="${av}" class="msg-mini-avatar" onclick="openProfile('${m.sender}')">`;
                }

                html += `<div class="msg-row ${msgClass}" id="msg-${m.key}">
                    ${avatarHTML}
                    <div class="msg" onclick="handleMsgClick(event, '${m.key}', '${m.sender}', '${(data||'').substring(0,30)}')">
                        ${isGroup && m.sender!==me ? `<div style="font-size:11px;font-weight:bold;color:var(--tg-accent);margin-bottom:4px;">${m.sender}</div>` : ''}
                        ${reply}${content}
                        <div class="msg-meta">${new Date(m.time).getHours()}:${new Date(m.time).getMinutes().toString().padStart(2,'0')}</div>
                    </div>
                </div>`;
            }
            const div = document.getElementById('messages'); div.innerHTML = html; div.scrollTop = div.scrollHeight;
        });
    }

    function handleMsgClick(e, k, s, t) {
        e.stopPropagation(); selectedMsg={key:k, sender:s, text:t};
        const menu=document.getElementById('context-menu'); menu.style.display='block';
        menu.style.left=e.clientX+'px'; menu.style.top=e.clientY+'px';
        document.getElementById('menu-edit').style.display=(s===me)?'block':'none';
    }

    function loadContacts() {
        db.ref(`contacts/${me}`).on('value', snap => {
            const div = document.getElementById('contacts'); div.innerHTML = '';
            snap.forEach(c => {
                const id = c.key, isGrp = id.startsWith('grp_');
                const item = document.createElement('div'); item.className=`user-item ${id === targetId ? 'active' : ''}`;
                item.innerHTML = `
                    <div class="avatar-wrapper">
                        <img src="https://robohash.org/${id}" class="avatar" id="av-${id}">
                        <div class="status-dot" id="dot-${id}" style="${isGrp?'display:none':''}"></div>
                    </div>
                    <div style="flex-grow:1;overflow:hidden"><b>${isGrp ? '👥 ' : ''}${id}</b></div>
                    <span class="del-btn" onclick="removeContact(event,'${id}')">×</span>`;
                
                if(!isGrp) {
                    db.ref('users/'+id).on('value', s => { if(s.val() && s.val().avatar) { document.getElementById('av-'+id).src=s.val().avatar; avatarCache[id] = s.val().avatar; } });
                    db.ref('status/'+id).on('value', s => { if(document.getElementById('dot-'+id)) document.getElementById('dot-'+id).className = `status-dot ${s.val()==='online'?'online':''}`; });
                }
                item.onclick=()=>selectChat(id,isGrp); div.appendChild(item);
            });
        });
    }

    // Системные функции
    function sendMessage(e) { e.preventDefault(); const i = document.getElementById('input'); if(!i.value.trim() && !editingKey) return; if(editingKey){ db.ref(getChatPath()+'/messages/'+editingKey).update({text:compress(i.value.trim()), edited:true}); } else { const o={sender:me, text:compress(i.value.trim()), time:Date.now(), type:'text'}; if(replyData) o.replyTo=replyData; db.ref(getChatPath()+'/messages').push(o); if(!isGroup) db.ref(`contacts/${targetId}/${me}`).set(true); } i.value=''; cancelAction(); }
    function closePopups() { document.getElementById('context-menu').style.display='none'; document.getElementById('emoji-picker').style.display='none'; }
    function toggleEmoji(e) { e.stopPropagation(); const p=document.getElementById('emoji-picker'); p.style.display=p.style.display==='flex'?'none':'flex'; }
    function goBack(e) { e.stopPropagation(); document.body.classList.remove('chat-open'); }
    function getChatPath() { return isGroup ? `groups/${targetId}` : `chats/${me < targetId ? me+'_'+targetId : targetId+'_'+me}`; }
    function getPinnedPath() { return getChatPath() + '/pinned'; }
    function getChatId(a, b) { return a < b ? a+'_'+b : b+'_'+a; }
    async function createGroup() { const n = prompt("Имя группы:"); if(n){ const id='grp_'+Date.now(); await db.ref(`groups/${id}`).set({name:n, owner:me, members:{[me]:true}}); await db.ref(`contacts/${me}/${id}`).set(true); selectChat(id,true); } }
    async function removeContact(e, n) { e.stopPropagation(); if(confirm(`Удалить ${n}?`)) await db.ref(`contacts/${me}/${n}`).remove(); }
    async function openProfile(uid) { /* Профиль как в прошлых версиях */ }
</script>
</body>
</html>
