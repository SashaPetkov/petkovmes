<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Petkovmes Final Build</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        :root {
            --tg-sent: #efffde;
            --tg-received: #ffffff;
            --tg-accent: #3390ec;
            --tg-bg: #7195ba;
        }

        html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: -apple-system, system-ui, sans-serif; }
        body { display: flex; background: var(--tg-bg); }
        
        /* Авторизация */
        #auth-screen { position: fixed; inset: 0; background: white; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 1000; }
        .auth-card { width: 300px; padding: 20px; text-align: center; }
        .auth-card input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; outline: none; }
        .auth-card button { width: 100%; padding: 12px; background: var(--tg-accent); color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }

        #app-screen { display: none; width: 100%; height: 100%; flex-direction: row; }
        
        /* Боковая панель */
        #sidebar { width: 300px; background: white; border-right: 1px solid #ddd; display: flex; flex-direction: column; flex-shrink: 0; }
        #search-container { padding: 10px; border-bottom: 1px solid #f0f0f0; }
        #search-input { width: 100%; padding: 10px; border: none; background: #f1f1f1; border-radius: 10px; outline: none; box-sizing: border-box; }
        
        #contacts { flex-grow: 1; overflow-y: auto; }
        .user-item { 
            padding: 12px 15px; cursor: pointer; border-bottom: 1px solid #f0f0f0; 
            display: flex; justify-content: space-between; align-items: center; position: relative;
        }
        .user-item:hover { background: #f4f4f4; }
        .user-item.active { background: var(--tg-accent); color: white; }
        .user-item span { flex-grow: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        
        /* Крестик удаления контакта */
        .del-contact { display: none; font-size: 20px; color: #ccc; padding: 0 5px; line-height: 1; }
        .user-item:hover .del-contact { display: block; }
        .del-contact:hover { color: #ff5252; }

        /* Чат */
        #chat-area { 
            flex-grow: 1; display: flex; flex-direction: column; min-width: 0; 
            background: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); 
            background-size: contain; position: relative; 
        }
        #chat-header { padding: 12px 20px; background: white; border-bottom: 1px solid #ddd; font-weight: bold; }
        #messages { flex-grow: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 4px; }
        
        .msg { 
            max-width: 85%; padding: 8px 12px; border-radius: 15px; font-size: 15px; 
            position: relative; box-shadow: 0 1px 2px rgba(0,0,0,0.1); line-height: 1.4; cursor: pointer; 
        }
        .msg.sent { background: var(--tg-sent); align-self: flex-end; border-bottom-right-radius: 4px; }
        .msg.received { background: var(--tg-received); align-self: flex-start; border-bottom-left-radius: 4px; }
        
        /* Всплывающее меню сообщений */
        #context-menu {
            display: none; position: fixed; background: white; border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2); z-index: 2000; min-width: 160px; overflow: hidden;
        }
        .menu-item { padding: 12px 16px; cursor: pointer; font-size: 14px; display: flex; align-items: center; gap: 12px; color: #333; }
        .menu-item:hover { background: #f0f2f5; }
        .menu-item i { font-style: normal; font-size: 18px; }

        /* Ответ внутри облачка */
        .reply-quote { border-left: 3px solid var(--tg-accent); background: rgba(51, 144, 236, 0.1); padding: 4px 8px; margin-bottom: 5px; border-radius: 4px; font-size: 13px; }
        .reply-quote b { color: var(--tg-accent); display: block; font-size: 11px; }

        /* Ввод сообщения */
        #form-container { background: white; padding: 10px; display: flex; flex-direction: column; }
        #action-preview { background: white; padding: 8px 15px; border-top: 1px solid #ddd; display: none; align-items: center; border-left: 4px solid var(--tg-accent); }
        #form { display: flex; gap: 10px; align-items: center; }
        #input { flex-grow: 1; padding: 12px 18px; border-radius: 25px; border: 1px solid #ddd; outline: none; font-size: 16px; }
        #send-btn { background: var(--tg-accent); color: white; border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; font-size: 20px; display: flex; align-items: center; justify-content: center; }

        @media (max-width: 768px) { #sidebar { width: 70px; } .user-item span:first-child { display: none; } }
    </style>
</head>
<body onclick="closeMenu()">

<div id="auth-screen">
    <div class="auth-card">
        <h2 style="color: var(--tg-accent);">Petkovmes</h2>
        <input type="text" id="auth-user" placeholder="Логин">
        <input type="password" id="auth-pass" placeholder="Пароль">
        <button onclick="login()">Войти</button>
        <p id="auth-error" style="color: red; font-size: 12px;"></p>
    </div>
</div>

<div id="app-screen">
    <div id="sidebar">
        <div id="search-container"><input type="text" id="search-input" placeholder="Ник друга + Enter" onkeydown="if(event.key==='Enter') searchUser()"></div>
        <div id="contacts"></div>
    </div>
    <div id="chat-area">
        <div id="chat-header">Выберите чат</div>
        <div id="messages"></div>
        <div id="form-container">
            <div id="action-preview">
                <div id="action-text" style="flex-grow:1; font-size:12px; color:#555; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;"></div>
                <div onclick="cancelAction()" style="cursor:pointer; font-size:24px; margin-left:10px;">×</div>
            </div>
            <form id="form" onsubmit="sendMessage(event)">
                <input id="input" autocomplete="off" placeholder="Сообщение..." disabled>
                <button id="send-btn" disabled>➤</button>
            </form>
        </div>
    </div>
</div>

<div id="context-menu">
    <div class="menu-item" onclick="prepareReplyFromMenu()"><i>↩</i> Ответить</div>
    <div class="menu-item" id="menu-edit" onclick="prepareEditFromMenu()"><i>✎</i> Изменить</div>
    <div class="menu-item" id="menu-del" onclick="deleteFromMenu()" style="color: #e53935;"><i>🗑</i> Удалить</div>
</div>

<script>
    const firebaseConfig = {
      apiKey: "AIzaSyCydg_mccaTclSxfzfVdLFpCina4fi3LDE",
      authDomain: "petkovmes.firebaseapp.com",
      databaseURL: "https://petkovmes-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "petkovmes",
      storageBucket: "petkovmes.firebasestorage.app",
      messagingSenderId: "149469624326",
      appId: "1:149469624326:web:0c7dcabcaab15c445aeb87"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let me = '', target = '', editingMsgKey = null, replyData = null, selectedMsg = null;

    async function login() {
        const u = document.getElementById('auth-user').value.trim().toLowerCase();
        const p = document.getElementById('auth-pass').value.trim();
        if (!u || !p) return;
        const snapshot = await db.ref(`users/${u}`).once('value');
        const userData = snapshot.val();
        if (userData) {
            if (userData.password === p) startApp(u);
            else document.getElementById('auth-error').innerText = "Неверный пароль!";
        } else {
            await db.ref(`users/${u}`).set({ password: p });
            startApp(u);
        }
    }

    function startApp(username) {
        me = username;
        document.getElementById('auth-screen').style.display = 'none';
        document.getElementById('app-screen').style.display = 'flex';
        loadContacts();
    }

    async function searchUser() {
        const q = document.getElementById('search-input').value.trim().toLowerCase();
        if (!q || q === me) return;
        const snapshot = await db.ref(`users/${q}`).once('value');
        if (snapshot.exists()) {
            await db.ref(`contacts/${me}/${q}`).set(true);
            await db.ref(`contacts/${q}/${me}`).set(true);
            document.getElementById('search-input').value = '';
        } else { alert("Пользователь не найден!"); }
    }

    function loadContacts() {
        db.ref(`contacts/${me}`).on('value', snapshot => {
            const contDiv = document.getElementById('contacts');
            contDiv.innerHTML = '';
            snapshot.forEach(child => {
                const name = child.key;
                const div = document.createElement('div');
                div.className = `user-item ${name === target ? 'active' : ''}`;
                div.innerHTML = `<span>${name}</span><span class="del-contact" onclick="removeContact(event, '${name}')">×</span>`;
                div.onclick = () => selectChat(name);
                contDiv.appendChild(div);
            });
        });
    }

    async function removeContact(e, name) {
        e.stopPropagation();
        if (confirm(`Удалить контакт ${name}?`)) {
            await db.ref(`contacts/${me}/${name}`).remove();
            if (target === name) {
                target = '';
                document.getElementById('messages').innerHTML = '';
                document.getElementById('chat-header').innerText = 'Выберите чат';
                document.getElementById('input').disabled = true;
                document.getElementById('send-btn').disabled = true;
                cancelAction();
            }
        }
    }

    function selectChat(name) {
        target = name;
        cancelAction();
        document.getElementById('chat-header').innerText = target;
        document.getElementById('input').disabled = false;
        document.getElementById('send-btn').disabled = false;
        
        const chatId = me < target ? `${me}_${target}` : `${target}_${me}`;
        db.ref(`chats/${chatId}`).off(); 
        db.ref(`chats/${chatId}`).on('value', snapshot => {
            const msgDiv = document.getElementById('messages');
            msgDiv.innerHTML = '';
            snapshot.forEach(child => {
                const m = child.val();
                const key = child.key;
                const d = document.createElement('div');
                d.className = `msg ${m.sender === me ? 'sent' : 'received'}`;
                
                let content = m.replyTo ? `<div class="reply-quote"><b>${m.replyTo.user}</b>${m.replyTo.text}</div>` : '';
                content += `<div>${m.text}${m.edited ? '<small style="color:#888;margin-left:5px">(ред.)</small>' : ''}</div>`;
                
                d.innerHTML = content;
                d.onclick = (e) => showMenu(e, key, m.sender, m.text);
                msgDiv.appendChild(d);
            });
            msgDiv.scrollTop = msgDiv.scrollHeight;
        });
        loadContacts();
    }

    function showMenu(e, key, sender, text) {
        e.stopPropagation();
        selectedMsg = { key, sender, text };
        const menu = document.getElementById('context-menu');
        menu.style.display = 'block';
        menu.style.left = Math.min(e.clientX, window.innerWidth - 180) + 'px';
        menu.style.top = Math.min(e.clientY, window.innerHeight - 150) + 'px';
        const isMine = (sender === me);
        document.getElementById('menu-edit').style.display = isMine ? 'flex' : 'none';
        document.getElementById('menu-del').style.display = isMine ? 'flex' : 'none';
    }

    function closeMenu() { document.getElementById('context-menu').style.display = 'none'; }

    function prepareReplyFromMenu() {
        cancelAction();
        replyData = { user: selectedMsg.sender, text: selectedMsg.text };
        document.getElementById('action-text').innerText = `Ответ: ${selectedMsg.text}`;
        document.getElementById('action-preview').style.display = 'flex';
        document.getElementById('input').focus();
    }

    function prepareEditFromMenu() {
        cancelAction();
        editingMsgKey = selectedMsg.key;
        document.getElementById('action-text').innerText = `Правка: ${selectedMsg.text}`;
        document.getElementById('action-preview').style.display = 'flex';
        document.getElementById('input').value = selectedMsg.text;
        document.getElementById('input').focus();
    }

    async function deleteFromMenu() {
        if (confirm("Удалить сообщение?")) {
            const chatId = me < target ? `${me}_${target}` : `${target}_${me}`;
            await db.ref(`chats/${chatId}/${selectedMsg.key}`).remove();
        }
    }

    function cancelAction() {
        editingMsgKey = null; replyData = null;
        document.getElementById('action-preview').style.display = 'none';
        document.getElementById('input').value = '';
    }

    function sendMessage(e) {
        e.preventDefault();
        const input = document.getElementById('input');
        const text = input.value.trim();
        if (!text || !target) return;
        const chatId = me < target ? `${me}_${target}` : `${target}_${me}`;
        if (editingMsgKey) {
            db.ref(`chats/${chatId}/${editingMsgKey}`).update({ text, edited: true });
        } else {
            const msgObj = { sender: me, text, time: Date.now() };
            if (replyData) msgObj.replyTo = replyData;
            db.ref(`chats/${chatId}`).push(msgObj);
        }
        cancelAction();
    }
</script>
</body>
</html>
