<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Petmess</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lz-string/1.4.4/lz-string.min.js"></script>
    <style>
        :root { 
            --tg-sent: #efffde; --tg-received: #ffffff; --tg-accent: #3390ec; 
            --tg-bg: #7195ba; --online: #4cc351; --glass: rgba(255, 255, 255, 0.96);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --tg-sent: #2b5278; --tg-received: #182533; --tg-accent: #5288c1;
                --tg-bg: #0e1621; --glass: rgba(24, 37, 51, 0.96);
            }
            body { color: #fff; background: #0e1621; }
            #sidebar, #chat-header, #form-container, .profile-card, #emoji-picker { background-color: #17212b !important; color: #fff; border-color: #0e1621 !important; }
            #input, #search-input, .modal-input { background: #242f3d !important; color: #fff; border-color: #101921 !important; }
            .user-item:hover { background: #202b36 !important; }
            #pinned-bar { background: rgba(23, 33, 43, 0.9); border-bottom-color: #0e1621; }
        }

        html, body { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { display: flex; background: #fff; }

        /* ЭКРАН ВХОДА */
        #auth-screen { position: fixed; inset: 0; background: #fff; display: flex; justify-content: center; align-items: center; z-index: 9000; }
        .auth-card { width: 320px; padding: 40px; text-align: center; border-radius: 30px; box-shadow: 0 20px 60px rgba(0,0,0,0.1); }
        .auth-title { color: var(--tg-accent); font-size: 36px; font-weight: 900; margin-bottom: 30px; }
        .auth-card input { width: 100%; padding: 14px; margin: 10px 0; border: 1px solid #eee; border-radius: 12px; outline: none; background: #f9f9f9; box-sizing: border-box; }
        .auth-card button { width: 100%; padding: 14px; background: var(--tg-accent); color: #fff; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; }

        /* ПРИЛОЖЕНИЕ */
        #app-screen { display: none; width: 100%; height: 100%; flex-direction: row; overflow: hidden; position: relative; }
        
        #sidebar { width: 320px; background: #fff; border-right: 1px solid #eee; display: flex; flex-direction: column; flex-shrink: 0; transition: transform 0.3s; z-index: 100; }
        .sidebar-top { padding: 20px 25px 15px; display: flex; justify-content: space-between; align-items: center; }
        .sidebar-header { color: var(--tg-accent); font-size: 26px; font-weight: 900; }

        #contacts { flex-grow: 1; overflow-y: auto; }
        .user-item { padding: 12px 20px; cursor: pointer; display: flex; align-items: center; gap: 15px; position: relative; border-bottom: 1px solid rgba(0,0,0,0.03); }
        .user-item.active { background: var(--tg-accent) !important; color: #fff !important; }
        .avatar { width: 50px; height: 50px; border-radius: 50%; object-fit: cover; background: #f0f0f0; flex-shrink: 0; }
        .status-dot { width: 12px; height: 12px; border-radius: 50%; background: #ccc; position: absolute; left: 54px; top: 46px; border: 2px solid #fff; }
        .status-dot.online { background: var(--online); }
        .unread-eye { font-size: 14px; color: var(--tg-accent); margin-left: auto; display: none; }
        
        #my-profile { padding: 15px 20px; border-top: 1px solid #f0f0f0; display: flex; align-items: center; gap: 12px; cursor: pointer; background: #fff; }

        /* ЧАТ AREA */
        #chat-area { flex-grow: 1; display: flex; flex-direction: column; min-width: 0; height: 100%; background: var(--tg-bg) url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); background-attachment: fixed; position: relative; }
        
        #chat-header { padding: 10px 20px; background: var(--glass); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(0,0,0,0.05); display: flex; align-items: center; min-height: 60px; z-index: 200; gap: 12px; }
        #back-btn { display: none; font-size: 24px; cursor: pointer; background: none; border: none; padding: 5px 10px; color: var(--tg-accent); }
        
        #pinned-bar { display: none; padding: 8px 20px; background: rgba(255,255,255,0.9); border-bottom: 1px solid #ddd; font-size: 13px; cursor: pointer; color: var(--tg-accent); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        #messages { flex-grow: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
        .msg { max-width: 75%; padding: 10px 14px 22px; border-radius: 18px; font-size: 15px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); position: relative; word-wrap: break-word; cursor: pointer; }
        .msg.sent { background: var(--tg-sent); align-self: flex-end; border-bottom-right-radius: 4px; }
        .msg.received { background: var(--tg-received); align-self: flex-start; border-bottom-left-radius: 4px; }
        .msg.highlight { background: #fff59d !important; transition: background 1s; }
        .msg-meta { position: absolute; right: 12px; bottom: 6px; font-size: 10px; opacity: 0.6; }

        /* ВВОД */
        #form-container { background: var(--glass); padding: 12px 18px; border-top: 1px solid rgba(0,0,0,0.05); position: relative; }
        #form { display: flex; align-items: center; gap: 8px; }
        #input { flex-grow: 1; min-width: 0; padding: 12px 18px; border-radius: 25px; border: 1px solid #e0e0e0; background: #f5f5f5; outline: none; font-size: 15px; }
        .action-btn { width: 44px; height: 44px; border-radius: 50%; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 20px; }
        #send-btn { background: var(--tg-accent); color: #fff; }
        
        /* ЭМОДЗИ */
        #emoji-picker { display: none; position: absolute; bottom: 70px; left: 18px; background: white; border-radius: 15px; padding: 10px; box-shadow: 0 5px 25px rgba(0,0,0,0.2); z-index: 500; width: 220px; flex-wrap: wrap; gap: 10px; justify-content: center; border: 1px solid #eee; }
        .emoji-item { font-size: 24px; cursor: pointer; transition: 0.2s; }
        .emoji-item:hover { transform: scale(1.2); }

        /* МОБИЛЬНАЯ ВЕРСИЯ - КРИТИЧЕСКИЕ ПРАВКИ */
        @media (max-width: 768px) {
            #sidebar { width: 100%; position: absolute; inset: 0; transform: translateX(0); }
            #chat-area { width: 100%; position: absolute; inset: 0; transform: translateX(100%); transition: transform 0.3s ease; }
            body.chat-open #sidebar { transform: translateX(-100%); }
            body.chat-open #chat-area { transform: translateX(0); }
            #back-btn { display: block; }
            .sidebar-header { font-size: 22px; }
            #my-profile { padding: 10px 15px; }
            .msg { max-width: 85%; }
        }

        /* КОНТЕКСТНОЕ МЕНЮ */
        #context-menu { display: none; position: fixed; background: #fff; border-radius: 14px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); z-index: 9999; overflow: hidden; min-width: 170px; border: 1px solid #eee; }
        .menu-item { padding: 14px 20px; cursor: pointer; font-size: 14px; transition: 0.2s; color: #333; }
        .menu-item:hover { background: #f8f9fa; }

        /* МОДАЛКА ПРОФИЛЯ */
        #modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(8px); display: none; justify-content: center; align-items: center; z-index: 10000; padding: 20px; }
        .profile-card { background: #fff; border-radius: 30px; width: 100%; max-width: 450px; padding: 30px; display: flex; flex-direction: column; }
    </style>
</head>
<body onclick="closeAllPopups()">

<div id="auth-screen">
    <div class="auth-card">
        <div class="auth-title">Petmess</div>
        <input type="text" id="auth-user" placeholder="Ваш логин">
        <input type="password" id="auth-pass" placeholder="Пароль">
        <button onclick="login()">Войти в сеть</button>
    </div>
</div>

<div id="app-screen">
    <div id="sidebar">
        <div class="sidebar-top">
            <span class="sidebar-header">petmess</span>
            <button style="background:none; border:none; color:var(--tg-accent); font-weight:bold; cursor:pointer;" onclick="createGroup()">+ Группа</button>
        </div>
        <div id="search-container"><input type="text" id="search-input" placeholder="Поиск..." oninput="searchUser(this.value)"><div id="search-results"></div></div>
        <div id="contacts"></div>
        <div id="my-profile" onclick="openProfileModal(me)">
            <img id="my-avatar" src="" class="avatar">
            <div style="flex-grow:1; overflow:hidden;"><b id="my-name-display" style="display:block; white-space:nowrap; text-overflow:ellipsis;">...</b></div>
        </div>
    </div>

    <div id="chat-area">
        <div id="chat-header">
            <button id="back-btn" onclick="goBack()">←</button>
            <img id="header-avatar" class="avatar" style="width:40px; height:40px; display:none;">
            <div style="display:flex; flex-direction:column; flex-grow:1; overflow:hidden;" onclick="openProfileModal(targetId)">
                <span id="header-title" style="font-weight:700; white-space:nowrap; text-overflow:ellipsis;">Выберите чат</span>
                <span id="header-subtitle" style="font-size:11px; color:#888;"></span>
            </div>
            <button id="group-invite-btn" style="display:none; padding:5px 12px; background:var(--tg-accent); color:white; border:none; border-radius:10px; cursor:pointer; font-size:12px;" onclick="inviteToGroup()">+ Участник</button>
        </div>
        
        <div id="pinned-bar" onclick="jumpToMessage(pinnedKey)">📌 Закреплено: <span id="pinned-text">...</span></div>

        <div id="messages"></div>

        <div id="form-container">
            <div id="emoji-picker"></div>
            <div id="action-preview" style="display:none; padding:8px; border-left:4px solid var(--tg-accent); background:rgba(0,0,0,0.04); margin-bottom:8px; align-items:center; border-radius:8px;">
                <div id="action-text" style="flex-grow:1; font-size:12px; color:#666; overflow:hidden; text-overflow:ellipsis;"></div>
                <div onclick="cancelAction()" style="cursor:pointer; font-size:20px;">×</div>
            </div>
            <form id="form" onsubmit="sendMessage(event)">
                <label for="chat-file" style="font-size:24px; cursor:pointer; color:#bbb;">📎</label>
                <input type="file" id="chat-file" style="display:none" accept="image/*" onchange="processFile(this)">
                <div onclick="toggleEmoji(event)" style="font-size:24px; cursor:pointer; padding:0 5px;">😊</div>
                <input id="input" autocomplete="off" placeholder="Сообщение..." disabled oninput="handleTyping()">
                <button type="button" id="voice-btn" class="action-btn" onclick="toggleVoice()" disabled>🎙</button>
                <button type="submit" id="send-btn" class="action-btn" disabled>➤</button>
            </form>
        </div>
    </div>
</div>

<div id="context-menu">
    <div class="menu-item" onclick="prepareReply()">↩ Ответить</div>
    <div class="menu-item" id="menu-pin" onclick="pinMessage()">📌 Закрепить</div>
    <div class="menu-item" id="menu-edit" onclick="prepareEdit()">✎ Изменить</div>
    <div class="menu-item" id="menu-del" onclick="deleteMsg()" style="color:#e63946;">🗑 Удалить</div>
</div>

<div id="modal-overlay" onclick="closeProfileModal()"><div class="profile-card" onclick="event.stopPropagation()" id="modal-content"></div></div>

<script>
    const firebaseConfig = {
      apiKey: "AIzaSyCydg_mccaTclSxfzfVdLFpCina4fi3LDE",
      authDomain: "petkovmes.firebaseapp.com",
      databaseURL: "https://petkovmes-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "petkovmes",
      storageBucket: "petkovmes.firebasestorage.app",
      messagingSenderId: "149469624326",
      appId: "1:149469624326:web:0c7dcabcaab15c445aeb87"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let me = '', targetId = '', isGroup = false, editingMsgKey = null, replyData = null, selectedMsg = null, pinnedKey = null, typingTimeout;
    let mediaRecorder, audioChunks = [], isRecording = false;
    const cache = new Map();

    const compress = (v) => LZString.compressToUTF16(v);
    const decompress = (v) => LZString.decompressFromUTF16(v) || v;
    const formatTime = (t) => { const d = new Date(t); return d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0'); };

    // --- НАВИГАЦИЯ ---
    function goBack() { document.body.classList.remove('chat-open'); }

    // --- ЭМОДЗИ ---
    const emojis = ['😀','😂','😍','👍','🔥','🙏','❤️','😎','🎉','😡'];
    const picker = document.getElementById('emoji-picker');
    emojis.forEach(e => {
        const div = document.createElement('div'); div.className = 'emoji-item'; div.innerText = e;
        div.onclick = () => { document.getElementById('input').value += e; picker.style.display = 'none'; };
        picker.appendChild(div);
    });
    function toggleEmoji(e) { e.stopPropagation(); picker.style.display = picker.style.display === 'flex' ? 'none' : 'flex'; }
    function closeAllPopups() { picker.style.display = 'none'; document.getElementById('context-menu').style.display = 'none'; }

    async function login() {
        const u = document.getElementById('auth-user').value.trim().toLowerCase(), p = document.getElementById('auth-pass').value.trim();
        if (!u || !p) return;
        const snap = await db.ref(`users/${u}`).once('value');
        if (snap.val() && snap.val().password !== p) { alert("Неверный пароль!"); return; }
        if (!snap.val()) await db.ref(`users/${u}`).set({ password: p, nickname: u, avatar: "" });
        me = u;
        db.ref(`status/${me}`).set('online'); db.ref(`status/${me}`).onDisconnect().set('offline');
        document.getElementById('auth-screen').style.display = 'none';
        document.getElementById('app-screen').style.display = 'flex';
        db.ref(`users/${me}`).on('value', s => {
            const d = s.val(); if(!d) return;
            document.getElementById('my-name-display').innerText = d.nickname || me;
            document.getElementById('my-avatar').src = d.avatar || `https://robohash.org/${me}`;
        });
        loadContacts();
    }

    function selectChat(id, isGrp = false) {
        if (!id) return;
        if (targetId) db.ref(getChatPath()).off();
        targetId = id; isGroup = isGrp;
        document.body.classList.add('chat-open'); // Для мобильных
        
        document.getElementById('group-invite-btn').style.display = isGroup ? 'block' : 'none';
        document.querySelectorAll('.user-item').forEach(el => el.classList.remove('active'));
        if(document.getElementById(`user-item-${id}`)) document.getElementById(`user-item-${id}`).classList.add('active');

        const hAv = document.getElementById('header-avatar'); hAv.style.display = 'block';
        document.getElementById('input').disabled = false; document.getElementById('send-btn').disabled = false; document.getElementById('voice-btn').disabled = false;

        if (isGroup) {
            db.ref(`groups/${id}`).on('value', s => { 
                const d = s.val(); document.getElementById('header-title').innerText = d.name; hAv.src = d.avatar || `https://robohash.org/${id}`; 
            });
            document.getElementById('header-subtitle').innerText = "Групповой чат";
        } else {
            db.ref(`users/${id}`).on('value', s => { 
                const d = s.val(); document.getElementById('header-title').innerText = d.nickname || id; hAv.src = d.avatar || `https://robohash.org/${id}`; 
            });
            db.ref(`status/${id}`).on('value', s => { document.getElementById('header-subtitle').innerText = s.val() === 'online' ? 'В сети' : 'Не в сети'; });
        }

        // Подгружаем закреп
        db.ref(`${isGroup ? 'groups/'+targetId : 'chats/'+getChatId(me,targetId)}/pinned`).on('value', s => {
            const bar = document.getElementById('pinned-bar');
            if(s.exists()){ bar.style.display = 'block'; document.getElementById('pinned-text').innerText = s.val().text; pinnedKey = s.val().key; }
            else bar.style.display = 'none';
        });

        loadMessages();
    }

    function getChatId(a, b) { return a < b ? a+'_'+b : b+'_'+a; }
    function getChatPath() { return isGroup ? `groups/${targetId}/messages` : `chats/${getChatId(me, targetId)}`; }

    function loadMessages() {
        db.ref(getChatPath()).on('value', snap => {
            let html = '';
            snap.forEach(c => {
                const m = c.val(), key = c.key;
                if (!isGroup && m.sender === targetId && m.read === false) db.ref(`${getChatPath()}/${key}/read`).set(true);
                const msgClass = `msg ${m.sender === me ? 'sent' : 'received'}`;
                let content = m.type === 'image' ? `<img src="${decompress(m.file)}" style="max-width:100%; border-radius:12px;">` :
                              m.type === 'audio' ? `<div class="voice-msg"><audio controls src="${decompress(m.file)}"></audio></div>` :
                              `<div>${decompress(m.text)}</div>`;
                html += `<div class="${msgClass}" id="msg-${key}" onclick="handleMsgClick(event, '${key}', '${m.sender}', '${(decompress(m.text||'')).substring(0,30)}')">
                    ${isGroup && m.sender!==me ? `<div style="font-size:11px;font-weight:bold;color:var(--tg-accent)">${m.sender}</div>` : ''}
                    ${content}<div class="msg-meta">${formatTime(m.time)} ${!isGroup && m.sender===me && !m.read ? '👁‍🗨' : ''}</div></div>`;
            });
            const div = document.getElementById('messages'); div.innerHTML = html; div.scrollTop = div.scrollHeight;
        });
    }

    function handleMsgClick(e, k, s, t) {
        e.stopPropagation(); selectedMsg = { key: k, sender: s, text: t };
        const menu = document.getElementById('context-menu'); menu.style.display = 'block';
        menu.style.left = Math.min(e.clientX, window.innerWidth - 180) + 'px';
        menu.style.top = Math.min(e.clientY, window.innerHeight - 150) + 'px';
        document.getElementById('menu-edit').style.display = (s === me) ? 'block' : 'none';
        document.getElementById('menu-del').style.display = (s === me) ? 'block' : 'none';
    }

    function pinMessage() {
        const path = isGroup ? `groups/${targetId}` : `chats/${getChatId(me, targetId)}`;
        db.ref(`${path}/pinned`).set({ key: selectedMsg.key, text: selectedMsg.text || 'Медиа' });
        closeAllPopups();
    }

    function jumpToMessage(key) {
        const el = document.getElementById(`msg-${key}`);
        if(el) { el.scrollIntoView({ behavior: 'smooth', block: 'center' }); el.classList.add('highlight'); setTimeout(() => el.classList.remove('highlight'), 2000); }
    }

    async function sendMessage(e) {
        e.preventDefault(); const inp = document.getElementById('input'); const txt = inp.value.trim(); if(!txt) return;
        db.ref(getChatPath()).push({ sender: me, text: compress(txt), time: Date.now(), type: 'text', read: false });
        if(!isGroup) db.ref(`contacts/${targetId}/${me}`).set(true);
        inp.value = '';
    }

    async function toggleVoice() {
        if (!isRecording) {
            const s = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(s); audioChunks = [];
            mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
            mediaRecorder.onstop = () => {
                const b = new Blob(audioChunks, { type: 'audio/webm' });
                const r = new FileReader(); r.readAsDataURL(b);
                r.onloadend = () => { db.ref(getChatPath()).push({ sender: me, file: compress(r.result), type: 'audio', time: Date.now(), read: false }); };
            };
            mediaRecorder.start(); isRecording = true; document.getElementById('voice-btn').classList.add('recording');
        } else { mediaRecorder.stop(); isRecording = false; document.getElementById('voice-btn').classList.remove('recording'); }
    }

    function loadContacts() {
        db.ref(`contacts/${me}`).on('value', snap => {
            const div = document.getElementById('contacts'); div.innerHTML = '';
            snap.forEach(c => {
                const id = c.key, isGrp = id.startsWith('grp_');
                const item = document.createElement('div'); item.id = `user-item-${id}`; item.className = `user-item ${id === targetId ? 'active' : ''}`;
                item.innerHTML = `<img src="https://robohash.org/${id}" class="avatar" id="av-${id}"><div class="status-dot" id="dot-${id}" style="${isGrp?'display:none':''}"></div><div style="flex-grow:1;overflow:hidden"><b>${id}</b><div id="eye-${id}" class="unread-eye">👁‍🗨</div></div><span style="color:#ccc;font-size:24px;" onclick="removeContact(event,'${id}')">×</span>`;
                
                const path = isGrp ? `groups/${id}/messages` : `chats/${getChatId(me,id)}`;
                db.ref(path).limitToLast(1).on('value', s => { if(s.exists()){ const m = Object.values(s.val())[0]; item.querySelector(`#eye-${id}`).style.display = (m.sender !== me && m.read === false) ? 'block' : 'none'; } });

                if(!isGrp){
                    db.ref(`users/${id}`).on('value', s => { if(s.val()){ document.getElementById(`av-${id}`).src = s.val().avatar || `https://robohash.org/${id}`; } });
                    db.ref(`status/${id}`).on('value', s => { if(document.getElementById(`dot-${id}`)) document.getElementById(`dot-${id}`).className = `status-dot ${s.val()==='online'?'online':''}`; });
                }
                item.onclick = () => selectChat(id, isGrp); div.appendChild(item);
            });
        });
    }

    async function removeContact(e, n) { e.stopPropagation(); if(confirm(`Удалить ${n}?`)) await db.ref(`contacts/${me}/${n}`).remove(); }
    function deleteMsg() { db.ref(`${getChatPath()}/${selectedMsg.key}`).remove(); closeAllPopups(); }
    function cancelAction() { editingMsgKey = null; replyData = null; document.getElementById('action-preview').style.display = 'none'; }
    function openProfileModal() { /* Логика профиля без изменений */ }
    function closeProfileModal() { document.getElementById('modal-overlay').style.display = 'none'; }
    function handleTyping() { if(isGroup) return; const id = getChatId(me, targetId); db.ref(`typing/${id}/${me}`).set(true); clearTimeout(typingTimeout); typingTimeout = setTimeout(() => db.ref(`typing/${id}/${me}`).set(false), 2000); }
    function searchUser(q) { /* Поиск без изменений */ }
</script>
</body>
</html>
