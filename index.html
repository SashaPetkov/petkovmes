<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Petmess</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        :root { --tg-sent: #efffde; --tg-received: #ffffff; --tg-accent: #3390ec; --tg-bg: #7195ba; --online: #4cc351; }
        html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: -apple-system, sans-serif; background: var(--tg-bg); scroll-behavior: smooth; }
        body { display: flex; }
        
        #auth-screen { position: fixed; inset: 0; background: white; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 1000; }
        .auth-card { width: 300px; padding: 20px; text-align: center; }
        .auth-card input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; outline: none; }
        .auth-card button { width: 100%; padding: 12px; background: var(--tg-accent); color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }

        #app-screen { display: none; width: 100%; height: 100%; flex-direction: row; }
        #sidebar { width: 300px; background: white; border-right: 1px solid #ddd; display: flex; flex-direction: column; flex-shrink: 0; position: relative; }
        #search-container { padding: 10px; border-bottom: 1px solid #f0f0f0; position: relative; }
        #search-input { width: 100%; padding: 10px; border: none; background: #f1f1f1; border-radius: 10px; outline: none; box-sizing: border-box; }
        #search-results { position: absolute; top: 55px; left: 10px; right: 10px; background: white; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.15); z-index: 100; display: none; max-height: 250px; overflow-y: auto; }
        .search-item { padding: 12px; cursor: pointer; border-bottom: 1px solid #f9f9f9; display: flex; align-items: center; gap: 10px; }
        .search-item:hover { background: #f0f7ff; }

        #contacts { flex-grow: 1; overflow-y: auto; }
        .user-item { padding: 10px 15px; cursor: pointer; border-bottom: 1px solid #f0f0f0; display: flex; align-items: center; gap: 12px; position: relative; }
        .user-item.active { background: var(--tg-accent); color: white; }
        .avatar { width: 45px; height: 45px; border-radius: 50%; object-fit: cover; background: #eee; flex-shrink: 0; }
        .status-dot { width: 12px; height: 12px; background: #ccc; border: 2px solid white; border-radius: 50%; position: absolute; left: 45px; top: 38px; z-index: 2; transition: 0.3s; }
        .status-dot.online { background: var(--online); }
        
        #chat-area { flex-grow: 1; display: flex; flex-direction: column; min-width: 0; background: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); position: relative; }
        #chat-header { padding: 8px 15px; background: white; border-bottom: 1px solid #ddd; display: flex; flex-direction: column; justify-content: center; min-height: 60px; }
        #messages { flex-grow: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 6px; }
        
        .msg { max-width: 80%; padding: 8px 12px 18px 12px; border-radius: 15px; font-size: 15px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); cursor: pointer; position: relative; transition: background 0.4s; }
        .msg.sent { background: var(--tg-sent); align-self: flex-end; border-bottom-right-radius: 4px; }
        .msg.received { background: var(--tg-received); align-self: flex-start; border-bottom-left-radius: 4px; }
        .msg.highlight { background: #ffeb3b !important; }

        /* ВРЕМЯ И ГЛАЗ */
        .msg-meta { position: absolute; right: 8px; bottom: 3px; display: flex; align-items: center; gap: 4px; pointer-events: none; }
        .msg-time { font-size: 10px; opacity: 0.5; color: #000; }
        .read-status { font-size: 10px; opacity: 0.5; }

        .reply-box { border-left: 3px solid var(--tg-accent); background: rgba(0,0,0,0.05); padding: 4px 8px; margin-bottom: 5px; border-radius: 4px; font-size: 12px; color: #555; cursor: pointer; }
        #form-container { background: white; padding: 10px; display: flex; flex-direction: column; }
        #form { display: flex; gap: 10px; align-items: center; }
        #input { flex-grow: 1; padding: 10px 15px; border-radius: 20px; border: 1px solid #ddd; outline: none; }
        #send-btn { background: var(--tg-accent); color: white; border: none; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; font-size: 20px; }

        #context-menu { display: none; position: fixed; background: white; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); z-index: 2000; overflow: hidden; min-width: 150px; }
        .menu-item { padding: 12px 16px; cursor: pointer; font-size: 14px; border-bottom: 1px solid #f0f0f0; }

        @media (max-width: 768px) { #sidebar { width: 75px; } .user-info, .del-contact { display: none; } .status-dot { left: 48px; } }
    </style>
</head>
<body onclick="closeMenu()">

<div id="auth-screen">
    <div class="auth-card">
        <h2 style="color: var(--tg-accent);">Petmess</h2>
        <input type="text" id="auth-user" placeholder="Логин">
        <input type="password" id="auth-pass" placeholder="Пароль">
        <button onclick="login()">ВОЙТИ</button>
    </div>
</div>

<div id="app-screen">
    <div id="sidebar">
        <div id="search-container"><input type="text" id="search-input" placeholder="Поиск людей..." oninput="searchUser(this.value)"><div id="search-results"></div></div>
        <div id="contacts"></div>
        <div id="my-profile" onclick="document.getElementById('profile-upload').click()" style="padding: 15px; border-top: 1px solid #eee; display: flex; align-items: center; gap: 12px; cursor: pointer; background: #fafafa;">
            <img id="my-avatar" src="https://robohash.org/me" class="avatar">
            <b id="my-name-display">Профиль</b>
            <input type="file" id="profile-upload" style="display:none" accept="image/*" onchange="processFile(this, 'avatar')">
        </div>
    </div>
    <div id="chat-area">
        <div id="chat-header">
            <div style="display:flex; align-items:center;">
                <img id="header-avatar" class="avatar" style="width:35px;height:35px;display:none;margin-right:10px">
                <div style="display:flex; flex-direction:column;">
                    <span id="header-title">Выберите чат</span>
                    <span id="header-typing" style="font-size: 11px; color: var(--tg-accent); display: none;">печатает...</span>
                </div>
            </div>
        </div>
        <div id="messages"></div>
        <div id="form-container">
            <div id="action-preview" style="display:none; padding:8px; border-left:4px solid var(--tg-accent); background:#f9f9f9; display:flex; align-items:center;">
                <div id="action-text" style="flex-grow:1; font-size:12px; color:#555; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;"></div>
                <div onclick="cancelAction()" style="cursor:pointer; font-size:24px; margin-left:10px;">×</div>
            </div>
            <form id="form" onsubmit="sendMessage(event)">
                <label for="chat-file" style="font-size:24px; cursor:pointer; color:#888;">📎</label>
                <input type="file" id="chat-file" style="display:none" accept="image/*" onchange="processFile(this, 'chat')">
                <input id="input" autocomplete="off" placeholder="Написать..." disabled oninput="handleTyping()">
                <button id="send-btn" disabled>➤</button>
            </form>
        </div>
    </div>
</div>

<div id="context-menu">
    <div class="menu-item" onclick="prepareReply()">↩ Ответить</div>
    <div class="menu-item" id="menu-edit" onclick="prepareEdit()">✎ Изменить</div>
    <div class="menu-item" id="menu-del" onclick="deleteMsg()" style="color:red;">🗑 Удалить</div>
</div>

<script>
    const firebaseConfig = {
      apiKey: "AIzaSyCydg_mccaTclSxfzfVdLFpCina4fi3LDE",
      authDomain: "petkovmes.firebaseapp.com",
      databaseURL: "https://petkovmes-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "petkovmes",
      storageBucket: "petkovmes.firebasestorage.app",
      messagingSenderId: "149469624326",
      appId: "1:149469624326:web:0c7dcabcaab15c445aeb87"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let me = '', target = '', editingMsgKey = null, replyData = null, selectedMsg = null, typingTimeout;
    const avatarCache = new Map();

    // ФОРМАТ ВРЕМЕНИ
    function formatTime(timestamp) {
        if (!timestamp) return '';
        const date = new Date(timestamp);
        const hours = date.getHours().toString().padStart(2, '0');
        const minutes = date.getMinutes().toString().padStart(2, '0');
        return `${hours}:${minutes}`;
    }

    async function login() {
        const u = document.getElementById('auth-user').value.trim().toLowerCase();
        const p = document.getElementById('auth-pass').value.trim();
        if (!u || !p) return;
        const snap = await db.ref(`users/${u}`).once('value');
        if (snap.val() && snap.val().password !== p) { alert("Неверный пароль!"); return; }
        if (!snap.val()) await db.ref(`users/${u}`).set({ password: p, avatar: "" });
        me = u;
        db.ref(`status/${me}`).set('online');
        db.ref(`status/${me}`).onDisconnect().set('offline');
        document.getElementById('auth-screen').style.display = 'none';
        document.getElementById('app-screen').style.display = 'flex';
        document.getElementById('my-name-display').innerText = me;
        db.ref(`users/${me}/avatar`).on('value', s => { if(s.val()) document.getElementById('my-avatar').src = s.val(); });
        loadContacts();
    }

    function handleTyping() {
        if (!target) return;
        const chatId = me < target ? `${me}_${target}` : `${target}_${me}`;
        db.ref(`typing/${chatId}/${me}`).set(true);
        clearTimeout(typingTimeout);
        typingTimeout = setTimeout(() => { db.ref(`typing/${chatId}/${me}`).set(false); }, 2000);
    }

    function searchUser(q) {
        const query = q.trim().toLowerCase();
        const resultsDiv = document.getElementById('search-results');
        if (query.length < 1) { resultsDiv.style.display = 'none'; return; }
        db.ref('users').orderByKey().startAt(query).endAt(query + '\uf8ff').limitToFirst(10).once('value', snapshot => {
            resultsDiv.innerHTML = '';
            snapshot.forEach(child => {
                const name = child.key; if (name === me) return;
                const div = document.createElement('div'); div.className = 'search-item';
                div.innerHTML = `<img src="${avatarCache.get(name) || 'https://robohash.org/'+name}" style="width:30px;height:30px;border-radius:50%"> <b>${name}</b>`;
                div.onclick = () => { db.ref(`contacts/${me}/${name}`).set(true); db.ref(`contacts/${name}/${me}`).set(true); resultsDiv.style.display='none'; selectChat(name); };
                resultsDiv.appendChild(div);
            });
            resultsDiv.style.display = 'block';
        });
    }

    function loadContacts() {
        db.ref(`contacts/${me}`).on('value', snap => {
            const div = document.getElementById('contacts'); div.innerHTML = '';
            snap.forEach(c => {
                const name = c.key;
                const item = document.createElement('div');
                item.className = `user-item ${name === target ? 'active' : ''}`;
                item.innerHTML = `<img src="${avatarCache.get(name) || 'https://robohash.org/'+name}" class="avatar" id="av-${name}"><div class="status-dot" id="dot-${name}"></div><b style="flex-grow:1">${name}</b><span onclick="removeContact(event, '${name}')" style="opacity:0.3">×</span>`;
                db.ref(`users/${name}/avatar`).on('value', s => { if(s.val()){ avatarCache.set(name, s.val()); if(document.getElementById(`av-${name}`)) document.getElementById(`av-${name}`).src=s.val(); }});
                db.ref(`status/${name}`).on('value', s => { if(document.getElementById(`dot-${name}`)) document.getElementById(`dot-${name}`).className = `status-dot ${s.val()==='online'?'online':''}`; });
                item.onclick = () => selectChat(name);
                div.appendChild(item);
            });
        });
    }

    function jumpToMessage(key) {
        const el = document.getElementById(`msg-${key}`);
        if (el) { el.scrollIntoView({ behavior: 'smooth', block: 'center' }); el.classList.add('highlight'); setTimeout(() => el.classList.remove('highlight'), 1000); }
    }

    function selectChat(name) {
        target = name; cancelAction();
        document.getElementById('header-title').innerText = target;
        const hAv = document.getElementById('header-avatar'); hAv.style.display = 'block';
        hAv.src = avatarCache.get(target) || `https://robohash.org/${target}`;
        const chatId = me < target ? `${me}_${target}` : `${target}_${me}`;
        
        db.ref(`typing/${chatId}/${target}`).on('value', s => { document.getElementById('header-typing').style.display = s.val() ? 'block' : 'none'; });

        db.ref(`chats/${chatId}`).off();
        db.ref(`chats/${chatId}`).on('value', snap => {
            const mDiv = document.getElementById('messages'); mDiv.innerHTML = '';
            snap.forEach(c => {
                const m = c.val(); const key = c.key;
                if (m.sender === target && !m.read) db.ref(`chats/${chatId}/${key}`).update({ read: true });

                const d = document.createElement('div');
                d.className = `msg ${m.sender === me ? 'sent' : 'received'}`;
                d.id = `msg-${key}`;
                
                let html = '';
                if (m.replyTo) html += `<div class="reply-box" onclick="jumpToMessage('${m.replyTo.key || ''}')"><b>💬</b> ${m.replyTo.text}</div>`;
                if (m.type === 'image') {
                    if (Date.now() - m.time > 86400000) { db.ref(`chats/${chatId}/${key}`).remove(); return; }
                    html += `<img src="${m.file}" style="max-width:100%;border-radius:10px;">`;
                } else html += `<div>${m.text}${m.edited ? '<small style="color:#888;margin-left:5px">(ред.)</small>' : ''}</div>`;
                
                // ВРЕМЯ И ГЛАЗ
                html += `<div class="msg-meta">
                            <span class="msg-time">${formatTime(m.time)}</span>
                            ${(m.sender === me && !m.read) ? '<span class="read-status">👁‍🗨</span>' : ''}
                         </div>`;
                
                d.innerHTML = html;
                d.onclick = (e) => { if(!e.target.closest('.reply-box')) showMenu(e, key, m.sender, m.text || "[Фото]"); };
                mDiv.appendChild(d);
            });
            mDiv.scrollTop = mDiv.scrollHeight;
        });
        document.getElementById('input').disabled = false; document.getElementById('send-btn').disabled = false;
    }

    function sendMessage(e) {
        e.preventDefault(); const txt = document.getElementById('input').value.trim();
        if (!txt || !target) return;
        const id = me < target ? `${me}_${target}` : `${target}_${me}`;
        if (editingMsgKey) db.ref(`chats/${id}/${editingMsgKey}`).update({ text: txt, edited: true });
        else {
            const obj = { sender: me, text: txt, time: Date.now(), type: 'text', read: false };
            if (replyData) obj.replyTo = replyData;
            db.ref(`chats/${id}`).push(obj);
            db.ref(`contacts/${target}/${me}`).set(true);
        }
        db.ref(`typing/${id}/${me}`).set(false); cancelAction();
    }

    function sendMedia(base64) {
        const id = me < target ? `${me}_${target}` : `${target}_${me}`;
        db.ref(`chats/${id}`).push({ sender: me, type: 'image', file: base64, time: Date.now(), read: false });
        db.ref(`contacts/${target}/${me}`).set(true);
    }

    async function processFile(input, type) {
        const file = input.files[0]; if (!file) return;
        const reader = new FileReader(); reader.readAsDataURL(file);
        reader.onload = (e) => {
            const img = new Image(); img.src = e.target.result;
            img.onload = async () => {
                const canvas = document.createElement('canvas');
                const MAX = type === 'avatar' ? 120 : 600;
                let w = img.width, h = img.height;
                if (w > MAX) { h *= MAX / w; w = MAX; }
                canvas.width = w; canvas.height = h;
                canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                const base64 = canvas.toDataURL('image/jpeg', 0.5);
                if (type === 'avatar') await db.ref(`users/${me}/avatar`).set(base64);
                else sendMedia(base64);
            };
        };
    }
    function showMenu(e, key, sender, text) { e.stopPropagation(); selectedMsg = { key, sender, text }; const m = document.getElementById('context-menu'); m.style.display='block'; m.style.left = Math.min(e.clientX, window.innerWidth - 160) + 'px'; m.style.top = Math.min(e.clientY, window.innerHeight - 150) + 'px'; document.getElementById('menu-edit').style.display = sender === me ? 'flex' : 'none'; document.getElementById('menu-del').style.display = sender === me ? 'flex' : 'none'; }
    function closeMenu() { document.getElementById('context-menu').style.display = 'none'; }
    function prepareReply() { cancelAction(); replyData = { key: selectedMsg.key, text: selectedMsg.text }; document.getElementById('action-text').innerText = `Ответ: ${selectedMsg.text}`; document.getElementById('action-preview').style.display = 'flex'; document.getElementById('input').focus(); }
    function prepareEdit() { cancelAction(); editingMsgKey = selectedMsg.key; document.getElementById('action-text').innerText = `Правка: ${selectedMsg.text}`; document.getElementById('action-preview').style.display = 'flex'; document.getElementById('input').value = selectedMsg.text; document.getElementById('input').focus(); }
    function cancelAction() { editingMsgKey = null; replyData = null; document.getElementById('action-preview').style.display = 'none'; document.getElementById('input').value = ''; }
    function deleteMsg() { const id = me < target ? `${me}_${target}` : `${target}_${me}`; db.ref(`chats/${id}/${selectedMsg.key}`).remove(); }
    async function removeContact(e, n) { e.stopPropagation(); if(confirm(`Удалить ${n}?`)) await db.ref(`contacts/${me}/${n}`).remove(); }
</script>
</body>
</html>
