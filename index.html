<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Petmess Pro</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lz-string/1.4.4/lz-string.min.js"></script>
    <style>
        :root { 
            --tg-sent: #efffde; --tg-received: #ffffff; --tg-accent: #3390ec; 
            --tg-bg: #7195ba; --online: #4cc351; --glass: rgba(255, 255, 255, 0.96);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --tg-sent: #2b5278; --tg-received: #182533; --tg-accent: #5288c1;
                --tg-bg: #0e1621; --glass: rgba(24, 37, 51, 0.96);
            }
            body { color: #fff; background: #0e1621; }
            #sidebar, #chat-header, #form-container, #emoji-picker, .modal-content { background-color: #17212b !important; color: #fff; border-color: #0e1621 !important; }
            #input, .modal-input { background: #242f3d !important; color: #fff; border-color: #101921 !important; }
            .user-item:hover { background: #202b36 !important; }
        }

        html, body { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { display: flex; background: #fff; }

        /* ЭКРАНЫ */
        #auth-screen, .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: flex; justify-content: center; align-items: center; z-index: 9000; }
        #auth-screen { background: #fff; }
        .auth-card, .modal-content { width: 320px; padding: 30px; text-align: center; border-radius: 25px; background: #fff; box-shadow: 0 20px 60px rgba(0,0,0,0.2); }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #eee; border-radius: 12px; outline: none; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: var(--tg-accent); color: #fff; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 10px; }

        #app-screen { display: none; width: 100%; height: 100%; flex-direction: row; position: relative; }
        
        /* САЙДБАР */
        #sidebar { width: 320px; background: #fff; border-right: 1px solid #eee; display: flex; flex-direction: column; flex-shrink: 0; z-index: 100; }
        .sidebar-top { padding: 15px 20px; border-bottom: 1px solid #eee; }
        .search-box { display: flex; gap: 5px; margin-top: 10px; }
        #contacts { flex-grow: 1; overflow-y: auto; }
        .user-item { padding: 10px 20px; cursor: pointer; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid rgba(0,0,0,0.03); }
        .avatar { width: 45px; height: 45px; border-radius: 50%; object-fit: cover; background: #eee; }

        /* ЧАТ */
        #chat-area { flex-grow: 1; display: flex; flex-direction: column; background: var(--tg-bg); position: relative; }
        #chat-header { padding: 10px 20px; background: var(--glass); backdrop-filter: blur(10px); display: flex; align-items: center; gap: 12px; cursor: pointer; border-bottom: 1px solid rgba(0,0,0,0.05); }
        #messages { flex-grow: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
        .msg { max-width: 75%; padding: 8px 12px 20px; border-radius: 15px; font-size: 15px; position: relative; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .msg.sent { background: var(--tg-sent); align-self: flex-end; border-bottom-right-radius: 4px; }
        .msg.received { background: var(--tg-received); align-self: flex-start; border-bottom-left-radius: 4px; }
        .msg audio { height: 35px; width: 200px; display: block; margin-top: 5px; }

        /* ВВОД */
        #form-container { background: var(--glass); padding: 10px 15px; border-top: 1px solid rgba(0,0,0,0.05); position: relative; }
        #emoji-picker { position: absolute; bottom: 70px; left: 10px; width: 250px; background: white; border-radius: 15px; padding: 10px; display: none; flex-wrap: wrap; gap: 8px; box-shadow: 0 5px 25px rgba(0,0,0,0.2); z-index: 1000; }
        .emoji { cursor: pointer; font-size: 20px; }
        
        @media (max-width: 768px) {
            #sidebar { width: 100%; position: absolute; inset: 0; }
            #chat-area { width: 100%; position: absolute; inset: 0; transform: translateX(100%); transition: 0.3s; }
            body.chat-open #chat-area { transform: translateX(0); }
        }
    </style>
</head>
<body onclick="closePopups()">

<div id="auth-screen">
    <div class="auth-card">
        <h2 style="color:var(--tg-accent)">Petmess</h2>
        <input type="text" id="auth-user" placeholder="Логин">
        <input type="password" id="auth-pass" placeholder="Пароль">
        <button onclick="login()">Войти / Регистрация</button>
    </div>
</div>

<div id="profile-modal" class="modal" style="display:none">
    <div class="modal-content">
        <h3 id="prof-title">Профиль</h3>
        <img id="prof-avatar" class="avatar" style="width:80px; height:80px; margin-bottom:10px">
        <div id="my-edit-fields">
            <input type="text" id="edit-nickname" placeholder="Новый ник">
            <input type="text" id="edit-avatar" placeholder="URL аватара">
            <button onclick="saveProfile()">Сохранить</button>
        </div>
        <button style="background:#ccc" onclick="document.getElementById('profile-modal').style.display='none'">Закрыть</button>
    </div>
</div>

<div id="app-screen">
    <div id="sidebar">
        <div class="sidebar-top">
            <div style="display:flex; justify-content:space-between; align-items:center">
                <span class="sidebar-header" style="font-weight:900; color:var(--tg-accent)">petmess</span>
                <button onclick="openProfile(me)" style="width:auto; padding:5px 10px; font-size:12px">Мой профиль</button>
            </div>
            <div class="search-box">
                <input type="text" id="search-input" placeholder="Найти контакт...">
                <button onclick="searchUser()" style="width:auto; margin:10px 0">🔍</button>
            </div>
        </div>
        <div id="contacts"></div>
    </div>

    <div id="chat-area">
        <div id="chat-header" onclick="openProfile(targetId)">
            <button id="back-btn" onclick="goBack()" style="width:auto; background:none; color:var(--tg-accent); margin:0; padding:0 10px; font-size:20px">←</button>
            <img id="header-avatar" class="avatar" style="width:35px; height:35px">
            <div id="header-title" style="font-weight:bold">Выберите чат</div>
        </div>

        <div id="messages"></div>

        <div id="form-container">
            <div id="emoji-picker"></div>
            <form id="form" onsubmit="sendMessage(event)" style="display:flex; align-items:center; gap:10px">
                <div onclick="toggleEmoji(event)" style="font-size:22px; cursor:pointer">😊</div>
                <div id="mic-btn" onclick="toggleRecording()" style="font-size:22px; cursor:pointer">🎤</div>
                <input id="input" autocomplete="off" placeholder="Сообщение..." disabled>
                <button type="submit" id="send-btn" style="width:auto; background:none; color:var(--tg-accent); font-size:22px; margin:0" disabled>➤</button>
            </form>
        </div>
    </div>
</div>

<div id="context-menu" class="modal" style="display:none; background:none;" onclick="this.style.display='none'">
    <div style="position:absolute; background:#fff; border-radius:10px; box-shadow:0 5px 15px rgba(0,0,0,0.2); overflow:hidden" id="menu-box">
        <div class="menu-item" style="padding:10px 20px; cursor:pointer" onclick="deleteMsg()">🗑 Удалить</div>
    </div>
</div>

<script>
    const firebaseConfig = {
      apiKey: "AIzaSyCydg_mccaTclSxfzfVdLFpCina4fi3LDE",
      authDomain: "petkovmes.firebaseapp.com",
      databaseURL: "https://petkovmes-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "petkovmes",
      storageBucket: "petkovmes.firebasestorage.app",
      messagingSenderId: "149469624326",
      appId: "1:149469624326:web:0c7dcabcaab15c445aeb87"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let me = '', targetId = '', selectedMsgKey = null;
    let mediaRecorder, audioChunks = [], isRecording = false;

    const compress = (v) => LZString.compressToUTF16(v);
    const decompress = (v) => LZString.decompressFromUTF16(v) || v;

    // --- АВТОРИЗАЦИЯ ---
    async function login() {
        const u = document.getElementById('auth-user').value.trim().toLowerCase(), p = document.getElementById('auth-pass').value.trim();
        if (!u || !p) return;
        const snap = await db.ref(`users/${u}`).once('value');
        if (snap.val() && snap.val().password !== p) return alert("Неверный пароль");
        if (!snap.val()) await db.ref(`users/${u}`).set({ password: p, nickname: u, avatar: `https://robohash.org/${u}` });
        
        me = u;
        document.getElementById('auth-screen').style.display = 'none';
        document.getElementById('app-screen').style.display = 'flex';
        loadContacts();
        initEmojis();
    }

    // --- ПРОФИЛИ ---
    async function openProfile(id) {
        if (!id) return;
        const snap = await db.ref(`users/${id}`).once('value');
        const data = snap.val();
        document.getElementById('prof-title').innerText = data.nickname || id;
        document.getElementById('prof-avatar').src = data.avatar || `https://robohash.org/${id}`;
        document.getElementById('my-edit-fields').style.display = (id === me) ? 'block' : 'none';
        document.getElementById('profile-modal').style.display = 'flex';
    }

    async function saveProfile() {
        const nick = document.getElementById('edit-nickname').value.trim();
        const av = document.getElementById('edit-avatar').value.trim();
        const updates = {};
        if (nick) updates.nickname = nick;
        if (av) updates.avatar = av;
        await db.ref(`users/${me}`).update(updates);
        alert("Профиль обновлен!");
    }

    // --- ПОИСК ---
    async function searchUser() {
        const q = document.getElementById('search-input').value.trim().toLowerCase();
        if (!q || q === me) return;
        const snap = await db.ref(`users/${q}`).once('value');
        if (snap.exists()) {
            await db.ref(`contacts/${me}/${q}`).set(true);
            alert("Пользователь добавлен!");
        } else {
            alert("Пользователь не найден");
        }
    }

    // --- ЧАТ И СООБЩЕНИЯ ---
    function selectChat(id) {
        if (targetId) db.ref(`chats/${getChatId(me, targetId)}`).off();
        targetId = id;
        document.body.classList.add('chat-open');
        document.getElementById('input').disabled = false;
        document.getElementById('send-btn').disabled = false;
        
        db.ref(`users/${id}`).on('value', s => {
            const d = s.val();
            document.getElementById('header-title').innerText = d.nickname || id;
            document.getElementById('header-avatar').src = d.avatar || `https://robohash.org/${id}`;
        });
        loadMessages();
    }

    function getChatId(a, b) { return a < b ? a+'_'+b : b+'_'+a; }

    function loadMessages() {
        db.ref(`chats/${getChatId(me, targetId)}`).on('value', snap => {
            let html = '';
            snap.forEach(c => {
                if(c.key === 'pinned') return;
                const m = c.val(), key = c.key;
                const data = decompress(m.text || "");
                const isMe = m.sender === me;
                
                let content = (m.type === 'voice') ? `<audio src="${data}" controls></audio>` : `<div>${data}</div>`;
                
                html += `<div class="msg ${isMe?'sent':'received'}" oncontextmenu="showMenu(event, '${key}')">
                    ${content}
                    <div class="msg-meta" style="font-size:10px; opacity:0.5; text-align:right">${new Date(m.time).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</div>
                </div>`;
            });
            const cont = document.getElementById('messages');
            cont.innerHTML = html;
            cont.scrollTop = cont.scrollHeight;
        });
    }

    async function sendMessage(e) {
        e.preventDefault();
        const inp = document.getElementById('input');
        if (!inp.value.trim()) return;
        db.ref(`chats/${getChatId(me, targetId)}`).push({
            sender: me, text: compress(inp.value.trim()), time: Date.now(), type: 'text'
        });
        inp.value = '';
    }

    // --- ГОЛОСОВЫЕ ---
    async function toggleRecording() {
        const btn = document.getElementById('mic-btn');
        if (!isRecording) {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(stream);
            audioChunks = [];
            mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
            mediaRecorder.onstop = () => {
                const blob = new Blob(audioChunks, { type: 'audio/webm' });
                const reader = new FileReader();
                reader.readAsDataURL(blob);
                reader.onloadend = () => {
                    db.ref(`chats/${getChatId(me, targetId)}`).push({
                        sender: me, text: compress(reader.result), type: 'voice', time: Date.now()
                    });
                };
            };
            mediaRecorder.start();
            isRecording = true; btn.innerText = '🛑'; btn.style.color = 'red';
        } else {
            mediaRecorder.stop();
            isRecording = false; btn.innerText = '🎤'; btn.style.color = '#bbb';
        }
    }

    // --- ЭМОДЗИ ---
    function initEmojis() {
        const list = ['😀','😂','😍','👍','🔥','🙏','❤️','😎','🎉','😡','😭','✅'];
        const cont = document.getElementById('emoji-picker');
        cont.innerHTML = list.map(e => `<span class="emoji" onclick="addEmoji('${e}')">${e}</span>`).join('');
    }
    function toggleEmoji(e) { e.stopPropagation(); const p = document.getElementById('emoji-picker'); p.style.display = p.style.display === 'flex' ? 'none' : 'flex'; }
    function addEmoji(e) { document.getElementById('input').value += e; }

    function loadContacts() {
        db.ref(`contacts/${me}`).on('value', snap => {
            const div = document.getElementById('contacts'); div.innerHTML = '';
            snap.forEach(c => {
                const id = c.key;
                db.ref(`users/${id}`).once('value', s => {
                    const d = s.val();
                    const item = document.createElement('div');
                    item.className = 'user-item';
                    item.innerHTML = `<img src="${d.avatar}" class="avatar"><b>${d.nickname || id}</b>`;
                    item.onclick = () => selectChat(id);
                    div.appendChild(item);
                });
            });
        });
    }

    function showMenu(e, key) { e.preventDefault(); selectedMsgKey = key; const m = document.getElementById('context-menu'); m.style.display = 'block'; const box = document.getElementById('menu-box'); box.style.left = e.clientX + 'px'; box.style.top = e.clientY + 'px'; }
    function deleteMsg() { if(confirm("Удалить?")) db.ref(`chats/${getChatId(me, targetId)}/${selectedMsgKey}`).remove(); }
    function goBack() { document.body.classList.remove('chat-open'); }
    function closePopups() { document.getElementById('emoji-picker').style.display = 'none'; }
</script>
</body>
</html>
