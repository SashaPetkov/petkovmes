<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Petkovmes Forever</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: -apple-system, system-ui, sans-serif; background: #e5ddd5; }
        body { display: flex; }
        #auth-screen { position: fixed; inset: 0; background: white; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 1000; }
        #auth-screen input, #auth-screen button { margin: 10px; padding: 12px; width: 260px; border-radius: 10px; border: 1px solid #ddd; outline: none; }
        #auth-screen button { background: #075e54; color: white; border: none; font-weight: bold; cursor: pointer; }
        
        #app-screen { display: none; width: 100%; height: 100%; flex-direction: row; }
        #sidebar { width: 300px; background: white; border-right: 1px solid #ddd; display: flex; flex-direction: column; flex-shrink: 0; }
        #chat-area { flex-grow: 1; display: flex; flex-direction: column; min-width: 0; background: #e5ddd5; }
        
        #messages { flex-grow: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
        .msg { max-width: 80%; padding: 8px 12px; border-radius: 10px; font-size: 15px; position: relative; box-shadow: 0 1px 1px rgba(0,0,0,0.1); }
        .msg.sent { background: #dcf8c6; align-self: flex-end; border-bottom-right-radius: 2px; }
        .msg.received { background: #fff; align-self: flex-start; border-bottom-left-radius: 2px; }
        .msg-info { font-size: 10px; color: #888; margin-bottom: 2px; }

        #form { padding: 10px; background: #f0f0f0; display: flex; gap: 10px; align-items: center; }
        #input { flex-grow: 1; padding: 12px 15px; border-radius: 25px; border: 1px solid #ddd; outline: none; }
        #send-btn { background: #075e54; color: white; border: none; width: 42px; height: 42px; border-radius: 50%; cursor: pointer; font-size: 20px; }

        .user-item { padding: 15px; cursor: pointer; border-bottom: 1px solid #eee; transition: 0.2s; }
        .user-item:hover { background: #f5f5f5; }
        .user-item.active { background: #e9edef; font-weight: bold; }
        
        @media (max-width: 600px) { #sidebar { width: 80px; } .user-item span { display: none; } }
    </style>
</head>
<body>

<div id="auth-screen">
    <h2 style="color: #075e54;">Petkovmes</h2>
    <p style="color: #666; font-size: 14px;">Бесплатный мессенджер навсегда</p>
    <input type="text" id="username" placeholder="Ваш никнейм">
    <button onclick="login()">ВОЙТИ</button>
</div>

<div id="app-screen">
    <div id="sidebar">
        <div style="padding: 15px; border-bottom: 1px solid #eee;">
            <input type="text" id="search" placeholder="Ник друга..." style="width: 100%; padding: 8px; border-radius: 15px; border: 1px solid #ddd;" oninput="searchUsers()">
        </div>
        <div id="contacts"></div>
    </div>
    <div id="chat-area">
        <div id="chat-header" style="padding: 15px; background: #ededed; font-weight: bold; border-bottom: 1px solid #ddd;">Выберите чат</div>
        <div id="messages"></div>
        <form id="form" onsubmit="sendMessage(event)">
            <input id="input" autocomplete="off" placeholder="Введите сообщение..." disabled>
            <button id="send-btn" disabled>➤</button>
        </form>
    </div>
</div>

<script>
    // ТВОИ ДАННЫЕ ИЗ КОНСОЛИ
    const firebaseConfig = {
      apiKey: "AIzaSyCydg_mccaTclSxfzfVdLFpCina4fi3LDE",
      authDomain: "petkovmes.firebaseapp.com",
      // ВАЖНО: Если ты выбрал регион Бельгия, URL будет именно таким:
      databaseURL: "https://petkovmes-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "petkovmes",
      storageBucket: "petkovmes.firebasestorage.app",
      messagingSenderId: "149469624326",
      appId: "1:149469624326:web:0c7dcabcaab15c445aeb87"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let me = '', target = '';

    function login() {
        const u = document.getElementById('username').value.trim().toLowerCase();
        if (!u) return;
        me = u;
        document.getElementById('auth-screen').style.display = 'none';
        document.getElementById('app-screen').style.display = 'flex';
        loadContacts();
    }

    function searchUsers() {
        const q = document.getElementById('search').value.trim().toLowerCase();
        if (q.length < 2 || q === me) return;
        
        // В Firebase мы просто добавляем контакт в список "Мои контакты"
        if (confirm(`Начать чат с ${q}?`)) {
            db.ref(`contacts/${me}/${q}`).set(true);
            db.ref(`contacts/${q}/${me}`).set(true); // Добавляем и у него нас
            document.getElementById('search').value = '';
            loadContacts();
        }
    }

    function loadContacts() {
        db.ref(`contacts/${me}`).on('value', snapshot => {
            const contDiv = document.getElementById('contacts');
            contDiv.innerHTML = '';
            snapshot.forEach(child => {
                const name = child.key;
                const div = document.createElement('div');
                div.className = `user-item ${name === target ? 'active' : ''}`;
                div.innerHTML = `<span>${name}</span>`;
                div.onclick = () => selectChat(name);
                contDiv.appendChild(div);
            });
        });
    }

    function selectChat(name) {
        target = name;
        document.getElementById('chat-header').innerText = target;
        document.getElementById('input').disabled = false;
        document.getElementById('send-btn').disabled = false;
        
        // Создаем уникальный ID чата (сортируем имена, чтобы у обоих был один ID)
        const chatId = me < target ? `${me}_${target}` : `${target}_${me}`;
        
        // Снимаем старую подписку и вешаем новую
        db.ref(`chats/${chatId}`).off(); 
        db.ref(`chats/${chatId}`).limitToLast(100).on('value', snapshot => {
            const msgDiv = document.getElementById('messages');
            msgDiv.innerHTML = '';
            snapshot.forEach(child => {
                const m = child.val();
                const d = document.createElement('div');
                d.className = `msg ${m.sender === me ? 'sent' : 'received'}`;
                d.innerHTML = `<div class="msg-info">${m.sender}</div>${m.text}`;
                msgDiv.appendChild(d);
            });
            msgDiv.scrollTop = msgDiv.scrollHeight;
        });
    }

    function sendMessage(e) {
        e.preventDefault();
        const input = document.getElementById('input');
        const text = input.value.trim();
        if (!text || !target) return;

        const chatId = me < target ? `${me}_${target}` : `${target}_${me}`;
        db.ref(`chats/${chatId}`).push({
            sender: me,
            text: text,
            time: Date.now()
        });
        input.value = '';
    }
</script>
</body>
</html>
