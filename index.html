<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Petmess</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lz-string/1.4.4/lz-string.min.js"></script>
    <style>
        :root { 
            --tg-sent: #efffde; --tg-received: #ffffff; --tg-accent: #3390ec; 
            --tg-bg: #7195ba; --online: #4cc351; --glass: rgba(255, 255, 255, 0.96);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --tg-sent: #2b5278; --tg-received: #182533; --tg-accent: #5288c1;
                --tg-bg: #0e1621; --glass: rgba(24, 37, 51, 0.96);
            }
            body { color: #fff; background: #0e1621; }
            #sidebar, #chat-header, #form-container, #emoji-picker { background-color: #17212b !important; color: #fff; border-color: #0e1621 !important; }
            #input { background: #242f3d !important; color: #fff; border-color: #101921 !important; }
            .user-item:hover { background: #202b36 !important; }
            #pinned-bar { background: rgba(23, 33, 43, 0.95) !important; border-bottom: 1px solid #000; }
        }

        html, body { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { display: flex; background: #fff; }

        /* ЭКРАНЫ */
        #auth-screen { position: fixed; inset: 0; background: #fff; display: flex; justify-content: center; align-items: center; z-index: 9000; }
        .auth-card { width: 320px; padding: 40px; text-align: center; border-radius: 30px; box-shadow: 0 20px 60px rgba(0,0,0,0.1); }
        .auth-title { color: var(--tg-accent); font-size: 36px; font-weight: 900; margin-bottom: 30px; }
        .auth-card input { width: 100%; padding: 14px; margin: 10px 0; border: 1px solid #eee; border-radius: 12px; outline: none; background: #f9f9f9; }
        .auth-card button { width: 100%; padding: 14px; background: var(--tg-accent); color: #fff; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; }

        #app-screen { display: none; width: 100%; height: 100%; flex-direction: row; position: relative; }
        
        /* САЙДБАР */
        #sidebar { width: 320px; background: #fff; border-right: 1px solid #eee; display: flex; flex-direction: column; flex-shrink: 0; z-index: 100; }
        .sidebar-top { padding: 20px 25px 15px; display: flex; justify-content: space-between; align-items: center; }
        .sidebar-header { color: var(--tg-accent); font-size: 26px; font-weight: 900; }
        #contacts { flex-grow: 1; overflow-y: auto; }
        .user-item { padding: 12px 20px; cursor: pointer; display: flex; align-items: center; gap: 15px; position: relative; border-bottom: 1px solid rgba(0,0,0,0.03); }
        .user-item.active { background: var(--tg-accent) !important; color: #fff !important; }
        .avatar { width: 50px; height: 50px; border-radius: 50%; object-fit: cover; background: #f0f0f0; flex-shrink: 0; }
        #my-profile { padding: 15px 20px; border-top: 1px solid #f0f0f0; display: flex; align-items: center; gap: 12px; cursor: pointer; }

        /* ЧАТ */
        #chat-area { flex-grow: 1; display: flex; flex-direction: column; min-width: 0; height: 100%; background: var(--tg-bg) url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); background-attachment: fixed; position: relative; }
        #chat-header { padding: 10px 20px; background: var(--glass); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(0,0,0,0.05); display: flex; align-items: center; min-height: 60px; z-index: 200; gap: 12px; }
        #back-btn { display: none; font-size: 24px; cursor: pointer; background: none; border: none; color: var(--tg-accent); }
        
        #messages { flex-grow: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
        .msg { max-width: 75%; padding: 10px 14px 22px; border-radius: 18px; font-size: 15px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); position: relative; word-wrap: break-word; cursor: pointer; }
        .msg.sent { background: var(--tg-sent); align-self: flex-end; border-bottom-right-radius: 4px; }
        .msg.received { background: var(--tg-received); align-self: flex-start; border-bottom-left-radius: 4px; }
        .msg-meta { position: absolute; right: 12px; bottom: 6px; font-size: 10px; opacity: 0.6; }
        .msg audio { height: 35px; width: 200px; display: block; margin-top: 5px; }

        #pinned-bar { display: none; align-items: center; padding: 10px 20px; background: rgba(255,255,255,0.95); border-bottom: 1px solid rgba(0,0,0,0.08); font-size: 14px; color: var(--tg-accent); z-index: 150; }

        /* ВВОД */
        #form-container { background: var(--glass); padding: 12px 18px; border-top: 1px solid rgba(0,0,0,0.05); }
        #form { display: flex; align-items: center; gap: 10px; }
        #input { flex-grow: 1; min-width: 0; padding: 12px 18px; border-radius: 25px; border: 1px solid #e0e0e0; background: #f5f5f5; outline: none; font-size: 15px; }
        
        /* КОНТЕКСТНОЕ МЕНЮ */
        #context-menu { display: none; position: fixed; background: #fff; border-radius: 14px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); z-index: 9999; min-width: 170px; border: 1px solid #eee; overflow: hidden; }
        .menu-item { padding: 14px 20px; cursor: pointer; font-size: 14px; color: #333; }
        .menu-item:hover { background: #f8f9fa; }

        @media (max-width: 768px) {
            #sidebar { width: 100%; position: absolute; inset: 0; transition: 0.3s; }
            #chat-area { width: 100%; position: absolute; inset: 0; transform: translateX(100%); transition: 0.3s; }
            body.chat-open #sidebar { transform: translateX(-100%); }
            body.chat-open #chat-area { transform: translateX(0); }
            #back-btn { display: block; }
        }
    </style>
</head>
<body onclick="closePopups()">

<div id="auth-screen">
    <div class="auth-card">
        <div class="auth-title">Petmess</div>
        <input type="text" id="auth-user" placeholder="Логин">
        <input type="password" id="auth-pass" placeholder="Пароль">
        <button onclick="login()">Войти</button>
    </div>
</div>

<div id="app-screen">
    <div id="sidebar">
        <div class="sidebar-top"><span class="sidebar-header">petmess</span><button style="border:none;background:none;color:var(--tg-accent);font-weight:bold;cursor:pointer;" onclick="createGroup()">+ Группа</button></div>
        <div id="contacts"></div>
        <div id="my-profile"><img id="my-avatar" class="avatar" src=""><b id="my-name">...</b></div>
    </div>

    <div id="chat-area">
        <div id="chat-header">
            <button id="back-btn" onclick="goBack()">←</button>
            <div style="flex-grow:1;overflow:hidden;">
                <div id="header-title" style="font-weight:700">Выберите чат</div>
            </div>
        </div>

        <div id="pinned-bar">
            <div id="pinned-content" style="flex-grow:1" onclick="jumpToMessage(currentPinnedKey)">Закреплено: <span id="pinned-text"></span></div>
            <div onclick="unpinMessage(event, currentPinnedKey)" style="cursor:pointer">×</div>
        </div>

        <div id="messages"></div>

        <div id="form-container">
            <div id="emoji-picker" style="display:none"></div>
            <form id="form" onsubmit="sendMessage(event)">
                <label for="chat-file" style="font-size:24px;cursor:pointer;color:#bbb;">📎</label>
                <input type="file" id="chat-file" style="display:none" accept="image/*" onchange="processFile(this)">
                
                <div id="mic-btn" onclick="toggleRecording()" style="font-size:24px;cursor:pointer;color:#bbb;">🎤</div>
                
                <input id="input" autocomplete="off" placeholder="Сообщение..." disabled>
                <button type="submit" id="send-btn" style="background:none; border:none; color:var(--tg-accent); font-size:24px; cursor:pointer;" disabled>➤</button>
            </form>
        </div>
    </div>
</div>

<div id="context-menu">
    <div class="menu-item" onclick="togglePin()">📌 Закрепить/Открепить</div>
    <div class="menu-item" style="color:red;" onclick="deleteMsg()">🗑 Удалить</div>
</div>

<script>
    const firebaseConfig = {
      apiKey: "AIzaSyCydg_mccaTclSxfzfVdLFpCina4fi3LDE",
      authDomain: "petkovmes.firebaseapp.com",
      databaseURL: "https://petkovmes-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "petkovmes",
      storageBucket: "petkovmes.firebasestorage.app",
      messagingSenderId: "149469624326",
      appId: "1:149469624326:web:0c7dcabcaab15c445aeb87"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let me = '', targetId = '', isGroup = false, selectedMsg = null, currentPinnedKey = null;
    let mediaRecorder, audioChunks = [], isRecording = false;

    const compress = (v) => LZString.compressToUTF16(v);
    const decompress = (v) => LZString.decompressFromUTF16(v) || v;
    const formatTime = (t) => { const d = new Date(t); return d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0'); };

    async function login() {
        const u = document.getElementById('auth-user').value.trim().toLowerCase(), p = document.getElementById('auth-pass').value.trim();
        if (!u || !p) return;
        const snap = await db.ref(`users/${u}`).once('value');
        if (snap.val() && snap.val().password !== p) return alert("Неверный пароль");
        if (!snap.val()) await db.ref(`users/${u}`).set({ password: p, nickname: u });
        
        me = u;
        db.ref(`status/${me}`).set('online');
        db.ref(`status/${me}`).onDisconnect().set('offline');
        
        document.getElementById('auth-screen').style.display = 'none';
        document.getElementById('app-screen').style.display = 'flex';
        
        db.ref(`users/${me}`).on('value', s => { 
            const d = s.val();
            document.getElementById('my-name').innerText = d.nickname || me;
            document.getElementById('my-avatar').src = d.avatar || `https://robohash.org/${me}`;
        });
        loadContacts();
    }

    function getChatId(a, b) { return a < b ? a+'_'+b : b+'_'+a; }
    
    // ВАЖНО: Исправленные пути, как были у тебя в оригинале
    function getChatPath() { 
        return isGroup ? `groups/${targetId}/messages` : `chats/${getChatId(me, targetId)}`; 
    }
    function getPinnedPath() { 
        return isGroup ? `groups/${targetId}/pinned` : `chats/${getChatId(me, targetId)}/pinned`; 
    }

    function selectChat(id, isGrp = false) {
        if (targetId) { db.ref(getChatPath()).off(); db.ref(getPinnedPath()).off(); }
        targetId = id; isGroup = isGrp;
        document.body.classList.add('chat-open');
        document.getElementById('header-title').innerText = id;
        document.getElementById('input').disabled = false; 
        document.getElementById('send-btn').disabled = false;
        
        db.ref(getPinnedPath()).on('value', snap => {
            const bar = document.getElementById('pinned-bar');
            if (snap.exists()) {
                const pins = snap.val();
                currentPinnedKey = Object.keys(pins).pop();
                document.getElementById('pinned-text').innerText = pins[currentPinnedKey].text;
                bar.style.display = 'flex';
            } else { bar.style.display = 'none'; }
        });
        loadMessages();
    }

    function loadMessages() {
        db.ref(getChatPath()).on('value', snap => {
            let html = '';
            snap.forEach(c => {
                if (c.key === 'pinned') return; // Пропускаем мета-данные закрепа
                const m = c.val(), key = c.key;
                const data = decompress(m.text || m.file || "");
                const isMe = m.sender === me;
                let content = '';

                if (m.type === 'voice') {
                    content = `<audio src="${data}" controls></audio>`;
                } else if (m.type === 'image') {
                    content = `<img src="${data}" style="max-width:100%;border-radius:10px">`;
                } else {
                    content = `<div>${data}</div>`;
                }

                html += `<div class="msg ${isMe?'sent':'received'}" id="msg-${key}" onclick="handleMsgClick(event,'${key}','${m.sender}','${m.type==='text'?data.substring(0,20):'Медиа'}')">
                    ${isGroup && !isMe ? `<div style="font-size:11px;font-weight:bold;color:var(--tg-accent)">${m.sender}</div>`:''}
                    ${content}
                    <div class="msg-meta">${formatTime(m.time)}</div>
                </div>`;
            });
            const container = document.getElementById('messages');
            container.innerHTML = html;
            container.scrollTop = container.scrollHeight;
        });
    }

    async function toggleRecording() {
        const micBtn = document.getElementById('mic-btn');
        if (!isRecording) {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];
                mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
                mediaRecorder.onstop = () => {
                    const blob = new Blob(audioChunks, { type: 'audio/webm' });
                    const reader = new FileReader();
                    reader.readAsDataURL(blob);
                    reader.onloadend = () => {
                        db.ref(getChatPath()).push({
                            sender: me,
                            text: compress(reader.result),
                            type: 'voice',
                            time: Date.now()
                        });
                    };
                    stream.getTracks().forEach(t => t.stop());
                };
                mediaRecorder.start();
                isRecording = true; micBtn.style.color = 'red'; micBtn.innerText = '🛑';
            } catch (e) { alert("Микрофон недоступен"); }
        } else {
            mediaRecorder.stop();
            isRecording = false; micBtn.style.color = '#bbb'; micBtn.innerText = '🎤';
        }
    }

    async function sendMessage(e) {
        e.preventDefault(); const inp = document.getElementById('input'); 
        if(!inp.value.trim()) return;
        db.ref(getChatPath()).push({ sender: me, text: compress(inp.value.trim()), time: Date.now(), type: 'text' });
        db.ref(`contacts/${targetId}/${me}`).set(true);
        db.ref(`contacts/${me}/${targetId}`).set(true);
        inp.value = '';
    }

    function processFile(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = e => db.ref(getChatPath()).push({ sender: me, text: compress(e.target.result), type: 'image', time: Date.now() });
            reader.readAsDataURL(input.files[0]);
        }
    }

    function loadContacts() {
        db.ref(`contacts/${me}`).on('value', snap => {
            const div = document.getElementById('contacts'); div.innerHTML = '';
            snap.forEach(c => {
                const id = c.key;
                const item = document.createElement('div'); 
                item.className = `user-item ${id === targetId ? 'active' : ''}`;
                item.innerHTML = `<img src="https://robohash.org/${id}" class="avatar"><b>${id}</b>`;
                item.onclick = () => selectChat(id, id.startsWith('grp_'));
                div.appendChild(item);
            });
        });
    }

    function handleMsgClick(e, k, s, t) {
        e.stopPropagation(); selectedMsg = { key: k, sender: s, text: t };
        const menu = document.getElementById('context-menu');
        menu.style.display = 'block';
        menu.style.left = Math.min(e.clientX, window.innerWidth - 180) + 'px';
        menu.style.top = Math.min(e.clientY, window.innerHeight - 150) + 'px';
    }

    async function createGroup() {
        const n = prompt("Имя группы:"); 
        if(n) { const id = 'grp_'+Date.now(); await db.ref(`contacts/${me}/${id}`).set(true); selectChat(id, true); }
    }

    function closePopups() { document.getElementById('context-menu').style.display = 'none'; }
    function goBack() { document.body.classList.remove('chat-open'); }
    async function deleteMsg() { if(confirm("Удалить?")) db.ref(`${getChatPath()}/${selectedMsg.key}`).remove(); closePopups(); }
    async function togglePin() {
        const path = `${getPinnedPath()}/${selectedMsg.key}`;
        const snap = await db.ref(path).once('value');
        if (snap.exists()) await db.ref(path).remove();
        else await db.ref(path).set({ text: selectedMsg.text, time: Date.now() });
        closePopups();
    }
</script>
</body>
</html>
